const STORE_NAME_MAP = {
  "HONGDAE": "홍대",
  "GAROSU": "신사",
  "MYEONGDONG": "명동",
  "BUSAN": "부산",
  "CENTRAL": "센트럴",
  "SUWON": "수원",
  "GOYANG": "고양",
};
function applyStoreNameMap(orderNo) {
  for (const [eng, kor] of Object.entries(STORE_NAME_MAP)) {
    const re = new RegExp(eng, 'gi');
    if (re.test(orderNo)) return kor;
  }
  return orderNo.replace(/[\d_\-\.]/g, '').trim();
}


// ── Pyodide xlwt 초기화 ──
let _pyodideReady = null;
async function getPyodide() {
  if (!_pyodideReady) {
    _pyodideReady = (async () => {
      const py = await loadPyodide();
      await py.loadPackage('micropip');
      await py.runPythonAsync(`
import micropip
await micropip.install('xlwt')
import xlwt, io
def make_xls(rows_data, sheet_name):
    wb = xlwt.Workbook(encoding='utf-8')
    ws = wb.add_sheet(sheet_name)
    for r_idx, row in enumerate(rows_data):
        for c_idx, val in enumerate(row):
            ws.write(r_idx, c_idx, val)
    buf = io.BytesIO()
    wb.save(buf)
    return buf.getvalue()
`);
      return py;
    })();
  }
  return _pyodideReady;
}

async function makeXlwtBlob(rows, sheetName) {
  const py = await getPyodide();
  // rows: [['자사코드','수량'], ['S325066', 2], ...]
  const rowsData = [['자사코드','수량'], ...rows.map(r => [String(r['자사코드']||''), Number(r['수량'])||0])];
  py.globals.set('rows_data', py.toPy(rowsData));
  py.globals.set('sheet_name', sheetName);
  const result = await py.runPythonAsync('make_xls(rows_data, sheet_name)');
  const bytes = result.toJs();
  return new Blob([new Uint8Array(bytes)], {type: 'application/vnd.ms-excel'});
}

function StoreOrderTab(){
  const [uploadedFile, setUploadedFile] = useState(null);
  const [generatedFiles, setGeneratedFiles] = useState([]); // [{name, rows, checked}]
  const [recipientCards, setRecipientCards] = useState([]); // [{name, qty}]
  const [processing, setProcessing] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const [allChecked, setAllChecked] = useState(true);
  const [split, setSplit] = useState(38);
  const [driveToast, setDriveToast] = useState(null);
  const [driveSplit, setDriveSplit] = useState(30); // 드라이브 패널 너비 %
  const splitDragRef = useRef({dragging:false});
  const driveDragRef = useRef({dragging:false});
  const containerRef = useRef();
  const fileInputRef = useRef();
  const driveRef = useRef({uploadBlob:null,fetch:null});
  function showDriveToast(msg,type="success"){setDriveToast({msg,type});setTimeout(()=>setDriveToast(null),3500);}

  const startSplitDrag = e => {
    e.preventDefault();
    splitDragRef.current.dragging = true;
    const onMove = ev => {
      if(!splitDragRef.current.dragging) return;
      const rect = containerRef.current.getBoundingClientRect();
      const pct = Math.min(60, Math.max(25, ((ev.clientX - rect.left) / rect.width) * 100));
      setSplit(pct);
    };
    const onUp = () => { splitDragRef.current.dragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const startDriveDrag = e => {
    e.preventDefault();
    driveDragRef.current.dragging = true;
    const onMove = ev => {
      if(!driveDragRef.current.dragging) return;
      const rect = containerRef.current.getBoundingClientRect();
      const fromRight = ((rect.right - ev.clientX) / rect.width) * 100;
      setDriveSplit(Math.min(60, Math.max(15, fromRight)));
    };
    const onUp = () => { driveDragRef.current.dragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  function processFile(file) {
    if(!file) return;
    setProcessing(true);
    setGeneratedFiles([]);
    setRecipientCards([]);
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, {defval:''});
        if(!raw.length) { alert('데이터가 없습니다.'); setProcessing(false); return; }

        const cols = Object.keys(raw[0]);
        // 컬럼 감지 - 유연하게
        const orderNoCol = cols.find(c => ['주문번호','order_no','orderno','주문 번호'].some(k => c.toLowerCase().replace(/\s/g,'').includes(k.toLowerCase().replace(/\s/g,''))));
        const barcodeCol = cols.find(c => ['바코드','barcode'].some(k => c.toLowerCase().includes(k.toLowerCase())));
        const qtyCol = cols.find(c => ['상품수량','수량','qty','quantity'].some(k => c.toLowerCase().replace(/\s/g,'').includes(k.toLowerCase().replace(/\s/g,''))));
        const productNameCol = cols.find(c => ['상품명','상품이름','productname'].some(k => c.toLowerCase().replace(/\s/g,'').includes(k.toLowerCase().replace(/\s/g,''))));
        const recipientCol = cols.find(c => ['수령자','수령인','받는분','받는사람','수취인','수신자'].some(k => c.toLowerCase().replace(/\s/g,'').includes(k.toLowerCase().replace(/\s/g,''))));

        if(!orderNoCol) { alert('주문번호 컬럼을 찾을 수 없습니다.\n컬럼 목록: ' + cols.join(', ')); setProcessing(false); return; }
        if(!barcodeCol) { alert('바코드 컬럼을 찾을 수 없습니다.\n컬럼 목록: ' + cols.join(', ')); setProcessing(false); return; }
        if(!qtyCol) { alert('상품수량 컬럼을 찾을 수 없습니다.\n컬럼 목록: ' + cols.join(', ')); setProcessing(false); return; }

        // 개별주문 상품명 제외 필터
        const filtered = raw.filter(r => {
          if(!productNameCol) return true;
          const pname = String(r[productNameCol]||'').trim();
          return pname !== '개별주문';
        });

        // 수령자 카드 집계
        if(recipientCol && qtyCol) {
          const rcpMap = {};
          filtered.forEach(r => {
            const rcp = String(r[recipientCol]||'').trim() || '(이름없음)';
            const qty = Number(r[qtyCol]) || 0;
            rcpMap[rcp] = (rcpMap[rcp]||0) + qty;
          });
          const cards = Object.entries(rcpMap)
            .filter(([n]) => n && n !== '(이름없음)')
            .sort((a,b) => b[1]-a[1])
            .map(([name, qty]) => ({name, qty}));
          setRecipientCards(cards);
        }

        // ── 주문번호 8자리 숫자 = 유니화 판별 ──
        const is8digit = on => /^\d{8}$/.test(on);

        // 수령자 → 대표 주문번호(비-8자리) 매핑
        // (같은 수령자에 8자리+비8자리가 섞인 경우 비8자리가 대표)
        const rcpMainOrder = {}; // {수령자: 대표주문번호}
        if(recipientCol) {
          filtered.forEach(r => {
            const rcp = String(r[recipientCol]||'').trim();
            const on  = String(r[orderNoCol]||'').trim();
            if(!rcp || !on) return;
            if(!is8digit(on)) rcpMainOrder[rcp] = on; // 비-8자리 우선 등록
          });
          // 수령자가 8자리 주문번호만 가진 경우 그냥 그 번호가 대표
          filtered.forEach(r => {
            const rcp = String(r[recipientCol]||'').trim();
            const on  = String(r[orderNoCol]||'').trim();
            if(!rcp || !on || rcpMainOrder[rcp]) return;
            rcpMainOrder[rcp] = on;
          });
        }

        // 주문번호별 그룹화 (8자리는 수령자의 대표 주문번호 버킷으로 합침)
        const groups = {}; // {대표주문번호: {rows, hasUnihwa}}
        filtered.forEach(r => {
          const rcp = recipientCol ? String(r[recipientCol]||'').trim() : '';
          const on  = String(r[orderNoCol]||'').trim();
          if(!on) return;
          let targetOn = on;
          let unihwa = false;
          if(is8digit(on) && rcp && rcpMainOrder[rcp] && rcpMainOrder[rcp] !== on) {
            targetOn = rcpMainOrder[rcp]; // 대표 주문번호로 합침
            unihwa = true;
          }
          if(!groups[targetOn]) groups[targetOn] = { rows:[], hasUnihwa:false };
          groups[targetOn].rows.push(r);
          if(unihwa) groups[targetOn].hasUnihwa = true;
        });

        const today = new Date();
        const dateStr = `${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;

        const files = Object.entries(groups).map(([orderNo, {rows, hasUnihwa}]) => {
          // SO_STORE.db에서 바코드 → 상품코드 조회 (다를 경우 상품코드 우선)
          const _dbMap = {};
          (SO_STORE.db||[]).forEach(d => {
            const bc = (d.바코드||'').toUpperCase();
            const pc = (d.상품코드||'').toUpperCase();
            if(bc && pc && bc !== pc) _dbMap[bc] = pc;
          });
          const outRows = rows.map(r => {
            const bc = String(r[barcodeCol]||'').trim().toUpperCase();
            const 자사코드 = _dbMap[bc] || bc; // 상품코드가 있으면 상품코드, 없으면 바코드
            return { '자사코드': 자사코드, '수량': Math.round(Number(r[qtyCol])||0) };
          });
          const mappedOrderNo = applyStoreNameMap(orderNo);
          const totalQty = outRows.reduce((sum, r) => sum + (Number(r['수량']) || 0), 0);
          const name = `${dateStr}${mappedOrderNo}${totalQty}.xls`;
          return { name, orderNo: mappedOrderNo, rows: outRows, checked: true, hasUnihwa };
        });

        setGeneratedFiles(files);
        setAllChecked(true);
        setUploadedFile(file.name);
      } catch(err) {
        alert('파일 처리 오류: ' + err.message);
      }
      setProcessing(false);
    };
    reader.readAsArrayBuffer(file);
  }

  function handleFileInput(e) {
    const file = e.target.files[0];
    if(file) processFile(file);
    e.target.value = '';
  }

  function handleDrop(e) {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    if(file) processFile(file);
  }

  function toggleCheck(i) {
    setGeneratedFiles(prev => {
      const next = [...prev];
      next[i] = {...next[i], checked: !next[i].checked};
      return next;
    });
  }

  function toggleAll() {
    const next = !allChecked;
    setAllChecked(next);
    setGeneratedFiles(prev => prev.map(f => ({...f, checked: next})));
  }

  async function downloadSelected() {
    const selected = generatedFiles.filter(f => f.checked);
    if(!selected.length) { alert('선택된 파일이 없습니다.'); return; }

    // 단일 파일: 바로 다운로드
    if(selected.length === 1) {
      const f = selected[0];

      const _rng=XLSX.utils.decode_range(_ws['!ref']);
      for(let _r=1;_r<=_rng.e.r;_r++){const _c=_ws[XLSX.utils.encode_cell({r:_r,c:0})];if(_c)_c.t='s';}
      const _wb=XLSX.utils.book_new();
      const blob=await makeXlwtBlob(f.rows,(()=>{const n=new Date();return 'pack_data'+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0')+String(n.getHours()).padStart(2,'0')+String(n.getMinutes()).padStart(2,'0')+String(n.getSeconds()).padStart(2,'0');})());
      const dlA = document.createElement('a');
      dlA.href = URL.createObjectURL(blob);

      dlA.click();

      // 드라이브 자동 저장
      if(driveRef.current.uploadBlob){
        const ok = await driveRef.current.uploadBlob(blob, f.name);
        if(ok) showDriveToast(`✅ "${f.name}" 드라이브에 저장됨`);
      }
      return;
    }

    // 다중 파일: zip으로 묶어서 다운로드
    const zip = new JSZip();
    let driveOk = 0;
    for(const f of selected) {
      const _ws=XLSX.utils.json_to_sheet(f.rows,{header:['자사코드','수량']});
      _ws['!cols']=[{wch:20},{wch:8}];
      const _rng=XLSX.utils.decode_range(_ws['!ref']);
      for(let _r=1;_r<=_rng.e.r;_r++){const _c=_ws[XLSX.utils.encode_cell({r:_r,c:0})];if(_c)_c.t='s';}
      const _wb=XLSX.utils.book_new();
      const blob=await makeXlwtBlob(f.rows,(()=>{const n=new Date();return 'pack_data'+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0')+String(n.getHours()).padStart(2,'0')+String(n.getMinutes()).padStart(2,'0')+String(n.getSeconds()).padStart(2,'0');})());
      const _buf=await blob.arrayBuffer(); zip.file(f.name, _buf);
      // 드라이브 자동 저장
      if(driveRef.current.uploadBlob){
        const ok = await driveRef.current.uploadBlob(blob, f.name);
        if(ok) driveOk++;
      }
    }
    // zip 생성 & 다운로드 (먼저)
    const zipBlob = await zip.generateAsync({type:'blob'});
    const zipTotalQty = selected.reduce((sum, f) => sum + f.rows.reduce((s, r) => s + (Number(r['수량']) || 0), 0), 0);
    const zipToday = new Date();
    const zipDateStr = `${zipToday.getFullYear()}${String(zipToday.getMonth()+1).padStart(2,'0')}${String(zipToday.getDate()).padStart(2,'0')}`;
    const zipFileName = `${zipDateStr}_매장발주_${selected.length}개_${zipTotalQty}족.zip`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = zipFileName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);

    // 드라이브 업로드 (zip 다운로드 후)
    if(driveRef.current.uploadBlob){
      const driveZipOk = await driveRef.current.uploadBlob(zipBlob, zipFileName);
      if(driveZipOk) showDriveToast(`✅ zip + ${driveOk}개 파일이 구글 드라이브에 저장되었습니다`);
      else showDriveToast("드라이브 저장 실패 — 로그인 상태를 확인하세요","error");
    } else if(driveOk>0) showDriveToast(`✅ ${driveOk}개 파일이 구글 드라이브에 저장되었습니다`);
  }

  const checkedCount = generatedFiles.filter(f => f.checked).length;

  return (
    <div ref={containerRef} style={{flex:1,minHeight:0,display:'flex',flexDirection:'row',overflow:'hidden',background:C.bg}}>
      {/* ── 좌측: 업로드 패널 ── */}
      <div style={{flex:`0 0 ${split}%`,minHeight:0,display:'flex',flexDirection:'column',gap:14,padding:20,overflowY:'auto',borderRight:'none'}}>
        {/* 드래그 업로드 박스 */}
        <div
          onDragOver={e=>{e.preventDefault();setDragOver(true);}}
          onDragLeave={()=>setDragOver(false)}
          onDrop={handleDrop}
          style={{
            border:`2.5px dashed ${dragOver?C.accent:C.border}`,
            borderRadius:16,
            background:dragOver?C.accentSoft:C.card,
            padding:'32px 20px',
            textAlign:'center',
            cursor:'pointer',
            transition:'all .2s',
            flexShrink:0,
          }}
          onClick={()=>fileInputRef.current.click()}
        >
          <div style={{fontSize:36,marginBottom:10}}>📂</div>
          <div style={{fontSize:15,fontWeight:700,color:dragOver?C.accent:C.text,marginBottom:6}}>
            {uploadedFile ? `✅ ${uploadedFile}` : '엑셀 파일(구버전도 가능)을 드래그하거나 클릭하여 업로드'}
          </div>

        {processing && (

            </div>

                background:C.card,
                border:`1.5px solid ${C.border}`,
                borderRadius:10,
                padding:'10px 14px',
                display:'flex',
                alignItems:'center',
                justifyContent:'space-between',
                boxShadow:'0 1px 4px #0000000a',
              }}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:C.accentSoft,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:C.accent,flexShrink:0}}>
                    {card.name.charAt(0)}

                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:20,color:C.muted}}>수량</span>

      {/* ── 드래그 리사이저 ── */}

                        const blob=await makeXlwtBlob(f.rows,(()=>{const n=new Date();return 'pack_data'+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0')+String(n.getHours()).padStart(2,'0')+String(n.getMinutes()).padStart(2,'0')+String(n.getSeconds()).padStart(2,'0');})());

const EPURE_EXCEPTION = '[Ver.3]_호레인_삭스앵클부츠(3cm)';
function getSupplier(row){
  const sup = row['공급처']||'';
  const name = row['상품명']||'';
  if((sup==='사라'||sup==='슈슈') && name!==EPURE_EXCEPTION){
    if(name && /^[A-Za-z]/.test(name)) return `${sup}(에퓨레)`;
  }
  return sup;
}

function fmtDate(d=new Date()){
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function downloadXlsx(rows, headers, filename){
  const ws = XLSX.utils.json_to_sheet(rows, {header:headers});
  // 열 너비 자동 계산 (헤더 or 데이터 중 최대 글자 수)
  ws['!cols'] = headers.map(h=>{
    const max = rows.reduce((m,r)=>{
      const v = r[h]!=null ? String(r[h]) : '';
      return Math.max(m, v.length);
    }, h.length);
    return {wch: Math.min(max + 2, 60)};
  });
  const wb2 = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb2,ws,'Sheet1');
  XLSX.writeFile(wb2,filename);
}

    try{ JsBarcode(ref.current, code, {format:'CODE128',width,height,displayValue:false,margin:0}); }

  },[code]);
  return <svg ref={ref}/>;

// DB변경 감지 팝업
function DbDiffModal({added, removed, addedRows, locChanged, locChangedRows, onDownload, onClose}){
  const[sbStatus,setSbStatus]=React.useState('');
  const[sbDone,setSbDone]=React.useState(false);
  const[syncing,setSyncing]=React.useState(false);

  const hasChanges=(added||[]).length>0||(removed||[]).length>0||(locChanged||[]).length>0;

  async function doSbSync(){
    if(syncing||sbDone) return;
    setSyncing(true);
    try{
      // ① 추가된 바코드 → jaeja_db INSERT
      if(addedRows&&addedRows.length>0){
        setSbStatus(`⬆ ${addedRows.length}개 추가 중…`);
        const BATCH=500;
        for(let i=0;i<addedRows.length;i+=BATCH){
          const batch=addedRows.slice(i,i+BATCH).map(r=>({
            product_code:String(r['상품코드']||r['바코드']||'').toUpperCase(),
            barcode:String(r['바코드']||'').toUpperCase(),
            product_name:String(r['상품명']||''),
            option:String(r['옵션']||r['옵션명']||''),
            location:String(r['로케이션']||''),
          }));
          await sbInsertRows('jaeja_db',batch);
          setSbStatus(`⬆ 추가 ${Math.min(i+BATCH,addedRows.length)}/${addedRows.length}`);
        }
      }
      // ② 삭제된 바코드 → jaeja_db DELETE
      if(removed&&removed.length>0){
        setSbStatus(`🗑 ${removed.length}개 삭제 중…`);
        const CHUNK=50;
        for(let i=0;i<removed.length;i+=CHUNK){
          await sbDeleteRows('jaeja_db',sbInFilter('barcode',removed.slice(i,i+CHUNK)));
          setSbStatus(`🗑 삭제 ${Math.min(i+CHUNK,removed.length)}/${removed.length}`);
        }
      }
      // ③ 로케이션 변경 → jaeja_db barcode 기준 PATCH
      if(locChangedRows&&locChangedRows.length>0){
        setSbStatus(`📍 로케이션 ${locChangedRows.length}개 변경 중…`);
        for(let ci=0;ci<locChangedRows.length;ci++){
          const r=locChangedRows[ci];
          const bc=String(r['바코드']||'').toUpperCase().trim();
          if(!bc) continue;
          setSbStatus(`📍 로케이션 변경 중… ${ci+1}/${locChangedRows.length}`);
          await sbPatchRows('jaeja_db',`barcode=eq.${encodeURIComponent(bc)}`,{location:String(r['로케이션']||'').trim()});
        }
      }
      setSbStatus('✅ Supabase 동기화 완료!');
      setSbDone(true);

      // ── SO_STORE 로컬 반영 (적재현황 즉시 갱신) ──
      // 바코드 → 새 로케이션 맵
      const locUpdateMap={};
      (locChangedRows||[]).forEach(r=>{
        const bc=String(r['바코드']||'').toUpperCase().trim();
        if(bc) locUpdateMap[bc]=String(r['로케이션']||'').trim();
      });
      if(Object.keys(locUpdateMap).length>0){
        // SO_STORE.db 업데이트
        const newDb=(SO_STORE.db||[]).map(r=>{
          const bc=(r.바코드||'').toUpperCase();
          const pc=(r.상품코드||'').toUpperCase();
          const nl=locUpdateMap[bc]||locUpdateMap[pc]||'';
          return nl?{...r,로케이션:nl}:r;
        });
        // SO_STORE.jaeja 업데이트
        const newJaeja=(SO_STORE.jaeja||[]).map(r=>{
          const bc=(r.바코드||'').toUpperCase();
          const nl=locUpdateMap[bc]||'';
          return nl?{...r,로케이션:nl}:r;
        });
        Object.assign(SO_STORE,{db:newDb,jaeja:newJaeja});
        saveSoStore();
        if(_sbRealtimeCallback) _sbRealtimeCallback({...SO_STORE});
      }
    }catch(e){
      setSbStatus('❌ 오류: '+e.message);
    }finally{
      setSyncing(false);
    }
  }

  return(
    <div style={{position:'fixed',inset:0,background:'#00000077',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:C.surface,borderRadius:14,padding:24,width:560,maxHeight:'85vh',display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontSize:15,fontWeight:800,color:C.text}}>📦 DB 변경 감지</div>
        <div style={{display:'flex',gap:8,flex:1,minHeight:0,overflowY:'auto'}}>
          {(added||[]).length>0&&(
            <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontSize:12,fontWeight:700,color:C.green}}>➕ 추가 ({added.length})</div>
              <div style={{overflowY:'auto',background:C.greenSoft,borderRadius:8,padding:'8px 10px',fontSize:11,color:'#166534',maxHeight:180}}>
                {added.map((b,i)=><div key={i} style={{borderBottom:'1px solid #bbf7d0',padding:'3px 0'}}>{b}</div>)}
              </div>
            </div>
          )}
          {(removed||[]).length>0&&(
            <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontSize:12,fontWeight:700,color:C.red}}>❌ 삭제 ({removed.length})</div>
              <div style={{overflowY:'auto',background:C.redSoft,borderRadius:8,padding:'8px 10px',fontSize:11,color:'#991b1b',maxHeight:180}}>
                {removed.map((b,i)=><div key={i} style={{borderBottom:'1px solid #fecaca',padding:'3px 0'}}>{b}</div>)}
              </div>
            </div>
          )}
          {(locChanged||[]).length>0&&(
            <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontSize:12,fontWeight:700,color:C.orange}}>📍 로케이션 변경 ({locChanged.length})</div>
              <div style={{overflowY:'auto',background:C.orangeSoft,borderRadius:8,padding:'8px 10px',fontSize:11,color:'#92400e',maxHeight:180}}>
                {locChanged.map((r,i)=>(
                  <div key={i} style={{borderBottom:'1px solid #fed7aa',padding:'4px 0',display:'flex',flexDirection:'column',gap:1}}>
                    <span style={{fontWeight:700,fontFamily:'monospace'}}>{r.바코드}</span>
                    <span>{r.기존} → <b>{r.변경}</b></span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
        {sbStatus&&(
          <div style={{padding:'8px 12px',borderRadius:8,fontSize:13,fontWeight:600,
            background:sbStatus.startsWith('✅')?C.greenSoft:sbStatus.startsWith('❌')?C.redSoft:C.accentSoft,
            color:sbStatus.startsWith('✅')?C.green:sbStatus.startsWith('❌')?C.red:C.accent}}>
            {sbStatus}
          </div>
        )}
        <div style={{...s.flex(8,'center','flex-end'),borderTop:`1px solid ${C.border}`,paddingTop:12}}>
          <button onClick={onDownload} style={{background:C.surface,color:C.accent,border:`1px solid ${C.accent}`,borderRadius:7,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>📥 엑셀</button>
          <button onClick={doSbSync} disabled={syncing||sbDone||!hasChanges}
            style={{background:sbDone?C.greenSoft:syncing?C.dim:'#10b981',color:sbDone?C.green:syncing?C.muted:'#fff',
              border:'none',borderRadius:7,padding:'7px 18px',fontSize:12,fontWeight:700,
              cursor:syncing||sbDone?'default':'pointer'}}>
            {sbDone?'✅ 완료':syncing?'동기화 중…':'☁️ Supabase 동기화'}
          </button>
          <button onClick={onClose} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:'7px 14px',fontSize:12,cursor:'pointer',color:C.muted}}>닫기</button>
        </div>
      </div>
    </div>
  );
}

function useIsMobile(bp=768){
  const[mobile,setMobile]=useState(()=>window.innerWidth<=bp);
  useEffect(()=>{const h=()=>setMobile(window.innerWidth<=bp);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[bp]);
  return mobile;
}

// ── sessionStorage 캐시 헬퍼 ──
const SS={
  get:(k,fb)=>{try{const v=sessionStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{sessionStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{sessionStorage.removeItem(k);}catch{}},
};

        // diff 체크 (바코드 추가/삭제 + 로케이션 변경)
        const cached=SS.get('bc_db_cache_v2',null);
        if(cached){
          let oldCache={};
          try{
            // SS는 이미 파싱된 객체 반환
            oldCache=Array.isArray(cached)
              ? Object.fromEntries(cached.map(k=>[k,'']))
              : (typeof cached==='object'?cached:{});
          }catch{}
          const oldKeys=new Set(Object.keys(oldCache));
          const newKeys=new Set(newMap.keys());
          const added=[...newKeys].filter(k=>!oldKeys.has(k));
          const removed=[...oldKeys].filter(k=>!newKeys.has(k));
          // 로케이션 변경: 양쪽에 모두 있으나 로케이션이 다른 것
          const locChanged=[...newKeys].filter(k=>oldKeys.has(k)&&(
            (String(newMap.get(k)?.['로케이션']||'').trim())!==(String(oldCache[k]||'').trim())
          )).map(k=>({바코드:k,기존:oldCache[k]||'(없음)',변경:String(newMap.get(k)?.['로케이션']||'').trim()||'(없음)'}));
          if(added.length>0||removed.length>0||locChanged.length>0){
            const addedRows=added.map(bc=>newMap.get(bc)).filter(Boolean);
            const locChangedRows=locChanged.map(({바코드:bc,...rest})=>({...newMap.get(bc),...rest,바코드:bc}));
            setDiffModal({added,removed,addedRows,locChanged,locChangedRows});
          }
        }
        // 캐시를 {바코드: 로케이션} 객체로 저장 (sessionStorage)
        const newCache=Object.fromEntries([...newMap.entries()].map(([k,v])=>[k,String(v['로케이션']||'').trim()]));
        SS.set('bc_db_cache_v2', newCache);
        // 세션 캐시: rows 배열 저장 (Map은 직렬화 불가라 배열로)
        SS.set('bc_db_rows',rows);
        SS.set('bc_db_filename',file.name);
        // bc_db_rows_persist localStorage 저장 제거 (용량 초과 원인) — 세션 내 SS만 유지
        // DB 업데이트 날짜시간 저장 (SS + localStorage)
        const _dbUpdatedAt = new Date().toLocaleString('ko-KR');
        SS.set('bc_db_updated_at', _dbUpdatedAt);
        try{ localStorage.setItem('bc_db_updated_at', _dbUpdatedAt); }catch{}
        // Supabase에도 저장 → 다른 컴퓨터에서 시각 확인 가능
        if(localStorage.getItem('sb_was_loaded')) sbSaveDbUpdatedAt(_dbUpdatedAt).catch(()=>{});
        // 전역 state 갱신 (현재 컴퓨터 즉시 반영)
        if(window._setDbUpdatedAtGlobal) window._setDbUpdatedAtGlobal(_dbUpdatedAt);
        setDb(newMap);
        setDbLoaded(true);
        setDbFileName(file.name);
        // SO_STORE.db 업데이트 → 적재현황(SubUniq) dbLocMapUniq 즉시 반영
        const newDbRows=rows.map(r=>({
          상품코드:String(r['상품코드']||'').trim().toUpperCase(),
          바코드:String(r['바코드']||'').trim().toUpperCase(),
          상품명:String(r['상품명']||'').trim(),
          옵션:String(r['옵션']||'').trim(),
          로케이션:String(r['로케이션']||'').trim(),
          로케이션2:String(r['Unnamed: 5']||'').trim(),
          총B2B접송:Number(r['총 B2B 접+송'])||0,
        })).filter(r=>r.바코드||r.상품코드);
        Object.assign(SO_STORE,{db:newDbRows});
        // Realtime 콜백으로 UI 갱신
        if(_sbRealtimeCallback) _sbRealtimeCallback({...SO_STORE});
        // 송장리스트 초기화 시 단포맵 재계산
        setDanpoMap({});SS.set('bc_danpo_map',{});
        setInvoiceRows([]);SS.set('bc_invoice_rows',[]);
        setDanpoPrintQueue([]);SS.set('bc_danpo_queue',[]);
      }catch(err){alert('DB 업데이트 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  };

  // ── 송장리스트 업로드 (단포합포구분) ──
  const handleInvoiceFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb2=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb2.Sheets[wb2.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        setInvoiceRows(rows);
        // 송장번호 컬럼 자동 감지
        const cols=Object.keys(rows[0]||{});
        const invCol=cols.find(c=>['송장번호','운송장번호','송장','invoice','운송장'].some(k=>c.toLowerCase().includes(k.toLowerCase())))||null;
        // 송장번호 중복 카운트
        const invCount={};
        if(invCol){rows.forEach(r=>{const v=String(r[invCol]||'').trim();if(v)invCount[v]=(invCount[v]||0)+1;});}
        // 단포수량 계산: 송장번호 중복 없음(=1) AND 주문수량=1 인 행만
        const dm={};
        rows.forEach(r=>{
          const bc=String(r['바코드']||'').trim().toUpperCase();
          const qty=Number(r['주문수량']);
          if(!bc||qty!==1)return;
          if(invCol){const inv=String(r[invCol]||'').trim();if(!inv||invCount[inv]!==1)return;}
          dm[bc]=(dm[bc]||0)+1;
        });
        // danpoMap: {barcode→{danpoQty, scanQty}}
        const newDm={};
        Object.entries(dm).forEach(([bc,dq])=>{newDm[bc]={danpoQty:dq,scanQty:0};});
        setDanpoMap(newDm);
        SS.set('bc_danpo_map',newDm);
        setDanpoPrintQueue([]);
        // Broadcast → 다른 컴퓨터에 송장 데이터 공유
        if(_danpoBroadcastChannel){
          _danpoBroadcastChannel.send({
            type:'broadcast', event:'danpo_changed',
            payload:{danpoMap:newDm, invoiceRows:rows, invoiceLabel:`${rows.length}행 | 단포 대상: ${Object.keys(dm).length}개 바코드`}
          }).catch(()=>{});
        }
      }catch(err){alert('송장리스트 로드 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  };

  const handleDefectPrint=()=>{

  const PRINT_TRIGGER='S02337';
  const handleDanpoScan=e=>{
    if(e.key!=='Enter')return;
    const bc=danpoScanInput.trim().toUpperCase();
    setDanpoScanInput('');
    if(!bc)return;
    // 트리거 바코드 → 즉시 일괄출력
    if(bc.toUpperCase()===PRINT_TRIGGER){handleDanpoPrint();return;}
    const _todayDbOk=(db&&(dbLoaded||SS.get('bc_db_updated_at',null)||localStorage.getItem('bc_db_updated_at')))||((SO_STORE.db||[]).length>0);
    if(!_todayDbOk){setDanpoScanMsg({type:'error',msg:'DB를 먼저 업데이트해주세요. (세션이 만료됐거나 업데이트 기록 없음)'});return;}
    // db(엑셀Map) 우선, 없으면 SO_STORE.db(Supabase jaeja_db) 폴백
    let dbRow=db&&db.get(bc);
    if(!dbRow){
      const sbRow=(SO_STORE.db||[]).find(r=>(r.바코드||'').toUpperCase()===bc||(r.상품코드||'').toUpperCase()===bc);
      if(sbRow) dbRow={'바코드':sbRow.바코드||bc,'상품명':sbRow.상품명||'','옵션':sbRow.옵션||'','로케이션':sbRow.로케이션||'','공급처':sbRow.공급처||''};
    }

    const sbRowLoc=(SO_STORE.db||[]).find(r=>(r.바코드||'').toUpperCase()===bc||(r.상품코드||'').toUpperCase()===bc);
    if(sbRowLoc?.로케이션) dbRow={...dbRow,'로케이션':sbRowLoc.로케이션};
    const dm=danpoMap[bc];
    const loc=dbRow['로케이션']||'-';
    if(!dm||dm.danpoQty===0){

  // ── 불량 스캔 ──
  const handleDefectScan=e=>{

                          </div>
                        ))}
                      </React.Fragment>

                        <span style={{fontWeight:700,color:C.muted,flex:1,textDecoration:'line-through'}}>{sup}</span>

                        }} style={{background:'#f1f5f9',color:C.muted,border:`1px solid ${C.border}`,borderRadius:5,padding:'2px 7px',fontSize:12,cursor:'pointer',flexShrink:0,marginLeft:4}}>삭제</button>

                    <div style={{display:'flex',alignItems:'center',gap:8,margin:'10px 0'}}>
                      <div style={{flex:1,height:2,background:`linear-gradient(90deg,${C.border},${C.red}88,${C.border})`,borderRadius:2}}/>

                      <div style={{flex:1,height:2,background:`linear-gradient(90deg,${C.border},${C.red}88,${C.border})`,borderRadius:2}}/>

                {defectQueue.length===0&&Object.keys(savedDefectMap).length===0&&<div style={{color:C.muted,fontSize:14}}>스캔 후 집계됩니다</div>}
                {defectQueue.length===0&&Object.keys(savedDefectMap).length>0&&<div style={{color:C.muted,fontSize:13,textAlign:'center',padding:'8px 0'}}>새 스캔 없음</div>}
                {Object.entries(defectQueue.reduce((acc,it)=>{acc[it['공급처표시']]=(acc[it['공급처표시']]||0)+1;return acc;},{})).sort((a,b)=>b[1]-a[1]).map(([sup,cnt])=>{
                  const isScanned=lastScannedSup===sup;
                  return(
                    <div key={sup} style={{display:'flex',alignItems:'center',gap:6,
                      background:isScanned?'#fef2f2':C.surface,
                      border:`${isScanned?2:1}px solid ${isScanned?C.red:C.border}`,
                      borderRadius:7,padding:'6px 10px',marginBottom:6,fontSize:14,
                      transform:isScanned?'scale(1.03)':'scale(1)',

                      boxShadow:isScanned?`0 0 0 3px ${C.red}22`:'none'}}>
                      <span style={{fontWeight:700,color:isScanned?C.red:C.text,flex:1}}>{sup}</span>

                      <button onClick={()=>{
                        if(!window.confirm(`"${sup}" 항목을 삭제하시겠습니까?`))return;
                        const next=defectQueue.filter(it=>it['공급처표시']!==sup);
                        setDefectQueue(next);
                      }} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}33`,borderRadius:5,padding:'2px 7px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0,marginLeft:4}}>삭제</button>

          {/* 리사이저2 */}
          {!isMobile&&<div onMouseDown={startDefectDrag2} style={{width:6,flexShrink:0,cursor:'col-resize',background:'transparent',borderLeft:`1px solid ${C.border}`,transition:'background .15s',zIndex:10,userSelect:'none'}} onMouseEnter={e=>e.currentTarget.style.background=C.accent+'44'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>}

          {/* 3열: 출력 기록 */}
          <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',padding:isMobile?'0 16px 16px 16px':16,paddingLeft:isMobile?undefined:0,overflow:isMobile?'visible':'hidden'}}>
            <div style={{flex:1,minHeight:isMobile?300:0,display:'flex',flexDirection:'column',background:C.card,border:`1.5px solid ${C.border}`,borderRadius:12,overflow:'hidden',marginLeft:isMobile?0:16}}>
              <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                <input type="checkbox" title="전체선택" checked={defectHistory.length>0&&defectSelRows.size===defectHistory.length} onChange={ev=>{if(ev.target.checked)setDefectSelRows(new Set(defectHistory.map((_,i)=>i)));else setDefectSelRows(new Set());}} style={{cursor:'pointer',width:15,height:15}}/>
                <span style={{fontSize:14,fontWeight:700,color:C.text}}>📁 회수,불량출력기록 ({defectHistory.length})</span>
                <div style={{flex:1}}/>
                {defectSelRows.size>0&&<button onClick={()=>{const selected=defectHistory.filter((_,i)=>defectSelRows.has(i));defectPrintItemsRef.current=selected.map(r=>({...r}));setShowDefectPrint(true);}} style={{background:C.red,color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>🖨️ 선택출력 ({defectSelRows.size})</button>}
                {defectSelRows.size>0&&<button onClick={()=>{if(!window.confirm(`선택한 ${defectSelRows.size}건을 삭제하시겠습니까?`))return;const next=defectHistory.filter((_,i)=>!defectSelRows.has(i));setDefectHistory(next);localStorage.setItem('bc_defect_history',JSON.stringify(next));setDefectSelRows(new Set());}} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,padding:'4px 10px',fontSize:13,cursor:'pointer'}}>선택삭제 ({defectSelRows.size})</button>}
                <button onClick={handleDefectHistoryClear} style={{background:C.redSoft,color:C.red,border:'none',borderRadius:5,padding:'3px 8px',fontSize:12,cursor:'pointer'}}>전체삭제</button>
                <button onClick={handleDefectHistoryDownload} style={{background:C.accentSoft,color:C.accent,border:'none',borderRadius:5,padding:'3px 8px',fontSize:12,fontWeight:700,cursor:'pointer'}}>📥 다운로드</button>
              </div>
              <div style={{flex:1,overflowY:'auto'}}>
                {defectHistory.length===0&&<div style={{padding:16,color:C.muted,fontSize:13}}>기록 없음</div>}
                {(()=>{
                  const groupMap=[];
                  defectHistory.forEach((r,i)=>{
                    const ts=r['출력일시']||'';
                    const last=groupMap[groupMap.length-1];
                    if(!last||last.ts!==ts) groupMap.push({ts,items:[]});
                    groupMap[groupMap.length-1].items.push({row:r,globalIdx:i});
                  });
                  const handleCheck=(globalIdx,ev)=>{
                    ev.stopPropagation();
                    const next=new Set(defectSelRows);
                    if(ev.shiftKey&&defectLastChecked.current>=0){
                      const from=Math.min(defectLastChecked.current,globalIdx);
                      const to=Math.max(defectLastChecked.current,globalIdx);
                      const adding=!next.has(globalIdx);
                      for(let k=from;k<=to;k++) adding?next.add(k):next.delete(k);
                    } else {
                      next.has(globalIdx)?next.delete(globalIdx):next.add(globalIdx);
                    }
                    defectLastChecked.current=globalIdx;
                    setDefectSelRows(next);
                  };
                  return groupMap.map((g,gi)=>{
                    const isOpen=defectOpenGroups.has(gi);
                    const groupIndices=g.items.map(it=>it.globalIdx);
                    const allSel=groupIndices.every(idx=>defectSelRows.has(idx));
                    const someSel=groupIndices.some(idx=>defectSelRows.has(idx));
                    const bgHeader=gi%2===0?'#fdf2f2':'#fff5f5';
                    const handleGroupCheck=ev=>{
                      ev.stopPropagation();
                      const next=new Set(defectSelRows);
                      if(allSel) groupIndices.forEach(idx=>next.delete(idx));
                      else groupIndices.forEach(idx=>next.add(idx));
                      defectLastChecked.current=-1;
                      setDefectSelRows(next);
                    };
                    return(
                      <React.Fragment key={gi}>
                        <div onClick={()=>{const next=new Set(defectOpenGroups);isOpen?next.delete(gi):next.add(gi);setDefectOpenGroups(next);}}

                          <input type="checkbox" checked={allSel} ref={el=>{if(el)el.indeterminate=someSel&&!allSel;}} onChange={handleGroupCheck} onClick={e=>e.stopPropagation()} style={{cursor:'pointer',width:14,height:14,flexShrink:0}}/>
                          <span style={{fontSize:13,color:C.red,transform:isOpen?'rotate(90deg)':'rotate(0deg)',display:'inline-block',transition:'transform .15s',width:14,textAlign:'center',flexShrink:0}}>▶</span>
                          <span style={{fontSize:12,fontWeight:700,color:C.text,flex:1}}>{g.ts||'시간 없음'}</span>
                          <span style={{fontSize:11,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'1px 8px',flexShrink:0}}>{g.items.length}건</span>
                          {someSel&&<span style={{fontSize:11,color:C.red,fontWeight:700,flexShrink:0}}>{groupIndices.filter(idx=>defectSelRows.has(idx)).length}선택</span>}
                        </div>
                        {isOpen&&g.items.map(({row:r,globalIdx},ri)=>(
                          <div key={globalIdx} onClick={e=>handleCheck(globalIdx,e)}
                            style={{display:'flex',alignItems:'center',gap:0,background:defectSelRows.has(globalIdx)?C.accentSoft:ri%2===0?'#ffffff':'#fafafa',borderBottom:`1px solid ${C.border}33`,cursor:'pointer',fontSize:12}}>
                            <div style={{padding:'5px 8px',width:28,flexShrink:0}}>
                              <input type="checkbox" checked={defectSelRows.has(globalIdx)} onChange={()=>{}} onClick={e=>handleCheck(globalIdx,e)} style={{pointerEvents:'none',width:13,height:13}}/>
                            </div>
                            <div style={{padding:'5px 4px',fontFamily:'monospace',fontWeight:700,color:C.text,whiteSpace:'nowrap',minWidth:80}}>{r['바코드']||''}</div>
                            <div style={{padding:'5px 4px',fontWeight:700,color:C.red,whiteSpace:'nowrap',minWidth:70}}>{r['공급처표시']||r['공급처']||''}</div>
                            <div style={{padding:'5px 4px',color:C.muted,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11}}>{r['상품명']||''}</div>
                            <div style={{padding:'5px 4px',color:C.muted,fontSize:11,whiteSpace:'nowrap',minWidth:80,flexShrink:0}}>{r['옵션']||''}</div>
                          </div>
                        ))}
                      </React.Fragment>
                    );
                  });
                })()}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── 대량입고 ── */}
      {subTab==='bulkin'&&(()=>{
        // ── 박스코드 생성 (공급처영어+날짜+일련번호) ──
        function genBoxCode(supplier){
          const sup=(supplier||'BLK').replace(/[^A-Za-z]/g,'').toUpperCase().slice(0,4)||'BLK';
          const pc=bulkInPcId.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,4);
          const d=new Date();
          const date=`${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
          bulkInBoxSeqRef.current=(bulkInBoxSeqRef.current+1)%10000;
          const seq=String(bulkInBoxSeqRef.current).padStart(4,'0');
          // PC식별자 있으면 포함: 공급처+PC+날짜+일련번호
          return pc?`${sup}${pc}${d.getFullYear().toString().slice(2)}${date}${seq}`:`${sup}${d.getFullYear().toString().slice(2)}${date}${seq}`;
        }
        // ── 통합바코드 생성 ──
        function genUnified(boxCode,productCode,qty){return `${boxCode}+${productCode}+${qty}`;}
        // ── 파일 업로드 핸들러 ──
        function handleBulkInFile(e){
          const file=e.target.files[0];if(!file)return;e.target.value='';
          const reader=new FileReader();
          reader.onload=ev=>{
            try{
              const wb2=XLSX.read(ev.target.result,{type:'array'});
              const ws2=wb2.Sheets[wb2.SheetNames[0]];
              const rows=XLSX.utils.sheet_to_json(ws2,{defval:''});
              const newMap={...bulkInMap};
              rows.forEach(r=>{
                const code=String(r['상품코드']||r['바코드']||r['barcode']||'').trim().toUpperCase();
                const req=Number(r['요청수량']||r['수량']||r['qty']||0);
                if(!code) return;
                newMap[code]={reqQty:req||0,scanQty:newMap[code]?.scanQty||0};
              });
              setBulkInMap(newMap);
              setBulkInFile(`${file.name}  |  ${Object.keys(newMap).length}개 상품코드`);
            }catch(err){alert('파일 로드 실패: '+err.message);}
          };
          reader.readAsArrayBuffer(file);
        }
        // ── 스캔 핸들러 ──
        function handleBulkInScan(e){
          if(e.key!=='Enter')return;
          const raw=bulkInScanInput.trim().toUpperCase();
          setBulkInScanInput('');
          if(!raw) return;
          // 파일 없으면 자동 누적
          const entry=bulkInMap[raw]||{reqQty:0,scanQty:0};
          const newScan=entry.scanQty+1;
          const newMap={...bulkInMap,[raw]:{...entry,scanQty:newScan}};
          setBulkInMap(newMap);
          // DB에서 상품정보 조회
          const dbRow=(SO_STORE.db||[]).find(r=>(r.바코드||'').toUpperCase()===raw||(r.상품코드||'').toUpperCase()===raw)
                    ||(db&&db.get(raw));
          const name=dbRow?.상품명||dbRow?.product_name||'';
          const opt=dbRow?.옵션||dbRow?.option||'';
          const loc=dbRow?.로케이션||dbRow?.location||'-';
          // 선택된 공급처 우선, 없으면 DB
          const sup=bulkInSupplier||(dbRow?.공급처||dbRow?.supplier||'');
          // 출력대기에 추가
          const queueItem={바코드:raw,상품코드:raw,상품명:name,옵션:opt,로케이션:loc,공급처:sup,수량:1,_scanAt:Date.now()};
          setBulkInQueue(prev=>[...prev,queueItem]);
          if(entry.reqQty>0&&newScan>=entry.reqQty){
            setBulkInScanMsg({type:'ok',msg:`✅ 완료: ${raw}  [${newScan}/${entry.reqQty}]  ${name}`});
          } else {
            setBulkInScanMsg({type:'warn',msg:`📦 스캔: ${raw}  [${newScan}${entry.reqQty?'/'+entry.reqQty:''}]  ${name}`});
          }
        }
        // ── 일괄출력 (통합바코드 생성) ──
        function handleBulkInPrint(){
          if(!bulkInQueue.length){alert('출력할 항목이 없습니다.');return;}
          // 같은 상품코드 합산
          const merged={};
          bulkInQueue.forEach(it=>{
            const k=it.상품코드;
            if(!merged[k]) merged[k]={...it,수량:0};
            merged[k].수량+=it.수량;
          });
          const nowStr=new Date().toLocaleString('ko-KR');
          const printItems=Object.values(merged).map(it=>{
            const boxCode=genBoxCode(it.공급처||it.상품코드.slice(0,4));
            const unified=genUnified(boxCode,it.상품코드,it.수량);
            return {...it,박스코드:boxCode,통합바코드:unified,출력일시:nowStr};
          });
          bulkInPrintItemsRef.current=printItems;
          setShowBulkInPrint(true);
          // 출력기록에 추가
          setBulkInHistory(prev=>[...prev,...printItems]);
          setBulkInQueue([]);
        }
        // ── 엑셀 다운로드 ──
        function handleBulkInExcel(targets){
          if(!targets||!targets.length){alert('다운로드할 항목이 없습니다.');return;}
          const rows=targets.map(r=>({통합바코드:r.통합바코드||'',상품코드:r.상품코드||r.바코드||'',요청수량:r.요청수량||r.reqQty||0,입고수량:r.입고수량||r.수량||0,상품명:r.상품명||'',옵션:r.옵션||'',로케이션:r.로케이션||'',출력일시:r.출력일시||''}));
          const wb2=XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb2,XLSX.utils.json_to_sheet(rows),'대량입고');
          XLSX.writeFile(wb2,`대량입고_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')+'.xlsx'}`);
        }
        // ── 출력기록 그룹 ──
        const histFlat=bulkInHistory.map((r,i)=>({...r,_gi:i}));
        const histGroups=(()=>{
          const gm=[];
          bulkInHistory.forEach((r,i)=>{
            const ts=r['출력일시']||'';
            const last=gm[gm.length-1];
            if(!last||last.ts!==ts) gm.push({ts,items:[]});
            gm[gm.length-1].items.push({row:r,gi:i});
          });
          return gm;
        })();
        const allEntries=Object.entries(bulkInMap);
        return(
          <div ref={bulkInContRef} style={{flex:1,minHeight:0,display:'flex',overflow:'hidden'}}>
            {/* 1열: 파일업로드 + 스캔 + 출력대기 */}
            <div style={{flex:`0 0 ${bulkInSplit1}%`,minHeight:0,display:'flex',flexDirection:'column',gap:12,padding:16,overflowY:'auto'}}>
              {/* PC 식별자 설정 */}
              <div style={{background:bulkInPcId?C.greenSoft:C.orangeSoft,border:`1.5px solid ${bulkInPcId?C.green:C.orange}`,borderRadius:10,padding:'10px 14px',flexShrink:0,display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:13,fontWeight:700,color:bulkInPcId?C.green:C.orange,flexShrink:0}}>🖥 PC 식별자</span>
                {!bulkInPcEditOpen?(
                  <>
                    <span style={{fontSize:16,fontWeight:900,fontFamily:'monospace',color:bulkInPcId?C.green:'#b45309',flex:1,letterSpacing:'2px'}}>
                      {bulkInPcId||'⚠️ 미설정 — 박스코드 중복 가능'}
                    </span>
                    <button onClick={()=>{setBulkInPcInput(bulkInPcId);setBulkInPcEditOpen(true);}}
                      style={{background:'#fff',border:`1px solid ${bulkInPcId?C.green:C.orange}`,borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:700,cursor:'pointer',color:bulkInPcId?C.green:C.orange,flexShrink:0}}>
                      {bulkInPcId?'변경':'설정'}
                    </button>
                  </>
                ):(
                  <>
                    <input value={bulkInPcInput} onChange={e=>setBulkInPcInput(e.target.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,4))}
                      onKeyDown={e=>{if(e.key==='Enter'){if(!bulkInPcInput.trim()){alert('식별자를 입력하세요.');return;}setBulkInPcId(bulkInPcInput.trim());setBulkInPcEditOpen(false);}if(e.key==='Escape')setBulkInPcEditOpen(false);}}
                      placeholder='A~Z,0~9 최대4자' maxLength={4}
                      autoFocus
                      style={{flex:1,background:'#fff',border:`1.5px solid ${C.green}`,borderRadius:6,padding:'4px 8px',fontSize:16,fontWeight:900,fontFamily:'monospace',letterSpacing:'2px',outline:'none',textTransform:'uppercase'}}/>
                    <button onClick={()=>{if(!bulkInPcInput.trim()){alert('식별자를 입력하세요.');return;}setBulkInPcId(bulkInPcInput.trim());setBulkInPcEditOpen(false);}}
                      style={{background:C.green,color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>저장</button>
                    <button onClick={()=>setBulkInPcEditOpen(false)}
                      style={{background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:6,padding:'4px 8px',fontSize:12,cursor:'pointer',flexShrink:0}}>취소</button>
                  </>
                )}
              </div>

              {/* 파일 업로드 */}
              <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'12px 16px',flexShrink:0}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                  <span style={{fontSize:14,fontWeight:700,color:C.text}}>📂 파일 업로드 (선택)</span>
                  <span style={{fontSize:11,color:C.muted}}>없으면 스캔 누적</span>
                </div>
                <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{bulkInFile||'상품코드 / 요청수량 컬럼 — 업로드 없이 스캔만 해도 됩니다'}</div>
                <div style={{display:'flex',gap:8}}>
                  <label style={{background:bulkInFile?C.greenSoft:C.accentSoft,color:bulkInFile?C.green:C.accent,border:`1.5px solid ${bulkInFile?C.green:C.accent}`,borderRadius:7,padding:'5px 12px',fontSize:13,fontWeight:700,cursor:'pointer',display:'inline-block'}}>
                    {bulkInFile?'🔄 재업로드':'📋 업로드'}

            <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',padding:'16px 16px 16px 12px',overflow:'hidden'}}>

                    let globalIdx=0;

                      const isOpen=bulkInOpenGroups.has(gi);
                      const groupStart=globalIdx;
                      const groupIndices=g.items.map((_,k)=>groupStart+k);
                      globalIdx+=g.items.length;
                      const allSel=groupIndices.every(i=>bulkInSelRows.has(i));
                      const someSel=groupIndices.some(i=>bulkInSelRows.has(i));
                      const bgH=gi%2===0?'#f0f7ff':'#f7f0ff';
                      const handleGroupCheck=ev=>{
                        ev.stopPropagation();
                        const next=new Set(bulkInSelRows);
                        if(allSel) groupIndices.forEach(i=>next.delete(i));
                        else groupIndices.forEach(i=>next.add(i));
                        bulkInLastChecked.current=-1;
                        setBulkInSelRows(next);
                      };
                      return(
                        <React.Fragment key={gi}>
                          <div onClick={()=>{const next=new Set(bulkInOpenGroups);isOpen?next.delete(gi):next.add(gi);setBulkInOpenGroups(next);}}

                            <input type='checkbox' checked={allSel} ref={el=>{if(el)el.indeterminate=someSel&&!allSel;}}

                            <span style={{fontSize:12,fontWeight:700,color:C.text,flex:1}}>{g.ts||'시간 없음'}</span>
                            <span style={{fontSize:11,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'1px 8px',flexShrink:0}}>{g.items.length}건</span>
                            {someSel&&<span style={{fontSize:11,color:C.accent,fontWeight:700,flexShrink:0}}>{groupIndices.filter(i=>bulkInSelRows.has(i)).length}선택</span>}
                            <button onClick={ev=>{ev.stopPropagation();handleBulkInExcel(g.items.map(({row:r})=>r));}}
                              style={{background:C.accentSoft,color:C.accent,border:`1px solid ${C.accent}33`,borderRadius:5,padding:'2px 7px',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>📥</button>
                            <button onClick={ev=>{ev.stopPropagation();if(!window.confirm(`이 묶음(${g.items.length}건)을 삭제하시겠습니까?`))return;const del=new Set(groupIndices);setBulkInHistory(prev=>prev.filter((_,i)=>!del.has(i)));setBulkInSelRows(new Set());}}
                              style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}33`,borderRadius:5,padding:'2px 7px',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>삭제</button>
                          </div>
                          {isOpen&&g.items.map(({row:r,gi:rowGi},ri)=>{
                            const gIdx=groupStart+ri;
                            const handleCheck=ev=>{
                              ev.stopPropagation();
                              const next=new Set(bulkInSelRows);
                              if(ev.shiftKey&&bulkInLastChecked.current>=0){
                                const from=Math.min(bulkInLastChecked.current,gIdx);
                                const to=Math.max(bulkInLastChecked.current,gIdx);
                                const adding=!next.has(gIdx);
                                for(let k=from;k<=to;k++) adding?next.add(k):next.delete(k);
                              } else {next.has(gIdx)?next.delete(gIdx):next.add(gIdx);}
                              bulkInLastChecked.current=gIdx;
                              setBulkInSelRows(next);
                            };
                            return(
                              <div key={rowGi} onClick={handleCheck}
                                style={{display:'flex',alignItems:'center',gap:0,background:bulkInSelRows.has(gIdx)?C.accentSoft:ri%2===0?'#fff':'#fafafa',borderBottom:`1px solid ${C.border}33`,cursor:'pointer',fontSize:12}}>
                                <div style={{padding:'5px 8px',width:28,flexShrink:0}}>
                                  <input type='checkbox' checked={bulkInSelRows.has(gIdx)} onChange={()=>{}} onClick={handleCheck} style={{pointerEvents:'none',width:13,height:13}}/>
                                </div>
                                <div style={{padding:'4px',fontFamily:'monospace',fontSize:10,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',minWidth:120,maxWidth:160,flexShrink:0}}>{r.통합바코드||''}</div>
                                <div style={{padding:'4px 6px',fontFamily:'monospace',fontWeight:700,color:C.text,whiteSpace:'nowrap',minWidth:70}}>{r.상품코드||r.바코드}</div>

                                <div style={{padding:'4px 6px',color:C.muted,fontSize:10,whiteSpace:'nowrap',flexShrink:0}}>{r.출력일시||''}</div>
                              </div>
                            );
                          })}
                        </React.Fragment>
                      );
                    });
                  })()}

            </div>
          </div>
        );

        <DbDiffModal
          added={diffModal.added||[]}
          removed={diffModal.removed||[]}

          locChangedRows={diffModal.locChangedRows||[]}
          onDownload={()=>{
            const rows=[
              ...(diffModal.added||[]).map(b=>({구분:'추가',바코드:b,기존로케이션:'',변경로케이션:''})),
              ...(diffModal.removed||[]).map(b=>({구분:'삭제',바코드:b,기존로케이션:'',변경로케이션:''})),
              ...(diffModal.locChanged||[]).map(r=>({구분:'로케이션변경',바코드:r.바코드,기존로케이션:r.기존,변경로케이션:r.변경})),
            ];
            downloadXlsx(rows,['구분','바코드','기존로케이션','변경로케이션'],`DB변경_${fmtDate()}.xlsx`);
          }}
          onClose={()=>setDiffModal(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SapPage/>);
</script>
</body>
</html>
