            <div/>{['상품위치','상품코드(바코드)','박스코드','수량','상품명','옵션','로케이션'].map(h=><div key={h}>{h}</div>)}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {!activeResults.length&&(
              <div style={{padding:24,textAlign:'center',color:C.muted,fontSize:15}}>
                {inputTab==='row'?'좌측 행에 바코드를 입력하면 즉시 표시됩니다':'바코드를 입력하고 검색 버튼을 누르세요'}
              </div>
            )}
            <ResultRows results={activeResults} ck={activeCk} setCk={setActiveCk}/>
          </div>
        </div>

      </div>
    </div>
  );
}

// ── ⑤ 입고 ──
function SubIpgo({store,onJaejaUpdate}){
  const[input,setInput]=useState('');
  // 월별 기록: {yearMonth: [{id,박스코드,상품코드,수량,위치,상품명,적재여부,ts}]}
  const[monthly,setMonthly]=useState(()=>{try{const d=localStorage.getItem('ipgo_monthly_v2');return d?JSON.parse(d):{};}catch{return {};}});
  const[collapsed,setCollapsed]=useState({});
  const[selIpgo,setSelIpgo]=useState(new Set());
  const[openIpgo,setOpenIpgo]=useState(new Set());
  const ipgoLastChecked=useRef(-1);
  const[pending,setPending]=useState(()=>{try{const d=localStorage.getItem('ipgo_pending');return d?JSON.parse(d):[];}catch{return [];}});
  const[confirmModal2,setConfirmModal2]=useState(null);
  const[gdStatus,setGdStatus]=useState('');
  const[ipgoScanMsg,setIpgoScanMsg]=useState(null);
  const[ipgoMoveTo,setIpgoMoveTo]=useState(()=>SS.get('ipgo_moveTo')||'');
  const xlsxRef2=useRef();

  useEffect(()=>{SS.set('ipgo_moveTo',ipgoMoveTo);},[ipgoMoveTo]);

  useEffect(()=>{try{localStorage.setItem('ipgo_monthly_v2',JSON.stringify(monthly));}catch{}},[monthly]);
  useEffect(()=>{try{localStorage.setItem('ipgo_pending',JSON.stringify(pending));}catch{}},[pending]);

  function getYM(ts){const d=new Date(ts);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
  function fmtYM(ym){const[y,m]=ym.split('-');return `${y}년 ${Number(m)}월`;}

  function addItem(raw, xlsxPos=''){
    let p=parseUnifiedBarcode(raw);
    // ── SMZ 소량존: 통합바코드 형식 아니면 상품코드 단독 스캔으로 처리 ──
    // 박스코드 = SMZ + 8자리 타임스탬프, 수량 = 1 고정
    if(!p){
      const code=raw.trim().toUpperCase();
      if(!code){ setIpgoScanMsg({type:'error',msg:'❌ 입력값이 없습니다.'}); return; }
      const smzBox='SMZ'+Date.now().toString().slice(-8);
      p={박스코드:smzBox, 상품코드:code, 수량:1, raw};
      setIpgoScanMsg({type:'ok',msg:`📦 SMZ 소량존: ${smzBox} ← 상품코드 ${code} (1족)`});
    }

    // ── 검증 1: 수량 0 이하 차단
    if(!p.수량||p.수량<=0){
      setIpgoScanMsg({type:'error',msg:`❌ 수량 오류: "${raw}" — 수량이 0입니다 (형식: 박스코드+상품코드+수량)`});
      return;
    }
    // ── 검증 2: 박스코드 최소 길이
    if(!p.박스코드||p.박스코드.length<3){
      setIpgoScanMsg({type:'error',msg:`❌ 박스코드 오류: "${p.박스코드}" — 너무 짧거나 누락됨`});
      return;
    }
    // ── 검증 3: 대기목록 내 중복 차단
    if(pending.find(r=>r.박스코드===p.박스코드)){
      setIpgoScanMsg({type:'error',msg:`❌ 대기 중복: ${p.박스코드} — 이미 대기 목록에 있습니다`});
      return;
    }
    const dr=(store.db||[]).find(r=>r.상품코드===p.상품코드||r.바코드===p.상품코드);
    const jr=(store.jaeja||[]).find(r=>r.박스코드===p.박스코드);
    // ── 검증 4: 이미 적재된 박스 → 경고(차단 안 함)
    if(jr){
      setIpgoScanMsg({type:'warn',msg:`⚠️ 이미 적재됨: ${p.박스코드} — 중복 입고입니다. 확인 후 진행하세요`});
    } else {
      setIpgoScanMsg({type:'ok',msg:`✅ 입고 대기: ${p.박스코드}  수량:${p.수량}  ${dr?.상품명||''}`});
    }
    const 적재여부=jr?'⚠️ 중복입고':'신규';
    const _ipgoLoc=dr?.로케이션||jr?.로케이션||'';
    setPending(prev=>[...prev,{id:Date.now(),raw,박스코드:p.박스코드,상품코드:p.상품코드,수량:p.수량,
      위치:xlsxPos||ipgoMoveTo||jr?.상품위치||'',로케이션:_ipgoLoc,상품명:dr?.상품명||jr?.상품명||'',옵션명:dr?.옵션||jr?.옵션명||'',적재여부,ts:Date.now()}]);
  }
  function handleEnter(e){
    if(e.key!=='Enter')return;
    const raw=input.trim();if(!raw){setInput('');return;}
    addItem(raw);setInput('');
  }
  function handleXlsxIpgo(e){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        XLSX.utils.sheet_to_json(ws,{defval:''}).forEach(r=>{
          const raw=String(r['통합바코드']||r['바코드']||r[Object.keys(r)[0]]||'').trim();
          const pos=String(r['상품위치']||r['위치']||r['적재위치']||'').trim().toUpperCase();
          if(raw) addItem(raw, pos);
        });
      }catch(err){alert('파싱 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function doInbound(){
    if(!pending.length){alert('입고할 항목이 없습니다.');return;}
    setConfirmModal2({
      msg:`대기 중인 ${pending.length}개 항목을 입고 처리하시겠습니까?\n적재현황에 추가됩니다.`,
      onOk:async()=>{
        setConfirmModal2(null);
        // ── 동시성 잠금 ──
        await withLock('입고', async()=>{
          const now=Date.now();
          const ym=getYM(now);
          const newItems=pending.map(r=>({...r,ts:now}));
          setMonthly(prev=>{const updated={...prev};updated[ym]=[...(updated[ym]||[]),...newItems];return updated;});
          const addedJaeja=newItems.map(r=>({
            박스코드:r.박스코드,바코드:r.상품코드,수량:r.수량,상품위치:r.위치,
            상품명:r.상품명,옵션명:r.옵션명||'',로케이션:r.로케이션||'',출고여부:'',
          }));
          const nowStr2=new Date().toLocaleString('ko-KR');
          const newInLogs=addedJaeja.map(r=>({
            박스코드:r.박스코드, 바코드:r.바코드||'', 수량:r.수량||0,
            위치:r.상품위치||'', 상품명:r.상품명||'', 옵션:r.옵션명||'',
            작업일시:nowStr2, 입출고:'입고',
          }));
          await sbInbound(addedJaeja, newInLogs);
          const newJaeja=[...(store.jaeja||[]),...addedJaeja];
          const newInoutLog2=[...(SO_STORE.inoutLog||[]),...newInLogs];
          Object.assign(SO_STORE,{jaeja:newJaeja,inoutLog:newInoutLog2});saveSoStore();
          if(onJaejaUpdate) onJaejaUpdate(newJaeja);
          setPending([]);
          alert(`✅ 입고 완료: ${newItems.length}개 박스가 적재현황에 추가되었습니다.`);
        }, msg=>alert(msg));
      }
    });
  }

  function deleteMonthItem(ym,id){
    setConfirmModal2({msg:'이 항목을 삭제하시겠습니까?',onOk:()=>{
      setMonthly(prev=>{const u={...prev};u[ym]=(u[ym]||[]).filter(r=>r.id!==id);if(!u[ym].length)delete u[ym];return u;});
      setConfirmModal2(null);
    }});
  }
  function clearPending(){
    setConfirmModal2({msg:`대기 목록 ${pending.length}개를 초기화하시겠습니까?`,onOk:()=>{setPending([]);setConfirmModal2(null);}});
  }
  function clearMonth(ym){
    setConfirmModal2({msg:`${fmtYM(ym)} 기록 전체를 삭제하시겠습니까?`,onOk:()=>{
      setMonthly(prev=>{const u={...prev};delete u[ym];return u;});setConfirmModal2(null);
    }});
  }

  // Google Drive 저장
  async function saveToGDrive(){
    setGdStatus('구글 로그인 중…');
    try{
      await new Promise((res,rej)=>gapi.load('client',{callback:res,onerror:rej}));
      await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
      const tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:'20703194395-ptr0aane1q29hmfdl15tqdbpt3uclh84.apps.googleusercontent.com',scope:'https://www.googleapis.com/auth/drive.file',
        callback:async(resp)=>{
          if(resp.error){setGdStatus('❌ 로그인 실패');return;}
          setGdStatus('파일 저장 중…');
          const wb=XLSX.utils.book_new();
          const allRows=Object.entries(monthly).flatMap(([ym,rows])=>rows.map(r=>({월:fmtYM(ym),...r})));
          XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(allRows),'입고기록');
          const buf=XLSX.write(wb,{type:'array',bookType:'xlsx'});
          const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
          const folderId='1RADyAAVY2SyUN-pCjhvaycqZl211N_tJ';
          const meta={name:`입고기록_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}`,parents:[folderId]};
          const form=new FormData();
          form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
          form.append('file',blob);
          const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${gapi.client.getToken().access_token}`},body:form});
          if(r.ok){setGdStatus('✅ Google Drive 저장 완료!');}else{setGdStatus('❌ 저장 실패');}
          setTimeout(()=>setGdStatus(''),3000);
        }
      });
      tokenClient.requestAccessToken();
    }catch(e){setGdStatus('❌ 오류: '+e.message);setTimeout(()=>setGdStatus(''),3000);}
  }

  const sortedMonths=Object.keys(monthly).sort((a,b)=>b.localeCompare(a));
  const totalBox=pending.length;
  const totalQty=pending.reduce((a,r)=>a+(Number(r.수량)||0),0);

  return(
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',padding:16,gap:10,overflow:'auto'}}>
      {confirmModal2&&<ConfirmModal msg={confirmModal2.msg} onOk={confirmModal2.onOk} onCancel={()=>setConfirmModal2(null)}/>}

      {/* 입력 패널 */}
      <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
          <span style={{fontSize:15,fontWeight:700,color:C.text}}>📥 입고 — 통합바코드 스캔</span>
          <span style={{fontSize:13,color:C.muted}}>박스코드+상품코드+수량</span>
          <div style={{flex:1}}/>
          {gdStatus&&<span style={{fontSize:13,color:C.muted}}>{gdStatus}</span>}
          <button onClick={saveToGDrive} style={{background:C.surface,color:'#2563eb',border:'1px solid #2563eb44',borderRadius:7,padding:'4px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>📁 Drive 저장</button>
          <label style={{background:C.surface,color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:7,padding:'4px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
            📂 엑셀 업로드<input ref={xlsxRef2} type='file' accept='.xlsx,.xls,.xlsm' onChange={handleXlsxIpgo} style={{display:'none'}}/>
          </label>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:6}}>
          <input value={ipgoMoveTo} onChange={e=>setIpgoMoveTo(e.target.value.toUpperCase())}
            placeholder='이동위치 (예: A-1-2-3)'
            style={{width:170,background:C.bg,border:`1.5px solid ${C.accent}`,borderRadius:7,padding:'8px 11px',fontSize:15,color:C.text,outline:'none',flexShrink:0}}/>

        {ipgoScanMsg&&(
          <div style={{marginBottom:8,padding:'7px 12px',borderRadius:7,fontSize:14,fontWeight:600,
            background:ipgoScanMsg.type==='ok'?C.greenSoft:ipgoScanMsg.type==='warn'?C.orangeSoft:C.redSoft,
            color:ipgoScanMsg.type==='ok'?C.green:ipgoScanMsg.type==='warn'?C.orange:C.red}}>

        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:14,color:C.muted}}>대기: 박스 <b style={{color:C.accent}}>{totalBox}</b> | 수량 <b style={{color:C.green}}>{totalQty}</b></span>
          <div style={{flex:1}}/>
          {pending.length>0&&<>
            <button onClick={doInbound} style={{background:C.green,color:'#fff',border:'none',borderRadius:7,padding:'5px 14px',fontSize:14,fontWeight:700,cursor:'pointer'}}>✅ 입고 처리</button>
            {pending.some(r=>r.박스코드&&r.박스코드.startsWith('SMZ'))&&(
              <button onClick={()=>printSMZBarcodes(pending.filter(r=>r.박스코드&&r.박스코드.startsWith('SMZ')))}
                style={{background:C.orangeSoft,color:C.orange,border:`1px solid ${C.orange}44`,borderRadius:7,padding:'5px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                🖨 SMZ 바코드 출력
              </button>
            )}
            <button onClick={clearPending} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}44`,borderRadius:7,padding:'5px 10px',fontSize:13,cursor:'pointer'}}>초기화</button>
          </>}
        </div>
        {/* 대기 목록 */}
        {pending.length>0&&(
          <div style={{marginTop:8,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'135px 125px 50px 125px 1fr 1fr 95px',padding:'5px 10px',background:C.surface,fontSize:13,fontWeight:700,color:C.muted}}>
              {['박스코드','상품코드','수량','위치','상품명','옵션명','적재여부'].map(h=><div key={h}>{h}</div>)}
            </div>
            <div style={{maxHeight:180,overflowY:'auto'}}>
              {pending.map((r,i)=>(
                <div key={r.id} style={{display:'grid',gridTemplateColumns:'135px 125px 50px 125px 1fr 1fr 95px',padding:'5px 10px',borderTop:`1px solid ${C.border}33`,background:i%2?C.bg:'transparent',fontSize:14,alignItems:'center'}}>
                  <div style={{fontFamily:'monospace',fontWeight:700}}>{r.박스코드}</div>
                  <div style={{fontFamily:'monospace',color:C.accent}}>{r.상품코드}</div>
                  <div style={{fontWeight:700}}>{r.수량}</div>
                  <div style={{fontSize:13,color:C.muted}}>{r.위치}</div>
                  <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.상품명}</div>
                  <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:C.muted}}>{r.옵션명||''}</div>
                  <div style={{textAlign:'center'}}>
                    <span style={{background:r.적재여부.includes('❌')?C.redSoft:C.greenSoft,color:r.적재여부.includes('❌')?C.red:C.green,borderRadius:5,padding:'2px 5px',fontSize:12,fontWeight:700}}>{r.적재여부}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 입고 기록 - 단포출력기록 형태 */}
      {(()=>{
        const allFlat=sortedMonths.flatMap(ym=>(monthly[ym]||[]).map((r,ri)=>({...r,_ym:ym,_ri:ri})));
        const handleIpgoCheck=(globalIdx,e)=>{
          e.stopPropagation();
          const next=new Set(selIpgo);
          if(e.shiftKey&&ipgoLastChecked.current>=0){
            const from=Math.min(ipgoLastChecked.current,globalIdx);
            const to=Math.max(ipgoLastChecked.current,globalIdx);
            const adding=!next.has(globalIdx);
            for(let k=from;k<=to;k++) adding?next.add(k):next.delete(k);
          } else {
            next.has(globalIdx)?next.delete(globalIdx):next.add(globalIdx);
          }
          ipgoLastChecked.current=globalIdx;
          setSelIpgo(next);
        };
        const deleteSelIpgo=()=>{
          if(!selIpgo.size) return;
          setConfirmModal2({msg:`선택한 ${selIpgo.size}개 항목을 삭제하시겠습니까?`,onOk:()=>{
            const delIds=new Set([...selIpgo].map(i=>allFlat[i]?.id).filter(Boolean));
            setMonthly(prev=>{
              const u={...prev};
              Object.keys(u).forEach(ym=>{u[ym]=(u[ym]||[]).filter(r=>!delIds.has(r.id));if(!u[ym].length)delete u[ym];});

            setSelIpgo(new Set());
            setConfirmModal2(null);
          }});
        };
        const doIpgoInbound=(targets)=>{
          if(!targets||!targets.length){alert('입고할 항목이 없습니다.');return;}
          setConfirmModal2({msg:`선택한 ${targets.length}개를 입고 처리하시겠습니까?\n적재현황에 추가됩니다.`,onOk:async()=>{
            setConfirmModal2(null);
            await withLock('기록재입고', async()=>{
              const addedJaeja=targets.map(r=>({
                박스코드:r.박스코드,바코드:r.상품코드,수량:r.수량,상품위치:r.위치,
                상품명:r.상품명,옵션명:r.옵션명||'',로케이션:'',출고여부:'',
              }));
              const nowStr2=new Date().toLocaleString('ko-KR');
              const newInLogs=addedJaeja.map(r=>({
                박스코드:r.박스코드,바코드:r.바코드||'',수량:r.수량||0,
                위치:r.상품위치||'',상품명:r.상품명||'',옵션:r.옵션명||'',
                작업일시:nowStr2,입출고:'입고',
              }));
              await sbInbound(addedJaeja, newInLogs);
              const newJaeja=[...(SO_STORE.jaeja||[]),...addedJaeja];
              const newInoutLog2=[...(SO_STORE.inoutLog||[]),...newInLogs];
              Object.assign(SO_STORE,{jaeja:newJaeja,inoutLog:newInoutLog2});saveSoStore();
              if(onJaejaUpdate) onJaejaUpdate(newJaeja);
              alert(`✅ 재입고 완료: ${targets.length}개 박스가 적재현황에 추가되었습니다.`);
            }, msg=>alert(msg));
          }});
        };
        return(
          <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',flexShrink:0}}>
            <div style={{padding:'7px 12px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',background:C.surface}}>
              <input type='checkbox' title='전체선택'
                checked={allFlat.length>0&&selIpgo.size===allFlat.length}
                onChange={ev=>{if(ev.target.checked)setSelIpgo(new Set(allFlat.map((_,i)=>i)));else setSelIpgo(new Set());}}
                style={{cursor:'pointer',width:15,height:15}}/>
              <span style={{fontSize:15,fontWeight:700,color:C.text}}>📋 입고 기록 ({allFlat.length})</span>
              <div style={{flex:1}}/>
              {selIpgo.size>0&&<>
                <span style={{fontSize:13,color:C.muted}}>{selIpgo.size}개 선택</span>
                <button onClick={deleteSelIpgo} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,padding:'4px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>🗑 선택삭제</button>
                <button onClick={()=>doIpgoInbound([...selIpgo].map(i=>allFlat[i]).filter(Boolean))}
                  style={{background:C.green,color:'#fff',border:'none',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:700,cursor:'pointer'}}>📥 선택입고</button>
              </>}
              {allFlat.length>0&&<span style={{fontSize:12,color:C.muted}}>총 {sortedMonths.length}개월</span>}
            </div>
            <div style={{overflowY:'auto',maxHeight:500}}>
              {!allFlat.length&&<div style={{padding:24,textAlign:'center',color:C.muted,fontSize:15}}>입고 처리 후 여기에 기록이 표시됩니다</div>}
              {(()=>{
                let gi=0; let globalIdx=0;
                return sortedMonths.map(ym=>{
                  const rows=monthly[ym]||[];
                  const isOpen=openIpgo.has(ym);
                  const mQty=rows.reduce((a,r)=>a+(Number(r.수량)||0),0);
                  const groupStart=globalIdx;
                  const groupIndices=rows.map((_,k)=>groupStart+k);
                  globalIdx+=rows.length;
                  const allSel=groupIndices.every(i=>selIpgo.has(i));
                  const someSel=groupIndices.some(i=>selIpgo.has(i));
                  const bgH=(gi++)%2===0?'#f0fff4':'#f0f7ff';
                  const handleGroupCheck=ev=>{
                    ev.stopPropagation();
                    const next=new Set(selIpgo);
                    if(allSel) groupIndices.forEach(i=>next.delete(i));
                    else groupIndices.forEach(i=>next.add(i));
                    ipgoLastChecked.current=-1;
                    setSelIpgo(next);
                  };
                  return(
                    <React.Fragment key={ym}>
                      <div onClick={()=>{const next=new Set(openIpgo);isOpen?next.delete(ym):next.add(ym);setOpenIpgo(next);}}
                        style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',background:bgH,borderBottom:`1px solid ${C.border}66`,cursor:'pointer',userSelect:'none',position:'sticky',top:0,zIndex:1}}>
                        <input type='checkbox' checked={allSel} ref={el=>{if(el)el.indeterminate=someSel&&!allSel;}}
                          onChange={handleGroupCheck} onClick={e=>e.stopPropagation()}
                          style={{cursor:'pointer',width:14,height:14,flexShrink:0}}/>
                        <span style={{fontSize:13,color:C.green,transform:isOpen?'rotate(90deg)':'rotate(0deg)',display:'inline-block',transition:'transform .15s',width:14,textAlign:'center',flexShrink:0}}>▶</span>
                        <span style={{fontSize:13,fontWeight:700,color:C.text,flex:1}}>{fmtYM(ym)}</span>
                        <span style={{fontSize:11,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'1px 8px',flexShrink:0}}>{rows.length}박스 / {mQty}족</span>
                        {someSel&&<span style={{fontSize:11,color:C.green,fontWeight:700,flexShrink:0}}>{groupIndices.filter(i=>selIpgo.has(i)).length}선택</span>}
                        <button onClick={e=>{e.stopPropagation();doIpgoInbound(rows);}}
                          style={{background:C.green,color:'#fff',border:'none',borderRadius:5,padding:'2px 8px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>입고</button>
                        <button onClick={e=>{e.stopPropagation();clearMonth(ym);}}
                          style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}33`,borderRadius:5,padding:'2px 7px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>삭제</button>
                      </div>
                      {isOpen&&rows.map((r,ri)=>{
                        const gIdx=groupStart+ri;
                        return(
                          <div key={r.id} onClick={e=>handleIpgoCheck(gIdx,e)}
                            style={{display:'flex',alignItems:'center',gap:0,background:selIpgo.has(gIdx)?C.accentSoft:ri%2===0?'#ffffff':'#fafafa',borderBottom:`1px solid ${C.border}33`,cursor:'pointer',fontSize:12}}>
                            <div style={{padding:'5px 8px',width:28,flexShrink:0}}>
                              <input type='checkbox' checked={selIpgo.has(gIdx)} onChange={()=>{}} onClick={e=>handleIpgoCheck(gIdx,e)} style={{pointerEvents:'none',width:13,height:13}}/>
                            </div>
                            <div style={{padding:'5px 4px',color:C.muted,fontSize:11,whiteSpace:'nowrap',minWidth:110}}>{new Date(r.ts).toLocaleString('ko-KR')}</div>
                            <div style={{padding:'5px 4px',fontFamily:'monospace',fontWeight:700,color:C.text,whiteSpace:'nowrap',minWidth:110}}>{r.박스코드}</div>
                            <div style={{padding:'5px 4px',fontFamily:'monospace',color:C.accent,whiteSpace:'nowrap',minWidth:90}}>{r.상품코드}</div>
                            <div style={{padding:'5px 4px',fontWeight:700,minWidth:32,textAlign:'right'}}>{r.수량}</div>
                            <div style={{padding:'5px 4px',color:C.muted,fontSize:11,whiteSpace:'nowrap',minWidth:80}}>{r.위치}</div>
                            <div style={{padding:'5px 4px',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.상품명}</div>
                            <div style={{padding:'5px 4px',color:C.muted,fontSize:11,whiteSpace:'nowrap',minWidth:70,flexShrink:0}}>{r.옵션명||''}</div>
                            <div style={{padding:'5px 6px',flexShrink:0}}>
                              <span style={{background:r.적재여부&&r.적재여부.includes('❌')?C.redSoft:C.greenSoft,color:r.적재여부&&r.적재여부.includes('❌')?C.red:C.green,borderRadius:4,padding:'1px 5px',fontSize:11,fontWeight:700}}>
                                {r.적재여부||'입고'}
                              </span>
                            </div>
                            <button onClick={e=>{e.stopPropagation();deleteMonthItem(ym,r.id);}} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:14,padding:'5px 6px',flexShrink:0}}>✕</button>
                          </div>
                        );
                      })}
                    </React.Fragment>
                  );
                });
              })()}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── ⑥ 위치변경 ──
function SubLocChg({store,onJaejaUpdate,onLocLogUpdate}){
  const[input,setInput]=useState('');
  const[moveTo,setMoveTo]=useState(()=>SS.get('locchg_moveTo')||'');
  const[list,setList]=useState(()=>SS.get('locchg_list')||[]);
  const inputRef=useRef();
  const xlsxLocRef=useRef();

  useEffect(()=>{SS.set('locchg_moveTo',moveTo);},[moveTo]);
  useEffect(()=>{SS.set('locchg_list',list);},[list]);

  function handleLocXlsx(e){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',codepage:949});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        const newItems=[];
        rows.forEach(r=>{
          // 박스코드 or 통합바코드 컬럼 허용
          const rawCode=String(r['통합바코드']||r['박스코드']||r[Object.keys(r)[0]]||'').trim();
          if(!rawCode) return;
          // 통합바코드면 파싱, 아니면 그대로 박스코드로 사용
          const p=parseUnifiedBarcode(rawCode);
          const boxCodeRaw=p?p.박스코드:rawCode.toUpperCase();
          // 현재위치/이동위치 컬럼 유연하게
          const curPosXlsx=String(r['현재위치']||r['기존위치']||'').trim();
          const newPosXlsx=String(r['이동위치']||r['변경위치']||r['목표위치']||r['위치']||'').trim();
          if(!newPosXlsx) return; // 이동위치 없으면 스킵
          // 적재현황에서 실제 박스 확인
          const jr=(store.jaeja||[]).find(j=>j.박스코드===boxCodeRaw);
          const curPos=jr?.상품위치||curPosXlsx||'❌ 미등록';
          const _bcKey=(jr?.바코드||(p?p.상품코드:'')).toUpperCase();
          const drLoc=_bcKey?(store.db||[]).find(db=>(db.상품코드||'').toUpperCase()===_bcKey||(db.바코드||'').toUpperCase()===_bcKey):null;
          newItems.push({
            id:Date.now()+Math.random(),
            raw:boxCodeRaw,
            박스코드:jr?.박스코드||boxCodeRaw,
            바코드:jr?.바코드||'',
            현재위치:curPos,
            이동위치:newPosXlsx.toUpperCase(),
            상품명:jr?.상품명||drLoc?.상품명||'',
            옵션명:jr?.옵션명||drLoc?.옵션||'',
            진행상황:newPosXlsx&&newPosXlsx===curPos?'변경완료':newPosXlsx?'변경대기':'위치미입력',
          });
        });
        if(!newItems.length){alert('유효한 행이 없습니다. 필수 컬럼: 박스코드(or 통합바코드), 이동위치');return;}
        setList(prev=>[...prev,...newItems]);
        alert(`✅ ${newItems.length}행 로드 완료`);
      }catch(err){alert('엑셀 파싱 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function handleEnter(e){
    if(e.key!=='Enter')return;
    const raw=input.trim();if(!raw){setInput('');return;}
    const p=parseUnifiedBarcode(raw);
    // 통합바코드 아닌 경우에도 박스코드 단독으로 사용 가능 (위치변경은 박스코드만 스캔 허용)
    const boxCodeRaw=p?p.박스코드:raw.toUpperCase();
    const jr=(store.jaeja||[]).find(r=>r.박스코드===boxCodeRaw);
    const _scanKey=(jr?.바코드||(p?p.상품코드:'')).toUpperCase();
    const drScan=_scanKey?(store.db||[]).find(db=>(db.상품코드||'').toUpperCase()===_scanKey||(db.바코드||'').toUpperCase()===_scanKey):null;
    const curPos=jr?.상품위치||'❌ 미등록';
    setList(prev=>[...prev,{id:Date.now(),raw:raw.toUpperCase(),박스코드:jr?.박스코드||raw.toUpperCase(),
      바코드:jr?.바코드||'',현재위치:curPos,이동위치:moveTo,
      상품명:jr?.상품명||drScan?.상품명||'',옵션명:jr?.옵션명||drScan?.옵션||'',
      진행상황:moveTo&&moveTo===curPos?'변경완료':moveTo?'변경대기':'위치미입력'}]);
    setInput('');
  }
  async function doConfirm(){
    const targets=list.filter(r=>r.이동위치&&r.진행상황==='변경대기');
    if(!targets.length){alert('변경 대기 중인 항목이 없습니다.');return;}
    // ── 동시성 잠금 ──
    await withLock('위치변경', async()=>{
      const moveMap={};
      targets.forEach(r=>{moveMap[r.박스코드]=r.이동위치;});
      const nowStr=new Date().toLocaleString('ko-KR');
      const newLogs=targets.map(r=>({
        박스코드:r.박스코드, 바코드:r.바코드||'', 상품명:r.상품명||'',
        옵션명:r.옵션명||'', 기존위치:r.현재위치, 변경위치:r.이동위치, 작업시간:nowStr,
      }));
      await sbLocChange(moveMap, newLogs);
      const newJaeja=(store.jaeja||[]).map(r=>moveMap[r.박스코드]?{...r,상품위치:moveMap[r.박스코드]}:r);
      // jaeja 로케이션도 함께 업데이트 (바코드→변경위치 맵)
      const barcodeLocUpd={};
      newLogs.forEach(r=>{const bc=(r.바코드||'').toUpperCase();if(bc) barcodeLocUpd[bc]=r.변경위치||'';});
      const newJaejaWithLoc=newJaeja.map(r=>{
        const bc=(r.바코드||'').toUpperCase();
        return barcodeLocUpd[bc]?{...r,로케이션:barcodeLocUpd[bc]}:r;
      });
      // SO_STORE.db 로케이션도 업데이트
      const newDb=(SO_STORE.db||[]).map(r=>{
        const bc=(r.바코드||'').toUpperCase();
        const pc=(r.상품코드||'').toUpperCase();
        const newLoc=barcodeLocUpd[bc]||barcodeLocUpd[pc]||'';
        return newLoc?{...r,로케이션:newLoc}:r;
      });
      const newLocLog=[...(SO_STORE.locLog||[]),...newLogs];
      Object.assign(SO_STORE,{jaeja:newJaejaWithLoc,db:newDb,locLog:newLocLog});
      saveSoStore();
      if(onJaejaUpdate) onJaejaUpdate(newJaeja);
      if(onLocLogUpdate) onLocLogUpdate(newLocLog);
      setList(prev=>prev.map(r=>moveMap[r.박스코드]?{...r,진행상황:'변경완료'}:r));
      alert(`✅ ${targets.length}개 위치변경 완료 및 기록 저장`);
    }, msg=>alert(msg));
  }
  return(
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',padding:16,gap:10,overflow:'hidden'}}>
      <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontSize:15,fontWeight:700,color:C.text}}>📍 위치변경 — 통합바코드 or 박스코드</span>
          <div style={{flex:1}}/>
          <label style={{background:C.accentSoft,color:C.accent,border:`1px solid ${C.accent}`,borderRadius:7,padding:'6px 12px',fontSize:13,fontWeight:700,cursor:'pointer',flexShrink:0}}>
            📂 엑셀 업로드
            <input ref={xlsxLocRef} type='file' accept='.xlsx,.xls,.xlsm' onChange={handleLocXlsx} style={{display:'none'}}/>
          </label>
          {list.filter(r=>r.진행상황==='변경대기').length>0&&(
            <button onClick={doConfirm} style={{background:C.green,color:'#fff',border:'none',borderRadius:7,padding:'6px 16px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
              ✅ 변경 확정 ({list.filter(r=>r.진행상황==='변경대기').length}건)
            </button>
          )}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <input value={moveTo} onChange={e=>setMoveTo(e.target.value.toUpperCase())}
            placeholder='이동위치 입력 (예: PP-1-4-2)'
            style={{width:180,background:C.bg,border:`1.5px solid ${C.accent}`,borderRadius:7,padding:'8px 11px',fontSize:15,color:C.text,outline:'none'}}/>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleEnter}
            placeholder='통합바코드 or 박스코드 스캔 후 Enter' autoFocus
            style={{flex:1,background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:7,padding:'8px 11px',fontSize:15,color:C.text,outline:'none'}}/>
          {list.length>0&&<button onClick={()=>{if(!window.confirm('위치변경 목록을 초기화하시겠습니까?'))return;setList([]);}} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}44`,borderRadius:7,padding:'8px 12px',fontSize:14,cursor:'pointer'}}>초기화</button>}
        </div>
      </div>
      <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <div style={{display:'grid',gridTemplateColumns:'150px 135px 135px 1fr 1fr 95px',padding:'7px 12px',background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700,color:C.muted,flexShrink:0}}>
          {['박스코드','현재위치','이동위치','상품명','옵션명','진행상황'].map(h=><div key={h}>{h}</div>)}
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {!list.length&&<div style={{padding:32,textAlign:'center',color:C.muted,fontSize:15}}>이동위치 입력 후 바코드를 스캔하세요</div>}
          {list.map((r,i)=>(
            <div key={r.id} style={{display:'grid',gridTemplateColumns:'150px 135px 135px 1fr 1fr 95px',padding:'6px 12px',borderBottom:`1px solid ${C.border}33`,background:i%2?C.bg:'transparent',fontSize:14,alignItems:'center'}}>
              <div style={{fontFamily:'monospace',fontWeight:700}}>{r.박스코드}</div>
              <div style={{color:C.muted,fontSize:13}}>{r.현재위치}</div>

              <div style={{textAlign:'center'}}>

                  color:r.진행상황==='변경완료'?C.green:r.진행상황==='변경대기'?C.orange:C.red,
                  borderRadius:5,padding:'2px 5px',fontSize:12,fontWeight:700}}>{r.진행상황}</span>

function SortIcon({active,dir}){
  if(!active) return <span style={{color:'#ccc',fontSize:10,marginLeft:3}}>⇅</span>;
  return <span style={{fontSize:10,marginLeft:3}}>{dir==='asc'?'↑':'↓'}</span>;
}

function SubUniq({store}){
  const[search,setSearch]=useState('');
  const[viewMode,setViewMode]=useState('box'); // 'sku' | 'box'

  // ── 정렬 상태: {key, dir} | null(기본=원본순) ──
  const[skuSort,setSkuSort]=useState(null);
  const[boxSort,setBoxSort]=useState(null);

  // SKU뷰: jaejaUniq 기반 + DB 로케이션 병합
  // 박스뷰: jaeja 기반 (박스코드별 전체 목록)
  const ipgoDateMap=React.useMemo(()=>{
    const m={};
    (store.inoutLog||[]).forEach(r=>{
      if((r.입출고||'').includes('입고')&&r.박스코드){
        if(!m[r.박스코드]) m[r.박스코드]=r.작업일시||'';
      }
    });
    return m;
  },[store.inoutLog]);

  // DB 로케이션 맵: 바코드/상품코드 → 로케이션
  const dbLocMapUniq=React.useMemo(()=>{
    const m={};
    (store.db||[]).forEach(r=>{
      const loc=r.로케이션||r.로케이션2||'';
      if(r.바코드&&loc) m[r.바코드.toUpperCase()]=loc;
      if(r.상품코드&&loc) m[r.상품코드.toUpperCase()]=loc;
    });
    return m;
  },[store.db]);

  const boxData=React.useMemo(()=>{
    return (store.jaeja||[])
      .filter(r=>r.박스코드)
      .map(r=>{
        const bc=(r.바코드||'').toUpperCase();
        const resolvedLoc=r.로케이션||dbLocMapUniq[bc]||'';
        return {...r, 로케이션:resolvedLoc, 입고기록:ipgoDateMap[r.박스코드]||''};
      });
  },[store.jaeja, ipgoDateMap, dbLocMapUniq]);

  // SKU뷰: jaejaUniq 기반 + DB 로케이션 병합 (dbLocMapUniq, boxData 의존 → 뒤에 선언)
  const skuData=React.useMemo(()=>{
    return (store.jaejaUniq||[]).filter(r=>r.바코드).map(r=>{
      const bc=(r.바코드||'').toUpperCase();
      const jaejaRow=(store.jaeja||[]).find(j=>(j.바코드||'').toUpperCase()===bc);
      const resolvedLoc=jaejaRow?.로케이션||dbLocMapUniq[bc]||'';
      return {...r, 로케이션:resolvedLoc};
    });
  },[store.jaejaUniq, store.jaeja, dbLocMapUniq]);

  const totalSku=skuData.length;
  const totalQty=skuData.reduce((a,r)=>a+(Number(r.상품수)||0),0);
  const totalBox=skuData.reduce((a,r)=>a+(Number(r.박스)||0),0);

  // 박스수: 동일 바코드의 총 박스 수
  const bcBoxCountMap=React.useMemo(()=>{
    const m={};
    boxData.forEach(r=>{const bc=r.바코드?.toUpperCase()||''; m[bc]=(m[bc]||0)+1;});
    return m;
  },[boxData]);

  // ── 정렬 토글: 기본→오름차순→내림차순→기본 ──
  function toggleSort(setter,current,key){
    if(!current||current.key!==key) setter({key,dir:'asc'});
    else if(current.dir==='asc') setter({key,dir:'desc'});
    else setter(null);
  }

  // ── 정렬 적용 ──
  function applySort(arr,sort,getVal){
    if(!sort) return arr;
    return [...arr].sort((a,b)=>{
      const va=getVal(a,sort.key), vb=getVal(b,sort.key);
      const na=typeof va==='number'&&typeof vb==='number';
      const cmp=na?(va-vb):String(va).localeCompare(String(vb),'ko');
      return sort.dir==='asc'?cmp:-cmp;
    });
  }

  // SKU 정렬 getVal
  function skuVal(r,key){
    if(key==='박스') return Number(r.박스)||0;
    if(key==='상품수') return Number(r.상품수)||0;
    return String(r[key]||'');
  }
  // 박스 정렬 getVal
  function boxVal(r,key){
    if(key==='bcBoxCount') return bcBoxCountMap[(r.바코드||'').toUpperCase()]||0;
    if(key==='수량') return Number(r.수량)||0;
    return String(r[key]||'');
  }

  const filteredSku=React.useMemo(()=>{
    const base=search
      ?skuData.filter(r=>String(r.바코드).includes(search.toUpperCase())||String(r.상품명||'').includes(search))
      :skuData;
    return applySort(base,skuSort,skuVal);
  },[skuData,search,skuSort]);

  const filteredBox=React.useMemo(()=>{
    const base=search
      ?boxData.filter(r=>String(r.박스코드||'').includes(search.toUpperCase())||String(r.바코드||'').includes(search.toUpperCase())||String(r.상품명||'').includes(search))
      :boxData;
    return applySort(base,boxSort,(r,key)=>boxVal(r,key));
  },[boxData,search,boxSort,bcBoxCountMap]);

  // ── 헤더 셀 (클릭 정렬) ──
  function SortTh({label,sortKey,sort,setter,style}){
    const active=sort&&sort.key===sortKey;
    return(
      <div onClick={()=>toggleSort(setter,sort,sortKey)}
        style={{padding:'7px 8px',textAlign:'center',cursor:'pointer',userSelect:'none',
          background:active?C.accentSoft:'transparent',color:active?C.accent:C.muted,
          display:'flex',alignItems:'center',justifyContent:'center',gap:2,...style}}>
        <span>{label}</span>
        <SortIcon active={active} dir={sort?.dir}/>
      </div>
    );
  }

  return(
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',padding:16,gap:10,overflow:'hidden'}}>
      <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px 14px',flexShrink:0,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:15,fontWeight:700,color:C.text}}>📦 적재 현황</span>
        {[{l:'SKU',v:totalSku},{l:'총수량',v:totalQty},{l:'총박스',v:totalBox}].map(({l,v})=>(
          <div key={l} style={{display:'flex',alignItems:'baseline',gap:4}}>
            <span style={{fontSize:13,color:C.muted}}>{l}</span>
            <span style={{fontSize:16,fontWeight:800,color:C.accent,fontFamily:'monospace'}}>{v.toLocaleString()}</span>
          </div>
        ))}
        <div style={{flex:1}}/>
        {/* 뷰 전환 */}
        <div style={{display:'flex',border:`1px solid ${C.border}`,borderRadius:7,overflow:'hidden'}}>
          {[['sku','SKU별'],['box','박스별']].map(([v,l])=>(
            <button key={v} onClick={()=>setViewMode(v)}
              style={{background:viewMode===v?C.accent:C.surface,color:viewMode===v?'#fff':C.muted,border:'none',padding:'5px 14px',fontSize:14,fontWeight:600,cursor:'pointer'}}>
              {l}
            </button>
          ))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={viewMode==='sku'?'바코드/상품명…':'박스코드/바코드/상품명…'}
          style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:'6px 10px',fontSize:14,color:C.text,width:190,outline:'none'}}/>
        <span style={{fontSize:14,color:C.muted}}>{viewMode==='sku'?filteredSku.length:filteredBox.length}개</span>
      </div>

      {/* SKU별 뷰 */}
      {viewMode==='sku'&&(
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{display:'grid',gridTemplateColumns:'75px 135px 1fr 1fr 120px 85px',background:C.surface,borderBottom:`1.5px solid ${C.border}`,fontSize:13,fontWeight:700,flexShrink:0}}>
            {[['박스수','박스'],['바코드','바코드'],['상품명','상품명'],['옵션명','옵션명'],['로케이션','로케이션'],['상품수(수량)','상품수']].map(([label,key],hi)=>(
              <SortTh key={key} label={label} sortKey={key} sort={skuSort} setter={setSkuSort}
                style={{borderRight:hi<5?`1px solid ${C.border}`:undefined}}/>
            ))}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {filteredSku.slice(0,1000).map((r,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'75px 135px 1fr 1fr 120px 85px',borderBottom:`1px solid ${C.border}33`,background:i%2?C.bg:'transparent',fontSize:14,alignItems:'center'}}>
                <div style={{padding:'6px 10px',textAlign:'center',color:C.muted,fontWeight:700,borderRight:`1px solid ${C.border}33`}}>{Number(r.박스)||0}</div>
                <div style={{padding:'6px 10px',textAlign:'center',fontFamily:'monospace',fontWeight:700,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',borderRight:`1px solid ${C.border}33`}}>{r.바코드}</div>
                <div style={{padding:'6px 10px',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',borderRight:`1px solid ${C.border}33`}}>{r.상품명}</div>
                <div style={{padding:'6px 10px',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.muted,fontSize:13,borderRight:`1px solid ${C.border}33`}}>{r.옵션명}</div>
                <div style={{padding:'6px 10px',textAlign:'center',fontSize:12,color:C.purple,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:700,borderRight:`1px solid ${C.border}33`}}>{r.로케이션||'-'}</div>
                <div style={{padding:'6px 10px',textAlign:'center',fontWeight:700,color:C.accent}}>{(Number(r.상품수)||0).toLocaleString()}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 박스별 뷰 */}
      {viewMode==='box'&&(
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{display:'grid',gridTemplateColumns:'60px 125px 115px 55px 115px 1fr 1fr 115px 145px',background:C.surface,borderBottom:`1.5px solid ${C.border}`,fontSize:12,fontWeight:700,flexShrink:0}}>
            {[['박스수','bcBoxCount'],['박스코드','박스코드'],['바코드','바코드'],['수량','수량'],['적재위치','상품위치'],['상품명','상품명'],['옵션명','옵션명'],['로케이션','로케이션'],['입고기록(작업일시)','입고기록']].map(([label,key],hi)=>(
              <SortTh key={key} label={label} sortKey={key} sort={boxSort} setter={setBoxSort}
                style={{borderRight:hi<8?`1px solid ${C.border}`:undefined,fontSize:hi>=4?11:12}}/>
            ))}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {filteredBox.slice(0,2000).map((r,i)=>{
              const bc=(r.바코드||'').toUpperCase();
              const boxCount=bcBoxCountMap[bc]||1;
              return(
                <div key={i} style={{display:'grid',gridTemplateColumns:'60px 125px 115px 55px 115px 1fr 1fr 115px 145px',borderBottom:`1px solid ${C.border}22`,background:i%2?C.bg:'transparent',fontSize:13,alignItems:'center'}}>
                  <div style={{padding:'5px 8px',textAlign:'center',color:C.muted,fontSize:12,borderRight:`1px solid ${C.border}22`}}>{boxCount}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',fontFamily:'monospace',fontWeight:700,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',borderRight:`1px solid ${C.border}22`}}>{r.박스코드}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',fontFamily:'monospace',color:C.accent,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',borderRight:`1px solid ${C.border}22`}}>{r.바코드}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',fontWeight:700,borderRight:`1px solid ${C.border}22`}}>{r.수량||0}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',borderRight:`1px solid ${C.border}22`}}>{r.상품위치}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13,borderRight:`1px solid ${C.border}22`}}>{r.상품명}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:C.muted,borderRight:`1px solid ${C.border}22`}}>{r.옵션명}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',fontSize:12,color:C.purple,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',borderRight:`1px solid ${C.border}22`}}>{r.로케이션}</div>
                  <div style={{padding:'5px 8px',textAlign:'center',fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.입고기록}</div>
                </div>
              );
            })}
            {filteredBox.length>2000&&<div style={{padding:10,textAlign:'center',color:C.muted,fontSize:13}}>2000건만 표시 — 검색으로 필터링하세요</div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── 날짜 파싱 유틸 (ko-KR toLocaleString / ISO 둘 다 처리) ──
function parseKoDate(str) {
  if(!str) return null;
  // "2025. 1. 15. 오후 3:42:00" 형식 — 시분초 + 오전/오후 포함 파싱
  const ko = str.match(/(\d{4})\. ?(\d{1,2})\. ?(\d{1,2})\. ?(오전|오후)? ?(\d{1,2}):(\d{2}):(\d{2})/);
  if(ko) {
    let h = Number(ko[5]);
    const ampm = ko[4];
    if(ampm === '오후' && h < 12) h += 12;
    if(ampm === '오전' && h === 12) h = 0;
    return new Date(Number(ko[1]), Number(ko[2])-1, Number(ko[3]), h, Number(ko[6]), Number(ko[7]));
  }
  // 날짜만 있는 경우 (시간 없음)
  const koDate = str.match(/(\d{4})\. ?(\d{1,2})\. ?(\d{1,2})\./);
  if(koDate) return new Date(Number(koDate[1]), Number(koDate[2])-1, Number(koDate[3]));
  // ISO / 숫자 timestamp
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

// ── 드라이브 blob 업로드 (토큰 받은 상태에서 호출) ──
async function uploadBlobToDriveFolder(blob, fileName, folderId, token) {
  const meta = { name: fileName, parents: [folderId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
  form.append('file', blob);
  const r = await fetch(

      scope:'https://www.googleapis.com/auth/drive.file',

    });
    tc.requestAccessToken({prompt:''});

// ── 30일 아카이브 체크 키 ──
const ARCHIVE_CHECK_KEY = 'archive_last_check';

// ── 자동 아카이브: 30일 이상된 inoutLog/locLog → 드라이브 업로드 후 SO_STORE에서 제거 ──
// silent=true: 아카이브할 데이터 없으면 조용히 종료
async function autoArchiveIfNeeded(setStatus, silent=true) {
  // 오늘 날짜 기준 — 하루 1회만 체크
  const today = new Date().toDateString();
  const lastCheck = localStorage.getItem(ARCHIVE_CHECK_KEY);
  if(lastCheck === today) return; // 이미 오늘 체크함

  const ARCHIVE_DAYS = 30; // 30일 이상이면 아카이브 (16~30일치 → 드라이브)
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - ARCHIVE_DAYS);

  const inoutLog = SO_STORE.inoutLog || [];
  const locLog   = SO_STORE.locLog   || [];

  // ipgo_monthly: {ym: rows[]} — ts(숫자) 기준
  let monthly = {};
  try { monthly = JSON.parse(localStorage.getItem('ipgo_monthly_v2') || '{}'); } catch{}

  // 30일 이상 분리 (16~30일치)
  const oldInout = inoutLog.filter(r => { const d=parseKoDate(r.작업일시); return d && d < cutoff; });
  const oldLoc   = locLog.filter(r   => { const d=parseKoDate(r.작업시간); return d && d < cutoff; });
  const oldMonthly = {}; // {ym: rows}
  Object.entries(monthly).forEach(([ym, rows]) => {
    const old = rows.filter(r => r.ts && new Date(r.ts) < cutoff);
    if(old.length) oldMonthly[ym] = old;
  });

  const hasOld = oldInout.length || oldLoc.length || Object.keys(oldMonthly).length;
  if(!hasOld) {
    localStorage.setItem(ARCHIVE_CHECK_KEY, today);
    if(!silent) { setStatus('보관할 데이터 없음'); setTimeout(()=>setStatus(''),2000); }
    return;
  }

  setStatus('🗄 아카이브 준비 중…');
  let token;
  try { token = await getGapiToken(); } catch(e) { token = null; }
  if(!token) {
    if(!silent) { setStatus('❌ 드라이브 로그인 필요'); setTimeout(()=>setStatus(''),3000); }
    return;
  }

  const INOUT_FOLDER  = '1RADyAAVY2SyUN-pCjhvaycqZl211N_tJ';
  const LOC_FOLDER    = '1ww3zWX_dXJsSgamocOZAos-WfczlIy97';
  const IPGO_FOLDER   = '1RADyAAVY2SyUN-pCjhvaycqZl211N_tJ';

  // 날짜 범위 라벨 helper
  function rangeLabel(rows, getDate) {
    const dates = rows.map(getDate).filter(Boolean).sort((a,b)=>a-b);
    if(!dates.length) return '';
    const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    return dates.length===1 ? fmt(dates[0]) : `${fmt(dates[0])}-${fmt(dates[dates.length-1])}`;
  }

  function makeBlob(rows, sheetName) {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), sheetName);
    const buf = XLSX.write(wb, {type:'array', bookType:'xlsx'});
    return new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  }

  let uploadCount = 0;
  try {
    // ① 입출고기록
    if(oldInout.length) {
      setStatus(`📤 입출고기록 아카이브 중… (${oldInout.length}건)`);
      const label = rangeLabel(oldInout, r=>parseKoDate(r.작업일시));
      const blob = makeBlob(oldInout, '입출고기록');
      await uploadBlobToDriveFolder(blob, `입출고기록_아카이브_${label}.xlsx`, INOUT_FOLDER, token);
      // 메모리에서 제거
      SO_STORE.inoutLog = inoutLog.filter(r => !oldInout.includes(r));
      uploadCount++;
    }

    // ② 위치변경기록
    if(oldLoc.length) {
      setStatus(`📤 위치변경기록 아카이브 중… (${oldLoc.length}건)`);
      const label = rangeLabel(oldLoc, r=>parseKoDate(r.작업시간));
      const blob = makeBlob(oldLoc, '위치변경기록');
      await uploadBlobToDriveFolder(blob, `위치변경기록_아카이브_${label}.xlsx`, LOC_FOLDER, token);
      SO_STORE.locLog = locLog.filter(r => !oldLoc.includes(r));
      uploadCount++;
    }

    // ③ 입고 월별기록
    for(const [ym, rows] of Object.entries(oldMonthly)) {
      setStatus(`📤 입고기록 ${ym} 아카이브 중… (${rows.length}건)`);
      const label = rangeLabel(rows, r=>r.ts?new Date(r.ts):null) || ym;
      const blob = makeBlob(rows, '입고기록');
      await uploadBlobToDriveFolder(blob, `입고기록_아카이브_${label}.xlsx`, IPGO_FOLDER, token);
      // monthly에서 해당 ym의 30일 이상 행만 제거
      const kept = (monthly[ym]||[]).filter(r => !(r.ts && new Date(r.ts) < cutoff));
      if(kept.length) monthly[ym] = kept;
      else delete monthly[ym];
      uploadCount++;
    }
    localStorage.setItem('ipgo_monthly_v2', JSON.stringify(monthly));

    saveSoStore();
    localStorage.setItem(ARCHIVE_CHECK_KEY, today);
    setStatus(`✅ 아카이브 완료 (${uploadCount}개 파일 → Drive)`);
    setTimeout(()=>setStatus(''), 4000);
  } catch(e) {
    setStatus(`❌ 아카이브 오류: ${e.message}`);
    setTimeout(()=>setStatus(''), 4000);
  }
}

async function saveDataToDrive(data,sheetName,fileName,folderId,setStatus){
  setStatus('로그인 중…');
  try{
    await new Promise((res,rej)=>gapi.load('client',{callback:res,onerror:rej}));
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:'20703194395-ptr0aane1q29hmfdl15tqdbpt3uclh84.apps.googleusercontent.com',scope:'https://www.googleapis.com/auth/drive.file',
      callback:async(resp)=>{
        if(resp.error){setStatus('❌ 로그인 실패');setTimeout(()=>setStatus(''),3000);return;}
        setStatus('저장 중…');
        const wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),sheetName);
        const buf=XLSX.write(wb,{type:'array',bookType:'xlsx'});
        const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        const meta={name:fileName,parents:[folderId]};
        const form=new FormData();
        form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
        form.append('file',blob);
        const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${gapi.client.getToken().access_token}`},body:form});
        setStatus(r.ok?'✅ Drive 저장 완료!':'❌ 저장 실패');

      }

    const col=COLS.find(c=>c.key===sort.key)||COLS[6];

    else if(col.num) diff=(Number(va)||0)-(Number(vb)||0);

// ── ⑩ 로케이션 관리 ──
function SubLocMgr({store,onLocUpdate}){
  const[search,setSearch]=useState('');
  const[locSort,setLocSort]=useState({key:'로케이션',dir:'asc'});
  const locXlsxRef=useRef();

  // DB 시트 기반 로케이션 집계
  const dbLocData=React.useMemo(()=>{
    const locMap={};
    (store.db||[]).forEach(r=>{
      const loc=r.로케이션||r.로케이션2||'';
      if(!loc) return;
      if(!locMap[loc]) locMap[loc]={로케이션:loc,SKU수:0,상품목록:[]};
      locMap[loc].SKU수+=1;
      locMap[loc].상품목록.push({바코드:r.바코드||'',상품명:r.상품명||'',옵션:r.옵션||''});
    });
    return Object.values(locMap).sort((a,b)=>a.로케이션.localeCompare(b.로케이션,'ko'));
  },[store.db]);

  const jaejaLocMap=React.useMemo(()=>{
    const m={};
    (store.jaeja||[]).forEach(r=>{
      const loc=r.로케이션||'';
      if(!loc) return;
      m[loc]=(m[loc]||0)+(Number(r.수량)||0);
    });
    return m;
  },[store.jaeja]);

  const locExtraMap=React.useMemo(()=>{
    const m={};
    (store.loc||[]).forEach(r=>{if(r.로케이션)m[r.로케이션]=r;});
    return m;
  },[store.loc]);

  const data=React.useMemo(()=>{
    if(dbLocData.length>0){
      return dbLocData.map(r=>({
        로케이션:r.로케이션,SKU수:r.SKU수,
        전산재고:(locExtraMap[r.로케이션]?.전산재고)||0,
        적재수량:jaejaLocMap[r.로케이션]||0,
        로케이션수량:(locExtraMap[r.로케이션]?.로케이션수량)||0,
      }));
    }
    return (store.loc||[]).filter(r=>r.로케이션).map(r=>({
      ...r, 적재수량:jaejaLocMap[r.로케이션]||r.적재수량||0,
    }));
  },[dbLocData,jaejaLocMap,locExtraMap,store.loc]);

  const filteredBase=search?data.filter(r=>String(r.로케이션||'').includes(search)):data;
  const filtered=React.useMemo(()=>{
    return [...filteredBase].sort((a,b)=>{
      const va=locSort.key==='로케이션'?String(a.로케이션||''):Number(a[locSort.key])||0;
      const vb=locSort.key==='로케이션'?String(b.로케이션||''):Number(b[locSort.key])||0;
      const cmp=typeof va==='string'?va.localeCompare(vb,'ko'):va-vb;
      return locSort.dir==='asc'?cmp:-cmp;
    });
  },[filteredBase,locSort]);
  function toggleLocSort(key){setLocSort(prev=>prev.key===key?{key,dir:prev.dir==='asc'?'desc':'asc'}:{key,dir:'asc'});}
  const totalLoc=data.length;

  function handleLocXlsx(e){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        const loc=rows.map(r=>({
          로케이션:String(r['로케이션']||'').trim(),SKU수:Number(r['sku 수량']||r['SKU수']||r['sku수'])||0,
          전산재고:Number(r['전산재고'])||0,적재수량:Number(r['적재수량'])||0,
          로케이션수량:Number(r['로케이션수량'])||0,
        })).filter(r=>r.로케이션);
        Object.assign(SO_STORE,{loc});saveSoStore();
        if(onLocUpdate) onLocUpdate(loc);
        alert('✅ 로케이션 보완 데이터 '+loc.length+'개 로드 완료');
      }catch(err){alert('파싱 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  return(
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',padding:16,gap:10,overflow:'hidden'}}>
      {/* 툴바 */}
      <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px 14px',flexShrink:0,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:15,fontWeight:700,color:C.text}}>🏷 로케이션 현황 ({totalLoc.toLocaleString()}개)</span>
        {dbLocData.length>0&&<span style={{fontSize:13,color:C.green,background:C.greenSoft,borderRadius:5,padding:'2px 7px',fontWeight:600}}>DB 기반</span>}
        <div style={{flex:1}}/>
        <button onClick={()=>{
          const rows=filtered.map(r=>({
            로케이션:r.로케이션,SKU수:r.SKU수,전산재고:r.전산재고,
            적재수량:r.적재수량,로케이션수량:r.로케이션수량
          }));
          const wb=XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'로케이션현황');
          XLSX.writeFile(wb,`로케이션현황_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.xlsx`);
        }} style={{background:C.accentSoft,color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:7,padding:'4px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
          📥 다운로드
        </button>
        <label style={{background:C.surface,color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:7,padding:'4px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}
          title='전산재고·로케이션수량 보완용 엑셀 업로드'>
          📂 보완 엑셀<input ref={locXlsxRef} type='file' accept='.xlsx,.xls,.xlsm' onChange={handleLocXlsx} style={{display:'none'}}/>
        </label>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder='로케이션 검색…'
          style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:'6px 10px',fontSize:14,color:C.text,width:200,outline:'none'}}/>
        <span style={{fontSize:14,color:C.muted}}>{filtered.length.toLocaleString()}개</span>
      </div>

      {/* 2열 레이아웃 */}
      <div style={{flex:1,minHeight:0,display:'flex',gap:10,overflow:'hidden'}}>

        {/* 좌측: 현황 테이블 */}
        <div style={{flex:'0 0 480px',minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{display:'grid',gridTemplateColumns:'160px 65px 75px 75px 85px',background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:12,fontWeight:700,color:C.muted,flexShrink:0}}>
            {['로케이션','SKU수','전산재고','적재수량','로케이션수량'].map((h,hi)=>(
              <div key={h} onClick={()=>toggleLocSort(h)}
                style={{padding:'7px 6px',textAlign:'center',borderRight:hi<4?`1px solid ${C.border}`:undefined,
                  cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',
                  color:locSort.key===h?C.accent:C.muted,display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
                {h}<span style={{fontSize:10}}>{locSort.key===h?(locSort.dir==='asc'?'↑':'↓'):'⇅'}</span>
              </div>
            ))}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {!data.length&&<div style={{padding:32,textAlign:'center',color:C.muted,fontSize:15}}>엑셀 파일을 업로드하면 DB 시트 기반으로 자동 표시됩니다</div>}
            {filtered.slice(0,1000).map((r,i)=>{
              const diff=(Number(r.전산재고)||0)-(Number(r.적재수량)||0);
              return(
                <div key={i} style={{display:'grid',gridTemplateColumns:'160px 65px 75px 75px 85px',borderBottom:`1px solid ${C.border}33`,background:diff<0?'#fff7ed':i%2?C.bg:'transparent',fontSize:13,alignItems:'center'}}>
                  <div style={{padding:'5px 6px',fontWeight:700,color:C.text,textAlign:'center',borderRight:`1px solid ${C.border}22`,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.로케이션}</div>
                  <div style={{padding:'5px 6px',textAlign:'center',color:C.accent,borderRight:`1px solid ${C.border}22`}}>{Number(r.SKU수)||0}</div>
                  <div style={{padding:'5px 6px',textAlign:'center',color:C.green,borderRight:`1px solid ${C.border}22`}}>{(Number(r.전산재고)||0).toLocaleString()}</div>
                  <div style={{padding:'5px 6px',textAlign:'center',color:C.purple,borderRight:`1px solid ${C.border}22`}}>{(Number(r.적재수량)||0).toLocaleString()}</div>
                  <div style={{padding:'5px 6px',textAlign:'center',fontWeight:700,color:diff!==0?C.orange:C.muted}}>{(Number(r.로케이션수량)||0).toLocaleString()}</div>

// ── 로케이션 부여 패널 (인라인) ──
function LocAssignPanel({locData}){
  const[xlsxRows,setXlsxRows]=useState([]);
  const[xlsxFile,setXlsxFile]=useState('');
  const[result,setResult]=useState([]);
  const[assigned,setAssigned]=useState(false);
  const uploadRef=useRef();

  // ── 세그먼트 선택 상태 ──
  // seg0: SKU수 (1~20), seg1: 구역, seg2: 번호1, seg3: 번호2, seg4: 번호3
  const[openSeg,setOpenSeg]=useState(null); // 현재 열린 드롭다운 인덱스
  const[selSku,setSelSku]=useState({});   // {1:true, 2:true, ...}
  const[sel1,setSel1]=useState({});       // 구역
  const[sel2,setSel2]=useState({});       // 번호1
  const[sel3,setSel3]=useState({});       // 번호2
  const[sel4,setSel4]=useState({});       // 번호3
  const dropRef=useRef();

  // 로케이션 목록에서 세그먼트 추출
  const locList=locData.map(r=>r.로케이션).filter(Boolean);

  const seg1Options=React.useMemo(()=>{
    const s=new Set();
    locList.forEach(l=>{const p=l.split('-');if(p[0])s.add(p[0]);});
    return [...s].sort((a,b)=>a.localeCompare(b,'ko'));
  },[locList]);

  const seg2Options=React.useMemo(()=>{
    const s=new Set();
    locList.forEach(l=>{const p=l.split('-');if(p[1])s.add(p[1]);});
    return [...s].sort((a,b)=>isNaN(a)?a.localeCompare(b):Number(a)-Number(b));
  },[locList]);

  const seg3Options=React.useMemo(()=>{
    const s=new Set();
    locList.forEach(l=>{const p=l.split('-');if(p[2])s.add(p[2]);});
    return [...s].sort((a,b)=>isNaN(a)?a.localeCompare(b):Number(a)-Number(b));
  },[locList]);

  const seg4Options=React.useMemo(()=>{
    const s=new Set();
    locList.forEach(l=>{const p=l.split('-');if(p[3])s.add(p[3]);});
    return [...s].sort((a,b)=>isNaN(a)?a.localeCompare(b):Number(a)-Number(b));
  },[locList]);

  const skuOptions=Array.from({length:20},(_,i)=>String(i+1));

  // 선택된 로케이션 범위 계산
  const selectedLocs=React.useMemo(()=>{
    const hasSku=Object.values(selSku).some(Boolean);
    const has1=Object.values(sel1).some(Boolean);
    const has2=Object.values(sel2).some(Boolean);
    const has3=Object.values(sel3).some(Boolean);
    const has4=Object.values(sel4).some(Boolean);
    if(!has1&&!has2&&!has3&&!has4) return [];
    return locList.filter(l=>{
      const p=l.split('-');
      if(has1&&!sel1[p[0]]) return false;
      if(has2&&!sel2[p[1]]) return false;
      if(has3&&!sel3[p[2]]) return false;
      if(has4&&!sel4[p[3]]) return false;
      return true;
    });
  },[locList,sel1,sel2,sel3,sel4]);

  // SKU 필터 적용된 최종 대상 로케이션
  const targetLocs=React.useMemo(()=>{
    const hasSku=Object.values(selSku).some(Boolean);
    if(!hasSku) return selectedLocs;
    return selectedLocs.filter(l=>{
      const found=locData.find(r=>r.로케이션===l);
      if(!found) return false;
      return selSku[String(Number(found.SKU수)||0)];
    });
  },[selectedLocs,selSku,locData]);

  // 외부 클릭 시 드롭다운 닫기
  useEffect(()=>{
    function handler(e){
      if(dropRef.current&&!dropRef.current.contains(e.target)) setOpenSeg(null);
    }
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  function toggleSel(setter,key){setter(prev=>({...prev,[key]:!prev[key]}));}
  function toggleAll(setter,options,current){
    const allOn=options.every(o=>current[o]);
    const next={};
    options.forEach(o=>{next[o]=!allOn;});
    setter(next);
  }
  function clearAll(setter){setter({});}

  function labelFor(sel,placeholder){
    const keys=Object.keys(sel).filter(k=>sel[k]);
    if(!keys.length) return placeholder;
    if(keys.length<=3) return keys.join(', ');
    return keys.slice(0,2).join(', ')+` 외 ${keys.length-2}개`;
  }

  const SEG_CONFIGS=[
    {key:'sku',   label:'SKU수',  placeholder:'SKU수',  options:skuOptions, sel:selSku, setter:setSelSku},
    {key:'seg1',  label:'구역',   placeholder:'구역',   options:seg1Options,sel:sel1,   setter:setSel1},
    {key:'seg2',  label:'번호1',  placeholder:'번호1',  options:seg2Options,sel:sel2,   setter:setSel2},
    {key:'seg3',  label:'번호2',  placeholder:'번호2',  options:seg3Options,sel:sel3,   setter:setSel3},
    {key:'seg4',  label:'번호3',  placeholder:'번호3',  options:seg4Options,sel:sel4,   setter:setSel4},
  ];

  function handleXlsxUpload(e){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        const parsed=rows.map(r=>({
          바코드:String(r['바코드']||r[Object.keys(r)[0]]||'').trim().toUpperCase(),
          로케이션:String(r['로케이션']||r[Object.keys(r)[1]]||'').trim(),
          부여로케이션:'',
        })).filter(r=>r.바코드);
        setXlsxRows(parsed);setXlsxFile(file.name);setResult([]);setAssigned(false);
      }catch(err){alert('파싱 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function doAssign(){
    if(!xlsxRows.length){alert('엑셀 파일을 먼저 업로드하세요.');return;}
    if(!targetLocs.length){alert('범위를 선택하세요.');return;}
    const res=xlsxRows.map(r=>({...r,부여로케이션:targetLocs[Math.floor(Math.random()*targetLocs.length)]}));
    setResult(res);setAssigned(true);
  }

  function downloadResult(){
    if(!result.length){alert('먼저 부여를 실행하세요.');return;}
    const cols=['바코드','로케이션','부여로케이션'];
    const ws=XLSX.utils.json_to_sheet(result,{header:cols});
    ws['!cols']=cols.map(col=>{
      const ml=result.reduce((mx,row)=>Math.max(mx,String(row[col]||'').length),col.length);
      return{wch:Math.min(ml+2,40)};
    });
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'로케이션부여');
    XLSX.writeFile(wb,`로케이션부여_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.xlsx`);
  }

  const displayRows=assigned?result:xlsxRows;

      <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',padding:12,gap:10,overflow:'auto'}}>

// ── 메인 SearchOutTab ──
function SearchOutTab({storeVer,setStoreVer,sbAutoLoading,sbSyncStatus,archiveStatus,subTab:initSubTab,onSubTabChange}){
  const[subTab,setSubTabInner]=useState(initSubTab||'main');
  const[loading,setLoading]=useState(false);
  // storeVer는 부모(SapPage)에서 전달받음 — 자체 자동로드 제거
  // initSubTab 변경 시 동기화
  useEffect(()=>{if(initSubTab&&initSubTab!==subTab)setSubTabInner(initSubTab);},[initSubTab]);
  function setSubTab(t){setSubTabInner(t);if(onSubTabChange)onSubTabChange(t);}

  function handleUpload(e){
    const file=e.target.files[0];if(!file)return;
    setLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',WTF:false});
        const getSheet=(name)=>wb.Sheets[name]?XLSX.utils.sheet_to_json(wb.Sheets[name],{defval:''}):[]; 
        const getSheetRange=(name,range)=>wb.Sheets[name]?XLSX.utils.sheet_to_json(wb.Sheets[name],{defval:'',range}):[]; 

        // 적재
        const jaeja=getSheet('적재').map(r=>({
          박스코드:String(r['박스코드']||'').trim(),바코드:String(r['바코드']||'').trim().toUpperCase(),
          수량:Number(r['수량'])||0,
          상품위치:String(r['상품위치']||r['위치']||r['position']||'').trim(),
          상품명:String(r['상품명']||'').trim(),옵션명:String(r['옵션명']||'').trim(),
          로케이션:String(r['로케이션']||'').trim(),출고여부:String(r['출고여부']||'').trim(),
          입고:String(r['입고']||'').trim(),
        })).filter(r=>r.박스코드);

        // DB (3행 헤더)
        const db=getSheetRange('DB',2).map(r=>({
          상품코드:String(r['상품코드']||'').trim().toUpperCase(),바코드:String(r['바코드']||'').trim().toUpperCase(),
          상품명:String(r['상품명']||'').trim(),옵션:String(r['옵션']||'').trim(),
          로케이션:String(r['로케이션']||'').trim(),
          로케이션2:String(r['Unnamed: 5']||'').trim(),
          총B2B접송:Number(r['총 B2B 접+송'])||0,
        })).filter(r=>r.상품코드);

        // ①가공주문서
        const gagang=getSheet('①가공 주문서').map(r=>({
          바코드:String(r['바코드']||'').trim().toUpperCase(),접수송장:Number(r['접수+송장'])||0,
          정상재고:Number(r['정상재고'])||0,B2B주문:Number(r['B2B 주문수량\nNO TOUCH'])||0,
          변환바코드:String(r['바코드_1']||r['바코드']||'').trim().toUpperCase(),
        })).filter(r=>r.바코드);

        // ②주문서
        const jumon=getSheet('②주문서').map(r=>({
          바코드:String(r['바코드']||'').trim().toUpperCase(),접수송장:Number(r['접수+송장'])||0,
          정상재고:Number(r['정상재고'])||0,로케이션:String(r['로케이션']||'').trim(),
          적재:Number(r['적재'])||0,로케:Number(r['로케'])||0,필요수량:Number(r['필요수량'])||0,
          검색수량:Number(r['검색수량'])||0,진행상황:String(r['진행상황']||'').trim(),
        })).filter(r=>r.바코드);

        // 로케이션 관리용
        const loc=getSheet('로케이션 관리용').map(r=>({
          로케이션:String(r['로케이션']||'').trim(),SKU수:Number(r['sku 수량'])||0,
          전산재고:Number(r['전산재고'])||0,적재수량:Number(r['적재수량'])||0,
          로케이션수량:Number(r['로케이션수량'])||0,
        })).filter(r=>r.로케이션);

        // 입출고 기록
        const inoutLog=getSheet('입출고 기록').map(r=>({
          박스코드:String(r['박스코드']||'').trim().toUpperCase(),바코드:String(r['바코드']||'').trim().toUpperCase(),
          수량:Number(r['수량'])||0,위치:String(r['위치']||'').trim(),
          상품명:String(r['상품명']||'').trim(),옵션:String(r['옵션']||'').trim(),
          작업일시:r['작업일시']?new Date(r['작업일시']).toLocaleString('ko-KR'):'',
          입출고:String(r['입고 / 출고']||'').trim(),
        })).filter(r=>r.박스코드);

        // 위치변경 기록
        const locLog=getSheet('위치변경 기록').map(r=>({
          바코드:String(r['바코드']||'').trim().toUpperCase(),기존위치:String(r['기존위치']||'').trim(),
          변경위치:String(r['변경위치']||'').trim(),
          작업시간:r['작업시간']?new Date(r['작업시간']).toLocaleString('ko-KR'):'',
        })).filter(r=>r.바코드);

        // 적재-UNIQUE: 적재 시트에서 직접 집계 (시트 수식과 무관하게 항상 일치)
        const jaejaUniqMap={};
        jaeja.forEach(r=>{
          const bc=(r.바코드||'').trim().toUpperCase(); // 대소문자 통일
          if(!bc) return;
          if(!jaejaUniqMap[bc]) jaejaUniqMap[bc]={바코드:bc,상품명:r.상품명||'',옵션명:r.옵션명||'',상품수:0,박스:0};
          jaejaUniqMap[bc].상품수+=(Number(r.수량)||0);
          jaejaUniqMap[bc].박스+=1;
          if(!jaejaUniqMap[bc].상품명&&r.상품명) jaejaUniqMap[bc].상품명=r.상품명;
          if(!jaejaUniqMap[bc].옵션명&&r.옵션명) jaejaUniqMap[bc].옵션명=r.옵션명;
        });
        const jaejaUniq=Object.values(jaejaUniqMap);

        // DB 로케이션 → jaeja/jumon/loc 반영
        const dbLocMap={};
        db.forEach(r=>{
          const loc=r.로케이션||r.로케이션2||'';
          if(r.바코드&&loc) dbLocMap[r.바코드]=loc;
          if(r.상품코드&&loc) dbLocMap[r.상품코드]=loc;
        });
        const jaejaWithLoc=jaeja.map(r=>({...r,로케이션:r.로케이션||dbLocMap[r.바코드]||''}));
        const dbB2BMap={};
        db.forEach(r=>{if(r.바코드) dbB2BMap[r.바코드]=r.총B2B접송||0;});
        const jumonWithLoc=jumon.map(r=>({
          ...r,
          로케이션:r.로케이션||dbLocMap[r.바코드]||'',
          총B2B접송:dbB2BMap[r.바코드]||0,
        }));
        // loc에 DB 기반 SKU 집계 보완
        const locMap={};
        loc.forEach(r=>{locMap[r.로케이션]=r;});
        const extraLoc=[];
        jaejaWithLoc.forEach(r=>{if(r.로케이션&&!locMap[r.로케이션]){locMap[r.로케이션]={로케이션:r.로케이션,SKU수:0,전산재고:0,적재수량:0,로케이션수량:0};extraLoc.push(locMap[r.로케이션]);}});
        const locFinal=[...loc,...extraLoc];
        Object.assign(SO_STORE,{jaeja:jaejaWithLoc,db,gagang,jumon:jumonWithLoc,loc:locFinal,inoutLog,locLog,jaejaUniq,loaded:true,filename:file.name});
        saveSoStore();
        setStoreVer({...SO_STORE});

        // Supabase 동기화 (이전에 Supabase 로드한 적 있는 경우)
        if(localStorage.getItem('sb_was_loaded')){
          setLoading(true);
          sbSyncFromExcel(jaejaWithLoc, db, msg=>{
            if(_sbRealtimeCallback) _sbRealtimeCallback({...SO_STORE});
          }).then(()=>{
            sbSubscribeRealtime(newStore=>setStoreVer({...newStore}));
          }).catch(e=>{ console.warn('Supabase 동기화 실패:', e); })
          .finally(()=>setLoading(false));
        }
      }catch(err){alert('파일 로드 실패: '+err.message);console.error(err);}
      setLoading(false);
    };
    reader.readAsArrayBuffer(file);
  }

  function upd(){setStoreVer({...SO_STORE});}

  return(
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden',background:C.bg}}>
      {subTab==='main'&&<SubMain store={storeVer} onJaejaUpdate={newJaeja=>{Object.assign(SO_STORE,{jaeja:newJaeja});saveSoStore();upd();}}/>}
      <div style={{display:subTab==='gagang'?'flex':'none',flex:1,minHeight:0,overflow:'hidden',width:'100%'}}>
        <SubGagang store={storeVer} onGagangUpdate={(g,b2b)=>{Object.assign(SO_STORE,{gagang:g,...(b2b!==undefined?{b2bFiles:b2b}:{})});saveSoStore();upd();}}/>
      </div>
      {subTab==='jumon'&&<SubJumon store={storeVer}/>}
      {subTab==='multi'&&<SubMulti store={storeVer}/>}
      {subTab==='ipgo'&&<SubIpgo store={storeVer} onJaejaUpdate={newJaeja=>{Object.assign(SO_STORE,{jaeja:newJaeja});saveSoStore();upd();}}/>}
      {subTab==='locchg'&&<SubLocChg store={storeVer}
        onJaejaUpdate={newJaeja=>{Object.assign(SO_STORE,{jaeja:newJaeja});saveSoStore();upd();}}
        onLocLogUpdate={newLocLog=>{Object.assign(SO_STORE,{locLog:newLocLog});saveSoStore();upd();}}
      />}
      {subTab==='uniq'&&<SubUniq store={storeVer}/>}
      {subTab==='inoutlog'&&<SubInOutLog store={storeVer}/>}
      {subTab==='loclog'&&<SubLocLog store={storeVer}/>}
      {subTab==='locmgr'&&<SubLocMgr store={storeVer} onLocUpdate={loc=>{Object.assign(SO_STORE,{loc});saveSoStore();upd();}}/>}
    </div>
  );
}
