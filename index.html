// ── 메인 SapPage ──
function SapPage(){
  const[tab,setTab]=useState("dashboard");
  // ── Supabase 전역 상태 (SoHeader 항상 표시용) ──
  const[sbStoreVer,setSbStoreVer]=useState({...SO_STORE});
  const[sbAutoLoading,setSbAutoLoading]=useState(false);
  const[sbSyncStatus,setSbSyncStatus]=useState('');
  const[sbArchiveStatus,setSbArchiveStatus]=useState('');
  const[sbSubTab,setSbSubTab]=useState('main');
  const[sbLoading2,setSbLoading2]=useState(false);
  const[dbUpdatedAtGlobal,setDbUpdatedAtGlobal]=useState(
    ()=>SS.get('bc_db_updated_at',null)||localStorage.getItem('bc_db_updated_at')||''
  );
  useEffect(()=>{window._setDbUpdatedAtGlobal=setDbUpdatedAtGlobal;return()=>{window._setDbUpdatedAtGlobal=null;};},[]);

  async function loadDbUpdatedAt(){
    const remote=await sbLoadDbUpdatedAt();
    if(remote){
      setDbUpdatedAtGlobal(remote);
      try{ localStorage.setItem('bc_db_updated_at',remote); }catch{}
      SS.set('bc_db_updated_at',remote);
    }
  }

  useEffect(()=>{
    const wasLoaded=localStorage.getItem('sb_was_loaded');
    if(!wasLoaded) return;
    setSbAutoLoading(true);
    loadFromSupabase(()=>{})
      .then(()=>{
        setSbStoreVer({...SO_STORE});
        sbSubscribeRealtime(newStore=>setSbStoreVer({...newStore}));
        autoArchiveIfNeeded(setSbArchiveStatus,true).catch(()=>{});
        loadDbUpdatedAt().catch(()=>{});
      })
      .catch(e=>console.warn('자동 재연결 실패:',e))
      .finally(()=>setSbAutoLoading(false));
    return ()=>{ sbUnsubscribeRealtime(); };
  },[]);

  function handleSbLoadGlobal(){
    localStorage.setItem('sb_was_loaded','1');
    setSbStoreVer({...SO_STORE});
    sbSubscribeRealtime(newStore=>setSbStoreVer({...newStore}));
    loadDbUpdatedAt().catch(()=>{});
  }
  const[sellerRules,setSellerRules]=useState(loadRules);
  const[rows,setRows]=useState(null);
  const[fileName,setFileName]=useState("");
  const[fileInfo,setFileInfo]=useState("");
  const[result,setResult]=useState(null);
  const[detailRows,setDetailRows]=useState([]);
  const[selectedCats,setSelectedCats]=useState(new Set());
  const[sortCol,setSortCol]=useState("qty");
  const[sortAsc,setSortAsc]=useState(false);
  const[filterCat,setFilterCat]=useState("all");
  const[sellerSearch,setSellerSearch]=useState("");
  const[addModal,setAddModal]=useState(false);
  const[newSellerName,setNewSellerName]=useState("");
  const[newSellerCat,setNewSellerCat]=useState("domestic");
  const[filterModal,setFilterModal]=useState(false);
  const[tempCats,setTempCats]=useState(new Set());
  const[mainSplit,setMainSplit]=useState(55);
  const mainDragRef=useRef({dragging:false});
  const mainContainerRef=useRef();
  const startMainDrag=e=>{e.preventDefault();mainDragRef.current.dragging=true;const onMove=ev=>{if(!mainDragRef.current.dragging)return;const rect=mainContainerRef.current.getBoundingClientRect();const pct=Math.min(80,Math.max(20,((ev.clientX-rect.left)/rect.width)*100));setMainSplit(pct);};const onUp=()=>{mainDragRef.current.dragging=false;window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);};
  const fileRef=useRef();
  const updateRules=r=>{setSellerRules(r);saveRules(r);};
  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        let sheetName=wb.SheetNames.find(n=>n.toLowerCase()==="db")||wb.SheetNames[0];
        const ws=wb.Sheets[sheetName];
        const data=XLSX.utils.sheet_to_json(ws,{defval:""});
        setRows(data);setFileName(file.name);
        const sellerSet=new Set(data.map(r=>r["판매처"]).filter(Boolean));
        setFileInfo(`총 ${data.length.toLocaleString()}행 | 판매처 ${sellerSet.size}개 | 컬럼 ${Object.keys(data[0]||{}).length}개`);
        const rules={...sellerRules};const newSellers=[];
        sellerSet.forEach(s=>{if(!rules[s]){rules[s]="domestic";newSellers.push(s);}});
        if(newSellers.length>0){updateRules(rules);if(window.confirm("새 판매처 "+newSellers.length+"개 발견:\n"+newSellers.slice(0,5).map(s=>"• "+s).join("\n")+(newSellers.length>5?"\n...":"")+"\n\n판매처 관리에서 분류를 확인하시겠습니까?")){};}
        setResult(null);setDetailRows([]);
      }catch(err){alert("파일 로드 실패: "+err.message);}
    };
    reader.readAsArrayBuffer(file);e.target.value="";
  };
  const handleCollect=()=>{if(!rows)return;const res=collect(rows,sellerRules);setResult(res);const dr=[];Object.entries(res.seller_detail).forEach(([seller,info])=>{const{category:cat,qty,inv}=info;let note="";if(cat==="epure")note="영어 상품명만 집계";else if(cat==="exclude")note="수집 제외";else if(cat==="unknown")note="⚠ 미분류";dr.push({seller,cat,qty,inv,note,displayCat:cat});});setDetailRows(dr);setSelectedCats(new Set());};
  const handleExport=()=>{
    if(!result)return;
    const today=new Date().toISOString().slice(0,10).replace(/-/g,"");

// ── 공유 스토어 (엑셀 로드 데이터) ──
const SO_STORE = {
  jaeja: [],    // 적재
  db: [],       // DB
  jumon: [],    // ②주문서
  gagang: [],   // ①가공 주문서
  easyFile: '', // ①가공 주문서 파일명
  b2bFiles: [],  // 가공주문서 B2B파일
  loc: [],      // 로케이션 관리용
  inoutLog: [], // 입출고 기록
  locLog: [],   // 위치변경 기록
  jaejaUniq: [],// 적재-UNIQUE
  loaded: false,
  filename: '',
};

function loadSoStore(){
  try{
    const d=localStorage.getItem('so_store_v2');
    if(d){const p=JSON.parse(d);Object.assign(SO_STORE,p,{loaded:true});}
  }catch{}
  // gagang: localStorage 저장 안 함 → Supabase sbEasyLoad()에서 복원
  // b2bFiles: gg_b2bfiles 전용 키
  try{
    const b2b=localStorage.getItem('gg_b2bfiles')||localStorage.getItem('gg_b2b');
    if(b2b){
      const parsed=JSON.parse(b2b);
      if(parsed.length) SO_STORE.b2bFiles=parsed;
    }
  }catch{}
}
function saveSoStore(){
  // ── localStorage 저장 전략 ──
  // 대용량 데이터는 so_store_v2에서 완전 제외 → 각자 전용 키 or Supabase에서 재로드
  //   jaeja / db / jumon / jaejaUniq → Supabase 재로드
  //   gagang → Supabase easy_orders / 메모리(SO_STORE)만 유지, localStorage 저장 안 함
  //   b2bFiles → gg_b2bfiles 전용 키
  //   inoutLog / locLog → 최근 200건만
  //   loc → 최근 500행만
  const MAX_LOG = 200;
  const MAX_LOC = 500;
  const slim = {
    jaeja: [], db: [], jumon: [], jaejaUniq: [],
    gagang:   [],  // Supabase easy_orders 소스오브트루스 — localStorage 저장 안 함
    easyFile: SO_STORE.easyFile || '',
    b2bFiles: [], // gg_b2bfiles 키로 별도 관리
    loc:      (SO_STORE.loc || []).slice(0, MAX_LOC),
    inoutLog: (SO_STORE.inoutLog || []).slice(0, MAX_LOG),
    locLog:   (SO_STORE.locLog   || []).slice(0, MAX_LOG),
    loaded:   SO_STORE.loaded,
    filename: SO_STORE.filename,
  };
  // 단계별 fallback: 용량 초과 시 점진적으로 줄여가며 저장
  const attempts = [
    ()=>JSON.stringify(slim),
    ()=>JSON.stringify({...slim, inoutLog:(SO_STORE.inoutLog||[]).slice(0,50), locLog:(SO_STORE.locLog||[]).slice(0,50), loc:[]}),
    ()=>JSON.stringify({...slim, inoutLog:[], locLog:[], loc:[]}),
    ()=>JSON.stringify({jaeja:[],db:[],jumon:[],jaejaUniq:[],gagang:[],b2bFiles:[],loc:[],inoutLog:[],locLog:[],loaded:SO_STORE.loaded,filename:SO_STORE.filename,easyFile:SO_STORE.easyFile||''}),
  ];
  for(let i=0;i<attempts.length;i++){
    try{
      localStorage.setItem('so_store_v2', attempts[i]());
      if(i>0) console.warn(`SO store: fallback ${i} 단계로 저장 (용량 절감)`);
      return;
    }catch(e){
      if(i===attempts.length-1) console.warn('SO store save fail (최소화도 실패):', e);
    }
  }
}
loadSoStore();

function parseUnifiedBarcode(raw){
  const s=(raw||'').trim().toUpperCase();
  const parts=s.split('+');
  if(parts.length>=3) return {박스코드:parts[0],상품코드:parts[1],수량:parseInt(parts[2])||1,raw:s};
  if(parts.length===2) return {박스코드:parts[0],상품코드:parts[1],수량:1,raw:s};
  return null; // 통합바코드 형식(+구분자) 아님 → 차단
}

// ── 리사이저 훅 ──
function useSplit(init,min,max){
  const[split,setSplit]=useState(init);
  const ref=useRef();
  const dragRef=useRef({dragging:false});
  function startDrag(e){
    e.preventDefault();dragRef.current.dragging=true;
    const onMove=ev=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();setSplit(Math.min(max,Math.max(min,((ev.clientX-r.left)/r.width)*100)));};
    const onUp=()=>{dragRef.current.dragging=false;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  }
  return[split,ref,startDrag];
}

        <div style={{fontSize:16,color:C.text,marginBottom:20,lineHeight:1.6,whiteSpace:'pre-line'}}>{msg}</div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button onClick={onCancel} style={{background:C.surface,color:C.muted,border:`1px solid ${C.border}`,borderRadius:7,padding:'7px 16px',fontSize:15,cursor:'pointer'}}>취소</button>
          <button onClick={onOk} style={{background:C.red,color:'#fff',border:'none',borderRadius:7,padding:'7px 16px',fontSize:15,fontWeight:700,cursor:'pointer'}}>확인</button>
        </div>
      </div>
    </div>
  );
}

function SubMain({store,onJaejaUpdate}){
  const[searchCode,setSearchCode]=useState('');
  const[searchResult,setSearchResult]=useState([]);
  const[barcodeInput,setBarcodeInput]=useState('');
  // 그룹별 출고목록: [{ts,items:[{id,...}]}]
  const[outGroups,setOutGroups]=useState(()=>{try{const d=localStorage.getItem('subMain_outGroups');return d?JSON.parse(d):[];}catch{return [];}});
  const curSessionRef=useRef(null);
  const[selRows,setSelRows]=useState(new Set());
  const[openGroups,setOpenGroups]=useState(new Set([0]));
  const lastCheckedRef=useRef(-1);
  const[confirmModal,setConfirmModal]=useState(null);
  const[split,containerRef,startDrag]=useSplit(55,25,75);
  const[barcodeMsg,setBarcodeMsg]=useState(null);
  const searchRef=useRef();
  const xlsxRef=useRef();

  const flatRows=React.useMemo(()=>outGroups.flatMap(g=>g.items),[outGroups]);

  useEffect(()=>{try{localStorage.setItem('subMain_outGroups',JSON.stringify(outGroups));}catch{}},[outGroups]);

  function doSearch(code){
    const c=(code||searchCode).trim().toUpperCase();
    if(!c){setSearchResult([]);return;}
    const found=(store.jaeja||[]).filter(r=>r.바코드.toUpperCase()===c);
    setSearchResult(found.length?found:[{_notfound:true}]);
  }
  function handleBarcodeEnter(e){
    if(e.key!=='Enter')return;
    const raw=barcodeInput.trim();if(!raw){setBarcodeInput('');return;}
    addToOutList(raw);
    setBarcodeInput('');
  }
  function addToOutList(raw){
    let parsed=parseUnifiedBarcode(raw);
    // ── SMZ 소량존: 통합바코드 형식 아니면 SMZ 박스코드 단독 스캔으로 처리 ──
    if(!parsed){
      const code=raw.trim().toUpperCase();
      if(!code){ setBarcodeMsg({type:'error',msg:'❌ 입력값이 없습니다.'}); return; }
      // SMZ로 시작하면 박스코드 단독 스캔으로 처리
      if(code.startsWith('SMZ')){
        const jr=(store.jaeja||[]).find(r=>r.박스코드===code);
        if(!jr){
          setBarcodeMsg({type:'error',msg:`❌ 적재 미등록: ${code} — 적재현황에 없는 SMZ 박스입니다`});
          return;
        }
        if(flatRows.find(r=>r.박스코드===code)){
          setBarcodeMsg({type:'warn',msg:`⚠️ 중복 스캔: ${code} — 이미 출고 목록에 있습니다`});
          return;
        }
        addItemToGroups({id:Date.now(),raw,
          박스코드:jr.박스코드, 상품코드:jr.바코드||'', 수량:jr.수량||1,
          상품명:jr.상품명||'', 옵션명:jr.옵션명||'',
          상품위치:jr.상품위치||'', 출고여부:'SMZ'});
        setBarcodeMsg({type:'ok',msg:`📦 SMZ 출고 추가: ${code} — ${jr.상품명||''} 📍${jr.상품위치||'-'}`});
        return;
      }
      setBarcodeMsg({type:'error',msg:`❌ 형식 오류: "${raw}" — 통합바코드(박스코드+상품코드+수량) 또는 SMZ 박스코드로 스캔하세요`});
      return;
    }
    const boxCode=parsed.박스코드;

    // ── 검증 1: 박스코드 최소 길이
    if(!boxCode||boxCode.length<3){
      setBarcodeMsg({type:'error',msg:`❌ 박스코드 오류: "${boxCode}" — 형식 확인 (박스코드+상품코드+수량)`});
      return;
    }
    // ── 검증 2: 출고 목록 중복 차단
    if(flatRows.find(r=>r.박스코드===boxCode)){
      setBarcodeMsg({type:'warn',msg:`⚠️ 중복 스캔: ${boxCode} — 이미 출고 목록에 있습니다`});
      return;
    }
    // ── 검증 3: 적재현황 조회 → 미등록이면 차단
    const jr=(store.jaeja||[]).find(r=>r.박스코드===boxCode);
    if(!jr&&store.jaeja&&store.jaeja.length>0){
      setBarcodeMsg({type:'error',msg:`❌ 적재 미등록: ${boxCode} — 적재현황에 없는 박스입니다`});
      return;
    }
    const dr=(store.db||[]).find(r=>r.상품코드===parsed.상품코드||r.바코드===parsed.상품코드);
    // DB 룩업: 상품코드(upper)로 추가 조회
    const dbLookup=(store.db||[]).find(r=>(r.상품코드||'').toUpperCase()===(parsed.상품코드||'').toUpperCase()||(r.바코드||'').toUpperCase()===(parsed.상품코드||'').toUpperCase());
    const resolvedName=jr?.상품명||dr?.상품명||dbLookup?.상품명||'';
    const resolvedOpt=jr?.옵션명||dr?.옵션||dbLookup?.옵션||'';
    const 출고여부=jr?'정상':(store.jaeja&&store.jaeja.length>0?'❌':'⚠️미확인');
    addItemToGroups({id:Date.now(),raw,박스코드:boxCode,상품코드:parsed.상품코드,수량:parsed.수량,
      상품명:resolvedName,옵션명:resolvedOpt,상품위치:jr?.상품위치||'',출고여부});
    setBarcodeMsg({type:'ok',msg:`✅ ${boxCode} — ${jr?.상품명||''}  📍${jr?.상품위치||'-'}`});
  }
  function handleXlsxUpload(e){
    const file=e.target.files[0];if(!file)return;
    e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        rows.forEach(r=>{
          const raw=String(r['통합바코드']||r['바코드']||r[Object.keys(r)[0]]||'').trim();
          if(raw) addToOutList(raw);
        });
      }catch(err){alert('엑셀 파싱 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }
  // 그룹에 아이템 추가 (현재 세션 키 기준)
  function addItemToGroups(item){
    const now=new Date();
    const tsKey=now.toLocaleString('ko-KR');
    if(!curSessionRef.current) curSessionRef.current=tsKey;
    const sessionKey=curSessionRef.current;
    setOutGroups(prev=>{
      const idx=prev.findIndex(g=>g.ts===sessionKey);
      if(idx>=0){
        const next=[...prev];
        next[idx]={...next[idx],items:[...next[idx].items,item]};
        return next;
      }
      setOpenGroups(s=>new Set([...s,0]));
      return [{ts:sessionKey,items:[item]},...prev];
    });
  }

  const checkedCount=selRows.size;

  function handleCheck(globalIdx,e){
    e.stopPropagation();
    const next=new Set(selRows);
    if(e.shiftKey&&lastCheckedRef.current>=0){
      const from=Math.min(lastCheckedRef.current,globalIdx);
      const to=Math.max(lastCheckedRef.current,globalIdx);
      const adding=!next.has(globalIdx);
      for(let k=from;k<=to;k++) adding?next.add(k):next.delete(k);
    } else {
      next.has(globalIdx)?next.delete(globalIdx):next.add(globalIdx);
    }
    lastCheckedRef.current=globalIdx;
    setSelRows(next);
  }

  function deleteSelected(){
    if(!selRows.size) return;
    setConfirmModal({
      msg:`선택한 ${selRows.size}개 항목을 삭제하시겠습니까?`,
      onOk:()=>{
        const selectedIds=new Set([...selRows].map(i=>flatRows[i]?.id).filter(Boolean));
        setOutGroups(prev=>prev.map(g=>({...g,items:g.items.filter(r=>!selectedIds.has(r.id))})).filter(g=>g.items.length>0));
        setSelRows(new Set());
        setConfirmModal(null);
      }
    });
  }
  function deleteGroup(ts){
    setConfirmModal({
      msg:`이 스캔 묶음 전체를 삭제하시겠습니까?`,
      onOk:()=>{
        setOutGroups(prev=>prev.filter(g=>g.ts!==ts));
        setSelRows(new Set());
        setConfirmModal(null);
      }
    });
  }
  function clearAll(){
    setConfirmModal({
      msg:`출고 목록 전체(${flatRows.length}개)를 초기화하시겠습니까?`,
      onOk:()=>{setOutGroups([]);curSessionRef.current=null;setSelRows(new Set());setConfirmModal(null);}
    });
  }
  function doShipOut(targets){
    if(!targets||!targets.length){alert('출고할 항목이 없습니다.');return;}
    const boxSet=new Set(targets.map(r=>r.박스코드));
    const label=`${targets.length}개`;
    setConfirmModal({
      msg:`${label} 항목을 출고 처리하시겠습니까?\n적재현황에서 해당 박스가 제거됩니다.`,
      onOk:async()=>{
        setConfirmModal(null);
        await withLock('출고', async()=>{
          const nowStr=new Date().toLocaleString('ko-KR');
          const newLogs=targets.map(r=>({
            박스코드:r.박스코드, 바코드:r.상품코드||'', 수량:r.수량||0,
            위치:r.상품위치||'', 상품명:r.상품명||'', 옵션:r.옵션명||'',
            작업일시:nowStr, 입출고:'출고',
          }));
          await sbShipOut([...boxSet], newLogs);
          const newJaeja=(store.jaeja||[]).filter(r=>!boxSet.has(r.박스코드));
          const newInoutLog=[...(SO_STORE.inoutLog||[]),...newLogs];
          Object.assign(SO_STORE,{jaeja:newJaeja,inoutLog:newInoutLog});
          saveSoStore();
          if(onJaejaUpdate) onJaejaUpdate(newJaejaWithLoc);
          const targetIds=new Set(targets.map(r=>r.id));
          setOutGroups(prev=>prev.map(g=>({...g,items:g.items.filter(r=>!targetIds.has(r.id))})).filter(g=>g.items.length>0));
          setSelRows(new Set());
          alert(`✅ 출고 완료: ${targets.length}개 박스가 적재현황에서 제거되었습니다.`);
        }, msg=>alert(msg));
      }
    });
  }

  const searchQty=searchResult.filter(r=>!r._notfound).reduce((a,r)=>a+(Number(r.수량)||0),0);

  return(
    <div ref={containerRef} style={{flex:1,minHeight:0,display:'flex',overflow:'hidden'}}>
      {confirmModal&&<ConfirmModal msg={confirmModal.msg} onOk={confirmModal.onOk} onCancel={()=>setConfirmModal(null)}/>}
      <div style={{flex:`0 0 ${split}%`,display:'flex',flexDirection:'column',padding:16,gap:10,overflow:'hidden'}}>
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontSize:15,fontWeight:700,color:C.text}}>🔍 상품코드 검색</span>
            {searchQty>0&&<span style={{background:C.accentSoft,color:C.accent,borderRadius:8,padding:'1px 8px',fontSize:14,fontWeight:700}}>검색수량: {searchQty}</span>}
          </div>
          <div style={{display:'flex',gap:6}}>
            <input ref={searchRef} value={searchCode} onChange={e=>setSearchCode(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==='Enter'&&doSearch()}
              placeholder='상품코드 입력 후 Enter' autoFocus
              style={{flex:1,background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:7,padding:'8px 11px',fontSize:16,color:C.text,outline:'none',fontFamily:'monospace'}}/>
            <button onClick={()=>doSearch()} style={{background:C.accent,color:'#fff',border:'none',borderRadius:7,padding:'8px 16px',fontSize:14,fontWeight:700,cursor:'pointer'}}>검색</button>
            <button onClick={()=>{setSearchCode('');setSearchResult([]);}} style={{background:C.surface,color:C.muted,border:`1px solid ${C.border}`,borderRadius:7,padding:'8px 10px',fontSize:14,cursor:'pointer'}}>✕</button>
          </div>
        </div>
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{display:'grid',gridTemplateColumns:'125px 100px 50px 115px 100px 65px 50px 1fr 1fr',padding:'7px 12px',background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700,color:C.muted,flexShrink:0}}>
            {['박스코드','바코드','수량','상품위치','로케이션','출고여부','입고','상품명','옵션'].map(h=><div key={h} style={{textAlign:'center'}}>{h}</div>)}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {!searchResult.length&&<div style={{padding:32,textAlign:'center',color:C.muted,fontSize:15}}>상품코드를 입력하면 적재된 모든 박스를 조회합니다</div>}
            {searchResult[0]?._notfound&&<div style={{padding:20,textAlign:'center',color:C.red,fontSize:15,fontWeight:600}}>❌ 적재 시트에 해당 상품코드가 없습니다</div>}
            {searchResult.filter(r=>!r._notfound).map((r,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'125px 100px 50px 115px 100px 65px 50px 1fr 1fr',padding:'7px 12px',borderBottom:`1px solid ${C.border}33`,background:i%2?C.bg:'transparent',fontSize:13,alignItems:'center'}}>
                <div style={{fontFamily:'monospace',fontWeight:700,color:C.text,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.박스코드}</div>
                <div style={{fontFamily:'monospace',color:C.accent,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.바코드}</div>
                <div style={{fontWeight:700,color:C.text,textAlign:'center'}}>{r.수량}</div>
                <div style={{color:C.muted,fontSize:12,textAlign:'center'}}>{r.상품위치}</div>
                <div style={{color:C.purple,fontSize:12,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.로케이션}</div>
                <div style={{textAlign:'center'}}><span style={{fontSize:11,padding:'1px 4px',borderRadius:3,fontWeight:700,background:r.출고여부==='Y'||r.출고여부==='출고'?C.orangeSoft:C.greenSoft,color:r.출고여부==='Y'||r.출고여부==='출고'?C.orange:C.green}}>{r.출고여부||'-'}</span></div>
                <div style={{fontSize:12,color:C.purple,fontWeight:700,textAlign:'center'}}>{r.입고||'-'}</div>
                <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,textAlign:'center'}}>{r.상품명}</div>
                <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:C.muted,textAlign:'center'}}>{r.옵션명}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <Resizer onMouseDown={startDrag}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',padding:16,paddingLeft:10,gap:10,overflow:'hidden'}}>
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
            <span style={{fontSize:15,fontWeight:700,color:C.text}}>📤 통합바코드 입력</span>
            {flatRows.length>0&&<span style={{background:C.orangeSoft,color:C.orange,border:`1px solid ${C.orange}44`,borderRadius:7,padding:'2px 8px',fontSize:13,fontWeight:700}}>대기 {flatRows.length}건</span>}
            <div style={{flex:1}}/>
            <label style={{background:C.surface,color:C.accent,border:`1px solid ${C.accent}`,borderRadius:7,padding:'5px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              📂 엑셀 업로드
              <input ref={xlsxRef} type='file' accept='.xlsx,.xls,.xlsm' onChange={handleXlsxUpload} style={{display:'none'}}/>
            </label>
          </div>
          <input value={barcodeInput} onChange={e=>{setBarcodeInput(e.target.value);setBarcodeMsg(null);}} onKeyDown={handleBarcodeEnter}
            placeholder='통합바코드 스캔 후 Enter (박스코드+상품코드+수량)'
            style={{width:'100%',background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:7,padding:'8px 11px',fontSize:15,color:C.text,outline:'none',boxSizing:'border-box'}}/>
          {barcodeMsg&&(
            <div style={{marginTop:6,padding:'7px 12px',borderRadius:7,fontSize:14,fontWeight:600,
              background:barcodeMsg.type==='ok'?C.greenSoft:barcodeMsg.type==='warn'?C.orangeSoft:C.redSoft,
              color:barcodeMsg.type==='ok'?C.green:barcodeMsg.type==='warn'?C.orange:C.red}}>
              {barcodeMsg.msg}
            </div>
          )}
        </div>
        {/* 출고 목록 - 단포출력기록 형태 */}
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'7px 12px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:6,flexShrink:0,flexWrap:'wrap'}}>
            <input type='checkbox' title='전체선택'
              checked={flatRows.length>0&&selRows.size===flatRows.length}
              onChange={ev=>{if(ev.target.checked)setSelRows(new Set(flatRows.map((_,i)=>i)));else setSelRows(new Set());}}
              style={{cursor:'pointer',width:15,height:15}}/>
            <span style={{fontSize:15,fontWeight:700,color:C.text}}>📦 출고 목록 ({flatRows.length})</span>
            <div style={{flex:1}}/>
            {selRows.size>0&&<>
              <span style={{fontSize:13,color:C.muted}}>{selRows.size}개 선택</span>
              <button onClick={deleteSelected} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,padding:'4px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>🗑 선택삭제</button>
              <button onClick={()=>doShipOut([...selRows].map(i=>flatRows[i]).filter(Boolean))}
                style={{background:C.green,color:'#fff',border:'none',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                ✅ 선택({selRows.size}) 출고
              </button>
            </>}
            {flatRows.length>0&&selRows.size===0&&<>
              <button onClick={()=>doShipOut(flatRows)}
                style={{background:C.green,color:'#fff',border:'none',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                ✅ 전체 출고
              </button>
              <button onClick={clearAll} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,padding:'4px 10px',fontSize:13,cursor:'pointer'}}>초기화</button>
            </>}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {!outGroups.length&&<div style={{padding:32,textAlign:'center',color:C.muted,fontSize:15}}>통합바코드를 스캔하면 여기에 표시됩니다</div>}
            {(()=>{
              let globalIdx=0;
              return outGroups.map((g,gi)=>{
                const isOpen=openGroups.has(gi);
                const groupStart=globalIdx;
                const groupEnd=globalIdx+g.items.length-1;
                const groupIndices=g.items.map((_,k)=>groupStart+k);
                globalIdx+=g.items.length;
                const allSel=groupIndices.every(i=>selRows.has(i));
                const someSel=groupIndices.some(i=>selRows.has(i));
                const groupQty=g.items.reduce((a,r)=>a+(Number(r.수량)||0),0);
                const bgH=gi%2===0?'#f0f7ff':'#f7f0ff';
                const handleGroupCheck=ev=>{
                  ev.stopPropagation();
                  const next=new Set(selRows);
                  if(allSel) groupIndices.forEach(i=>next.delete(i));
                  else groupIndices.forEach(i=>next.add(i));
                  lastCheckedRef.current=-1;
                  setSelRows(next);
                };
                return(
                  <React.Fragment key={gi}>
                    <div onClick={()=>{const next=new Set(openGroups);isOpen?next.delete(gi):next.add(gi);setOpenGroups(next);}}
                      style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',background:bgH,borderBottom:`1px solid ${C.border}66`,cursor:'pointer',userSelect:'none',position:'sticky',top:0,zIndex:1}}>
                      <input type='checkbox' checked={allSel} ref={el=>{if(el)el.indeterminate=someSel&&!allSel;}}
                        onChange={handleGroupCheck} onClick={e=>e.stopPropagation()}
                        style={{cursor:'pointer',width:14,height:14,flexShrink:0}}/>
                      <span style={{fontSize:13,color:C.accent,transform:isOpen?'rotate(90deg)':'rotate(0deg)',display:'inline-block',transition:'transform .15s',width:14,textAlign:'center',flexShrink:0}}>▶</span>
                      <span style={{fontSize:12,fontWeight:700,color:C.text,flex:1}}>{g.ts||'시간 없음'}</span>
                      <span style={{fontSize:11,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'1px 8px',flexShrink:0}}>{g.items.length}건 / {groupQty}족</span>
                      {someSel&&<span style={{fontSize:11,color:C.accent,fontWeight:700,flexShrink:0}}>{groupIndices.filter(i=>selRows.has(i)).length}선택</span>}
                      <button onClick={e=>{e.stopPropagation();doShipOut(g.items);}}
                        style={{background:C.green,color:'#fff',border:'none',borderRadius:5,padding:'2px 8px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>출고</button>
                      <button onClick={e=>{e.stopPropagation();deleteGroup(g.ts);}}
                        style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}33`,borderRadius:5,padding:'2px 7px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>삭제</button>
                    </div>
                    {isOpen&&g.items.map((r,ri)=>{
                      const gIdx=groupStart+ri;
                      return(
                        <div key={r.id} onClick={e=>handleCheck(gIdx,e)}
                          style={{display:'flex',alignItems:'center',gap:0,background:selRows.has(gIdx)?C.accentSoft:ri%2===0?'#ffffff':'#fafafa',borderBottom:`1px solid ${C.border}33`,cursor:'pointer',fontSize:12}}>
                          <div style={{padding:'5px 8px',width:28,flexShrink:0}}>
                            <input type='checkbox' checked={selRows.has(gIdx)} onChange={()=>{}} onClick={e=>handleCheck(gIdx,e)} style={{pointerEvents:'none',width:13,height:13}}/>
                          </div>
                          <div style={{padding:'5px 4px',fontFamily:'monospace',fontWeight:700,color:C.text,whiteSpace:'nowrap',minWidth:110}}>{r.박스코드}</div>
                          <div style={{padding:'5px 4px',fontFamily:'monospace',color:C.accent,whiteSpace:'nowrap',minWidth:90}}>{r.상품코드}</div>
                          <div style={{padding:'5px 4px',fontWeight:700,minWidth:32,textAlign:'right'}}>{r.수량}</div>
                          <div style={{padding:'5px 4px',color:C.muted,fontSize:11,whiteSpace:'nowrap',minWidth:80}}>{r.상품위치}</div>
                          <div style={{padding:'5px 4px',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.상품명}</div>
                          <div style={{padding:'5px 4px',color:C.muted,fontSize:11,whiteSpace:'nowrap',minWidth:70,flexShrink:0}}>{r.옵션명||''}</div>
                          <div style={{padding:'5px 6px',flexShrink:0}}>
                            <span style={{background:r.출고여부==='❌'?C.redSoft:C.greenSoft,color:r.출고여부==='❌'?C.red:C.green,borderRadius:4,padding:'1px 5px',fontSize:11,fontWeight:700}}>
                              {r.출고여부==='❌'?'미등록':'정상'}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </React.Fragment>
                );
              });
            })()}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ② 가공주문서 ──
function SubGagang({store,onGagangUpdate}){
  // ① 이지어드민 주문서
  const[easyRows,setEasyRowsState]=useState(()=>SO_STORE.gagang||[]);
  const[easyFile,setEasyFileState]=useState(()=>SO_STORE.easyFile||'');
  const[easySyncStatus,setEasySyncStatus]=useState('');
  // B2B 주문건 리스트
  const[b2bFiles,setB2bFilesState]=useState(()=>{
    // SO_STORE 우선, 없으면 localStorage
    if(SO_STORE.b2bFiles && SO_STORE.b2bFiles.length) return SO_STORE.b2bFiles;
    try{ return JSON.parse(localStorage.getItem('gg_b2bfiles')||localStorage.getItem('gg_b2b')||'[]'); }catch{ return []; }
  });
  const[b2bSyncStatus,setB2bSyncStatus]=useState('');
  const[search,setSearch]=useState('');

  function setEasyRows(rows) {
    SO_STORE.gagang = rows;
    // localStorage 저장 안 함 — Supabase가 소스오브트루스, 메모리(SO_STORE)만 유지
    setEasyRowsState(rows);
    if (onGagangUpdate) onGagangUpdate(rows, SO_STORE.b2bFiles || []);
  }
  function setEasyFile(name) {
    SO_STORE.easyFile = name;
    setEasyFileState(name);
  }

  function setB2bFiles(files){
    SO_STORE.b2bFiles = files;
    try{ localStorage.setItem('gg_b2bfiles', JSON.stringify(files)); }catch{}
    setB2bFilesState(files);
    if(onGagangUpdate) onGagangUpdate(easyRows, files);
  }

  useEffect(()=>{
    // Easy 이지어드민 Realtime 콜백
    _sbEasyCallback = (rows, fileName) => {
      setEasyRowsState(rows);
      setEasyFileState(fileName);
      SO_STORE.gagang = rows;
      SO_STORE.easyFile = fileName;
      if (onGagangUpdate) onGagangUpdate(rows, SO_STORE.b2bFiles || []);
    };
    // 마운트 시 1회 최신 데이터 확인
    if (localStorage.getItem('sb_was_loaded')) {
      sbEasyLoad().then(({ rows, fileName }) => {
        const curSig = easyRows.length + '_' + easyFile;
        const newSig = rows.length + '_' + fileName;
        if (curSig !== newSig) { setEasyRows(rows); setEasyFile(fileName); }
      }).catch(() => {});
    }
    // B2B Realtime(b2b_orders) 수신 시 state 직접 업데이트
    _sbB2bCallback = (files) => {
      setB2bFilesState(files);
      SO_STORE.b2bFiles = files;
    };
    // 마운트 시 1회 최신 데이터 확인
    if(localStorage.getItem('sb_was_loaded')){
      sbB2bLoad().then(files=>{
        const curSig = b2bFiles.map(f=>String(f.id)+'_'+f.rows.length).sort().join(',');
        const newSig = files.map(f=>String(f.id)+'_'+f.rows.length).sort().join(',');
        if(curSig !== newSig) setB2bFiles(files);
      }).catch(()=>{});
    }
    return ()=>{ _sbB2bCallback = null; _sbEasyCallback = null; };
  // eslint-disable-next-line
  },[]);
  const easyRef=useRef();
  const b2bRef=useRef();
  // ── 가공주문서 3열 리사이저 ──
  const[ggSplit1,setGgSplit1]=useState(25); // 열1 너비 %
  const[ggSplit2,setGgSplit2]=useState(25); // 열2 너비 %
  // 열3은 flex:1 (나머지)
  const ggContRef=useRef();
  const startGgDrag1=e=>{
    e.preventDefault();
    const onMove=ev=>{
      if(!ggContRef.current)return;
      const rect=ggContRef.current.getBoundingClientRect();
      const pct=Math.min(45,Math.max(15,((ev.clientX-rect.left)/rect.width)*100));
      setGgSplit1(pct);
    };
    const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };
  const startGgDrag2=e=>{
    e.preventDefault();
    const onMove=ev=>{
      if(!ggContRef.current)return;
      const rect=ggContRef.current.getBoundingClientRect();
      const pct=Math.min(50,Math.max(15,((ev.clientX-rect.left)/rect.width)*100));
      // split2 = pct - split1, 최소 10%
      setGgSplit2(v=>Math.min(45,Math.max(10,pct-ggSplit1)));
    };
    const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  // localStorage 동기화는 setEasyRows()/setB2bFiles()에서 직접 처리

  // B2B VLOOKUP 맵: 바코드 → 총 주문수량
  const b2bMap=React.useMemo(()=>{
    const m={};
    b2bFiles.forEach(f=>f.rows.forEach(r=>{
      const bc=String(r.바코드||'').trim().toUpperCase();
      if(bc) m[bc]=(m[bc]||0)+(Number(r.주문수량)||0);
    }));
    return m;
  },[b2bFiles]);

  // 적재현황 상품수 맵: 바코드 → 상품수(수량) 합산
  // store.jaejaUniq 없으면 store.jaeja에서 직접 집계 (폴백)
  const jaejaQtyMap=React.useMemo(()=>{
    const m={};
    const uniq=(store.jaejaUniq&&store.jaejaUniq.length>0)
      ? store.jaejaUniq
      : null;
    if(uniq){
      uniq.forEach(r=>{
        const bc=(r.바코드||'').toUpperCase().trim();
        if(bc) m[bc]=Number(r.상품수)||0;
      });
    } else {
      (store.jaeja||[]).forEach(r=>{
        const bc=(r.바코드||'').toUpperCase().trim();
        if(!bc) return;
        m[bc]=(m[bc]||0)+(Number(r.수량)||0);
      });
    }
    return m;
  },[store.jaejaUniq, store.jaeja]);

  // 최종값 = A(접수+송장) - B(정상재고-적재수량) - C(B2B)
  // B = 로케이션수량 = 정상재고 - 적재현황 상품수 (최소 0)
  const finalRows=React.useMemo(()=>easyRows.map(r=>{
    const bc=r.바코드?.toUpperCase()||'';
    const b2bQty=b2bMap[bc]||0;
    const stock=Number(r.정상재고)||0;
    const jaejaQty=jaejaQtyMap[bc]||0;
    const locQty=Math.max(0, stock-jaejaQty); // B = 로케이션수량
    const final=Math.max(0,(r.접수송장||0)-locQty-b2bQty);
    return {...r, B2B주문:b2bQty, 로케이션수량:locQty, 최종접수송장:final};
  }),[easyRows,b2bMap,jaejaQtyMap]);

  const filtered=search?finalRows.filter(r=>r.바코드?.includes(search.toUpperCase())):finalRows;

  function loadEasy(e){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets['①가공 주문서']||wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        const parsed=rows.map(r=>({
          바코드:String(r['바코드']||'').trim().toUpperCase(),
          접수송장:Number(r['접수+송장'])||0,
          정상재고:Number(r['정상재고'])||0,
          B2B주문:Number(r['B2B 주문수량\nNO TOUCH'])||0,
        })).filter(r=>r.바코드);
        setEasyRows(parsed);
        setEasyFile(file.name);
        // Supabase 동기화
        if(localStorage.getItem('sb_was_loaded')){
          setEasySyncStatus('☁️ 업로드 중…');
          sbEasySave(parsed, file.name)
            .then(()=>setEasySyncStatus('✅ 동기화 완료'))
            .catch(e=>setEasySyncStatus('❌ '+e.message))
            .finally(()=>setTimeout(()=>setEasySyncStatus(''),3000));
        }
        alert('✅ 이지어드민 주문서 '+parsed.length+'행 로드');
      }catch(err){alert('파싱 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function loadB2B(e){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        const parsed=rows.map(r=>({
          바코드:String(r['바코드']||r[Object.keys(r)[0]]||'').trim().toUpperCase(),
          주문수량:Number(r['주문수량']||r[Object.keys(r)[1]])||0,
        })).filter(r=>r.바코드);
        const newFile={id:Date.now(),name:file.name,rows:parsed};
        setB2bFiles([...b2bFiles, newFile]);
        // Supabase 동기화
        if(localStorage.getItem('sb_was_loaded')){
          setB2bSyncStatus('☁️ 업로드 중…');
          sbB2bAddFile(newFile)
            .then(()=>setB2bSyncStatus('✅ 동기화 완료'))
            .catch(e=>setB2bSyncStatus('❌ '+e.message))
            .finally(()=>setTimeout(()=>setB2bSyncStatus(''),3000));
        }
        alert('✅ B2B 주문서 '+parsed.length+'행 추가: '+file.name);
      }catch(err){alert('파싱 실패: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  const totalFinalQty=finalRows.reduce((s,r)=>s+(r.최종접수송장||0),0);

  // 리사이저 스타일 헬퍼
  const resizerStyle={width:6,flexShrink:0,cursor:'col-resize',background:'transparent',borderLeft:`2px solid ${C.border}`,transition:'background .15s',zIndex:10,userSelect:'none'};

  return(
    <div ref={ggContRef} style={{flex:1,minHeight:0,display:'flex',overflow:'hidden'}}>
      {/* ── 열1: 이지어드민 주문서 (25%) ── */}
      <div style={{flex:`0 0 ${ggSplit1}%`,minHeight:0,display:'flex',flexDirection:'column',gap:8,overflow:'hidden',padding:16}}>
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>① 이지어드민 주문서</span>
            {easySyncStatus&&<span style={{fontSize:11,color:easySyncStatus.startsWith('✅')?C.green:easySyncStatus.startsWith('❌')?C.red:C.orange,background:easySyncStatus.startsWith('✅')?C.greenSoft:easySyncStatus.startsWith('❌')?C.redSoft:C.orangeSoft,borderRadius:4,padding:'2px 7px',fontWeight:700}}>{easySyncStatus}</span>}
            <div style={{flex:1}}/>
            {easyRows.length>0&&(
              <button onClick={()=>{if(!window.confirm('이지어드민 주문서를 초기화하시겠습니까?'))return;setEasyRows([]);setEasyFile('');if(localStorage.getItem('sb_was_loaded')){setEasySyncStatus('☁️ 삭제 중…');sbEasyReset().then(()=>setEasySyncStatus('✅ 삭제 완료')).catch(e=>setEasySyncStatus('❌ '+e.message)).finally(()=>setTimeout(()=>setEasySyncStatus(''),3000));}}}
                style={{background:C.redSoft,color:C.red,border:'1px solid #dc262644',borderRadius:6,padding:'4px 10px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                삭제
              </button>
            )}
            <label style={{background:C.accent,color:'#fff',borderRadius:6,padding:'5px 12px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              📂 업로드<input ref={easyRef} type='file' accept='.xlsx,.xls,.xlsm' onChange={loadEasy} style={{display:'none'}}/>
            </label>
          </div>
          {easyFile&&<div style={{fontSize:12,color:C.muted,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📄 {easyFile} ({easyRows.length}행)</div>}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder='바코드 검색…'
            style={{width:'100%',boxSizing:'border-box',background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:'7px 10px',fontSize:13,color:C.text,outline:'none'}}/>
        </div>
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 58px 58px 28px',padding:'7px 12px',background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:12,fontWeight:700,color:C.muted}}>
            {['바코드','접수+송장','정상재고',''].map((h,hi)=><div key={hi} style={{textAlign:h==='바코드'?'left':'right'}}>{h}</div>)}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {!easyRows.length&&<div style={{padding:20,textAlign:'center',color:C.muted,fontSize:14}}>파일을 업로드하세요</div>}
            {filtered.slice(0,500).map((r,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 58px 58px 28px',padding:'4px 12px',borderBottom:`1px solid ${C.border}22`,background:i%2?C.bg:'transparent',fontSize:13,alignItems:'center'}}>
                <div style={{fontFamily:'monospace',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.바코드}</div>
                <div style={{textAlign:'right',color:C.accent}}>{r.접수송장||0}</div>
                <div style={{textAlign:'right',color:C.green}}>{r.정상재고||0}</div>
                <button onClick={()=>{const next=easyRows.filter(x=>x.바코드!==r.바코드);setEasyRows(next);if(localStorage.getItem('sb_was_loaded'))sbEasySave(next,easyFile).catch(e=>console.warn('Easy SB 저장 실패',e));}}
                  style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13,padding:0,textAlign:'center'}}
                  title={r.바코드+' 행 삭제'}>✕</button>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── 리사이저1 ── */}
      <div onMouseDown={startGgDrag1} style={resizerStyle}
        onMouseEnter={e=>e.currentTarget.style.background=C.accent+'44'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>

      {/* ── 열2: 최종값 (25%) ── */}
      <div style={{flex:`0 0 ${ggSplit2}%`,minHeight:0,display:'flex',flexDirection:'column',gap:8,overflow:'hidden',padding:'16px 0 16px 16px'}}>
        <div style={{background:C.accentSoft,border:`1.5px solid ${C.accent}44`,borderRadius:10,padding:'12px 14px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
            <span style={{fontSize:14,fontWeight:700,color:C.accent}}>최종값 (접수+송장 기준)</span>
          </div>
          <div style={{fontSize:12,color:C.muted}}>A − B − C &nbsp;|&nbsp; A=접수+송장 &nbsp;B=로케이션수량(정상재고-적재수량) &nbsp;C=B2B</div>
          <div style={{marginTop:6,fontSize:15,fontWeight:800,color:C.accent}}>총 {totalFinalQty.toLocaleString()}개</div>
        </div>
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.accent}44`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{display:'grid',gridTemplateColumns:'110px 60px 72px 60px 58px',padding:'7px 8px',background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:700,color:C.muted}}>
            {['바코드','접수송장','로케이션차감','B2B차감','최종값'].map(h=><div key={h} style={{textAlign:'center',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{h}</div>)}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {!finalRows.length&&<div style={{padding:20,textAlign:'center',color:C.muted,fontSize:14}}>데이터 없음</div>}
            {filtered.slice(0,500).map((r,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'110px 60px 72px 60px 58px',padding:'4px 8px',borderBottom:`1px solid ${C.border}22`,background:i%2?C.bg:'transparent',fontSize:12,alignItems:'center'}}>
                <div style={{fontFamily:'monospace',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{r.바코드}</div>
                <div style={{textAlign:'center',color:C.muted}}>{r.접수송장||0}</div>
                <div style={{textAlign:'center',color:C.green}}>-{r.로케이션수량||0}</div>
                <div style={{textAlign:'center',color:C.orange}}>-{r.B2B주문||0}</div>
                <div style={{textAlign:'center',fontWeight:800,color:C.accent}}>{r.최종접수송장||0}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── 리사이저2 ── */}
      <div onMouseDown={startGgDrag2} style={resizerStyle}
        onMouseEnter={e=>e.currentTarget.style.background=C.accent+'44'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>

      {/* ── 열3: B2B 주문건 리스트 (flex:1 = 나머지 ~50%) ── */}
      <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',gap:8,overflow:'hidden',padding:'16px 16px 16px 16px'}}>
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>B2B 주문건 리스트</span>
            {b2bSyncStatus&&<span style={{fontSize:11,color:b2bSyncStatus.startsWith('✅')?C.green:b2bSyncStatus.startsWith('❌')?C.red:C.orange,background:b2bSyncStatus.startsWith('✅')?C.greenSoft:b2bSyncStatus.startsWith('❌')?C.redSoft:C.orangeSoft,borderRadius:4,padding:'2px 7px',fontWeight:700}}>{b2bSyncStatus}</span>}
            {b2bFiles.length>0&&(()=>{
              const totalAllQty=b2bFiles.reduce((sum,f)=>sum+f.rows.reduce((s,r)=>s+(Number(r.주문수량)||0),0),0);
              return (
                <div style={{display:'flex',alignItems:'center',gap:5,background:C.orangeSoft,border:`1.5px solid ${C.orange}`,borderRadius:8,padding:'3px 10px'}}>
                  <span style={{fontSize:12,color:C.muted}}>전체</span>
                  <span style={{fontSize:15,fontWeight:900,color:C.orange}}>{totalAllQty.toLocaleString()}</span>
                  <span style={{fontSize:11,color:C.muted}}>개</span>
                </div>
              );
            })()}
            <div style={{flex:1}}/>
            <label style={{background:C.orange,color:'#fff',borderRadius:6,padding:'5px 12px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              + 파일추가<input ref={b2bRef} type='file' accept='.xlsx,.xls,.xlsm' onChange={loadB2B} style={{display:'none'}}/>
            </label>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,maxHeight:64,overflowY:'auto'}}>
            {!b2bFiles.length&&<span style={{fontSize:12,color:C.muted}}>파일을 추가하면 바코드+주문수량이 합산됩니다</span>}
            {b2bFiles.map(f=>(
              <div key={f.id} style={{display:'flex',alignItems:'center',gap:3,background:C.orangeSoft,border:`1px solid ${C.orange}44`,borderRadius:5,padding:'3px 8px',fontSize:12}}>
                <span style={{color:C.orange,fontWeight:600,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                <span style={{color:C.muted}}>({f.rows.length}행)</span>
                <button onClick={()=>{
                  if(!window.confirm(`"${f.name}" 파일을 삭제하시겠습니까?`))return;
                  setB2bFiles(b2bFiles.filter(x=>x.id!==f.id));
                  if(localStorage.getItem('sb_was_loaded')){
                    sbB2bDeleteFile(f.id).catch(e=>console.warn('B2B SB 삭제 실패',e));
                  }
                }} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13,padding:'0 2px'}}>✕</button>
              </div>
            ))}
          </div>
        </div>
        {/* B2B 파일별 데이터를 옆으로 나란히 표시 */}
        <div style={{flex:1,minHeight:0,overflowX:'auto',overflowY:'auto',display:'flex',gap:8}}>
          {!b2bFiles.length&&<div style={{flex:1,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:20,textAlign:'center',color:C.muted,fontSize:14}}>B2B 주문서를 추가하세요</div>}
          {(()=>{
            return b2bFiles.map(f=>{
              const fileQty=f.rows.reduce((s,r)=>s+(Number(r.주문수량)||0),0);
              return (
                <div key={f.id} style={{minWidth:180,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column',flexShrink:0}}>
                  <div style={{padding:'7px 10px',background:C.orangeSoft,borderBottom:`1px solid ${C.border}`,fontSize:12,fontWeight:700,color:C.orange,display:'flex',alignItems:'center',gap:4}}>
                    <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                    <span style={{flexShrink:0,background:C.orange,color:'#fff',borderRadius:4,padding:'1px 6px',fontSize:11,fontWeight:700}}>{fileQty.toLocaleString()}</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 65px',padding:'5px 10px',background:C.surface,fontSize:11,fontWeight:700,color:C.muted,borderBottom:`1px solid ${C.border}`}}>
                    <div>바코드</div><div style={{textAlign:'right'}}>주문수량</div>
                  </div>
                  <div style={{flex:1,overflowY:'auto'}}>
                    {f.rows.map((r,i)=>(
                      <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 65px',padding:'5px 10px',borderBottom:`1px solid ${C.border}22`,background:i%2?C.bg:'transparent',fontSize:12}}>
                        <div style={{fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.바코드}</div>
                        <div style={{textAlign:'right',fontWeight:700,color:C.orange}}>{r.주문수량}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:'5px 10px',borderTop:`1px solid ${C.border}`,background:C.surface,display:'grid',gridTemplateColumns:'1fr 65px',fontSize:11,fontWeight:700,color:C.muted}}>
                    <div>합계</div><div style={{textAlign:'right',color:C.orange}}>{fileQty.toLocaleString()}</div>
                  </div>
                </div>
              );
            });
          })()}
        </div>
      </div>
    </div>
  );
}
// ── ③ 주문서 ──
function SubJumon({store}){
  const[search,setSearch]=useState('');
  const[filter,setFilter]=useState('all');
  const[checked,setChecked]=useState({});
  const[jumonSplit,setJumonSplit]=useState(58);
  const jumonContRef=useRef();

  // 리사이저
  const startJumonDrag=useCallback(e=>{
    e.preventDefault();
    const startX=e.clientX,startW=jumonSplit;
    const cont=jumonContRef.current;
    const onMove=ev=>{
      if(!cont) return;
      const dx=ev.clientX-startX;
      const pct=startW+dx/cont.offsetWidth*100;
      setJumonSplit(Math.max(30,Math.min(80,pct)));
    };
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  },[jumonSplit]);

  // 가공주문서 최종값 맵
  // store.gagang 직접 참조 → 파일 업로드 즉시 반영
  // 적재현황 상품수 맵 (바코드 → 상품수 합산)
  // store.jaejaUniq 없으면 store.jaeja에서 직접 집계 (폴백)
  const jaejaUniqMap=React.useMemo(()=>{
    const m={};
    const uniq=(store.jaejaUniq&&store.jaejaUniq.length>0)
      ? store.jaejaUniq
      : null;
    if(uniq){
      uniq.forEach(r=>{
        const bc=(r.바코드||'').toUpperCase().trim();
        if(bc) m[bc]=Number(r.상품수)||0;
      });
    } else {
      // jaeja 시트에서 직접 집계
      (store.jaeja||[]).forEach(r=>{
        const bc=(r.바코드||'').toUpperCase().trim();
        if(!bc) return;
        m[bc]=(m[bc]||0)+(Number(r.수량)||0);
      });
    }
    return m;
  },[store.jaejaUniq, store.jaeja]);

  // 최종값 맵: X = A - B - C
  // A = 접수+송장, B = max(0, 정상재고 - 적재현황상품수), C = B2B주문
  const gagangFinalMap=React.useMemo(()=>{
    const m={};
    try{
      const gg=(store.gagang&&store.gagang.length>0)
        ? store.gagang
        : [];
      const b2bRaw=(store.b2bFiles&&store.b2bFiles.length>0)
        ? store.b2bFiles
        : JSON.parse(localStorage.getItem('gg_b2bfiles')||'[]');
      const b2bMap={};
      b2bRaw.forEach(f=>f.rows.forEach(r=>{
        const bc=String(r.바코드||'').trim().toUpperCase();
        if(bc) b2bMap[bc]=(b2bMap[bc]||0)+(Number(r.주문수량)||0);
      }));
      gg.forEach(r=>{
        const bc=String(r.바코드||'').trim().toUpperCase();
        const stock=Number(r.정상재고)||0;
        const jaejaQty=jaejaUniqMap[bc]||0;
        const locQty=Math.max(0, stock-jaejaQty); // B = 로케이션수량
        const final=Math.max(0,(Number(r.접수송장)||0)-locQty-(b2bMap[bc]||0));
        if(bc) m[bc]=final;
      });
    }catch{}
    return m;
  },[store.gagang, store.b2bFiles, jaejaUniqMap]);

  // DB 맵: 바코드(upper) → {상품명, 옵션명}
  const dbMap=React.useMemo(()=>{
    const m={};
    (store.db||[]).forEach(r=>{
      if(r.바코드) m[r.바코드.toUpperCase()]={상품명:r.상품명||'',옵션명:r.옵션||''};
      if(r.상품코드) m[r.상품코드.toUpperCase()]={상품명:r.상품명||'',옵션명:r.옵션||''};
    });
    return m;
  },[store.db]);

  // 적재 재고 맵 (바코드 upper → 박스 목록)
  const jaejaMap=React.useMemo(()=>{
    const m={};
    (store.jaeja||[]).forEach(r=>{
      const bc=(r.바코드||'').toUpperCase().trim();
      if(!bc) return;
      if(!m[bc]) m[bc]=[];
      m[bc].push(r);
    });
    Object.values(m).forEach(arr=>arr.sort((a,b)=>{
      const aHas=!!(a.입고기록||a.입고||'').trim();
      const bHas=!!(b.입고기록||b.입고||'').trim();
      // 입고일시 있는 것 → FIFO(id순), 없는 것 → 수량 내림차순
      if(aHas&&bHas) return (a.id||0)-(b.id||0);
      if(!aHas&&!bHas) return (Number(b.수량)||0)-(Number(a.수량)||0);
      return aHas?-1:1; // 입고일시 있는 것 우선
    }));
    return m;
  },[store.jaeja]);

  // ── gagangFinalMap 기반으로 baseData 생성 (store.jumon 불필요) ──
  const baseData=React.useMemo(()=>{
    return Object.entries(gagangFinalMap)
      .filter(([bc,need])=>bc && need > 0)
      .map(([bc, need])=>{
        // DB에서 상품명/옵션 보완
        const dbInfo=dbMap[bc]||{};
        // 적재에서 로케이션 대표값 (첫 번째 박스 기준)
        const firstBox=(jaejaMap[bc]||[])[0];
        return {
          바코드: bc,
          필요수량: need,
          상품명: dbInfo.상품명||'',
          옵션명: dbInfo.옵션명||'',
          로케이션: firstBox?.로케이션||'',
        };
      });
  },[gagangFinalMap, dbMap, jaejaMap]);

  const enriched=baseData.map(r=>{
    const bc=(r.바코드||'').toUpperCase().trim();
    const finalNeed=Number(r.필요수량)||0;
    const boxes=jaejaMap[bc]||[];
    // 로케이션 일치 박스 우선, 나머지 FIFO — 누적수량이 필요수량 이상이면 즉시 중단
    const 로케박스=boxes.filter(b=>b.로케이션&&b.로케이션===r.로케이션);
    const others=boxes.filter(b=>!로케박스.includes(b));
    let 출고박스=[];
    let remain=finalNeed;
    for(const b of [...로케박스,...others]){
      if(remain<=0) break;
      출고박스.push({...b,_priority:로케박스.includes(b)?'로케':'FIFO'});
      remain-=(Number(b.수량)||0);
    }
    return {...r, 필요수량:finalNeed, 출고박스, 출고가능:출고박스.reduce((s,b)=>s+(Number(b.수량)||0),0)};
  });

  const filtered2=enriched.filter(r=>{
    if(search){
      const q=search.toUpperCase();
      if(!r.바코드?.includes(q)&&!r.로케이션?.includes(search)&&!r.상품명?.includes(search)) return false;
    }
    if(filter==='need') return r.출고가능<(Number(r.필요수량)||0);
    if(filter==='done') return r.출고가능>=(Number(r.필요수량)||0);
    return true;
  });

  // ── 우측: 필요수량 발생 바코드 자동매칭 목록 (스마트 선입선출) ──
  // 규칙: 1.입고날짜 오래된순(id순) 2.박스수량<필요수량이면 1박스더 3.누적>=필요수량이면 종료
  const needList=React.useMemo(()=>{
    return enriched
      .filter(r=>{
        const bc=(r.바코드||'').toUpperCase().trim();
        return (Number(r.필요수량)||0)>0 && (jaejaMap[bc]||[]).length>0;
      })
      .map(r=>{
        const bc=(r.바코드||'').toUpperCase().trim();
        const need=Number(r.필요수량)||0;
        // 입고날짜 오래된 순 정렬 (id 오름차순)
        const allBoxes=(jaejaMap[bc]||[]).slice().sort((a,b)=>(a.id||0)-(b.id||0));
        const dbInfo=dbMap[bc]||{};

        // 스마트 박스 선택: 필요수량만큼만
        const selectedBoxes=[];
        let cumQty=0;
        for(let i=0;i<allBoxes.length;i++){
          const b=allBoxes[i];
          const bQty=Number(b.수량)||0;
          selectedBoxes.push(b);
          cumQty+=bQty;
          // 누적수량이 필요수량 이상이면 중단
          if(cumQty>=need) break;
          // 아직 부족하면 다음 박스 계속 (루프 계속)
        }

        const boxRows=selectedBoxes.map(b=>({
          바코드: b.바코드||r.바코드,
          박스코드: b.박스코드,
          수량: Number(b.수량)||0,
          상품위치: b.상품위치||'',
          상품명: b.상품명||(dbMap[(b.바코드||'').toUpperCase()]||dbInfo).상품명||'',
          옵션명: b.옵션명||(dbMap[(b.바코드||'').toUpperCase()]||dbInfo).옵션명||'',
          로케이션: b.로케이션||'',
        }));
        const 출고수량=boxRows.reduce((s,b)=>s+b.수량,0);
        return {
          바코드: r.바코드,
          필요수량: need,
          출고수량,
          로케이션: r.로케이션||'',
          출고가능: r.출고가능,
          출고박스: r.출고박스,
          총박스: allBoxes.length,
          선택박스: selectedBoxes.length,
          boxRows,
        };
      });
  },[enriched, jaejaMap, dbMap]);

  const allNeedChecked=needList.length>0&&needList.every(r=>checked[r.바코드]);
  function toggleAllNeed(){
    if(allNeedChecked){setChecked({});}
    else{const n={};needList.forEach(r=>{n[r.바코드]=true;});setChecked(n);}
  }

  function downloadNeedXlsx(){
    const rows=needList.filter(r=>checked[r.바코드]).flatMap(r=>
      r.boxRows.map(b=>({
        상품위치: b.상품위치,
        상품코드_바코드: b.바코드,
        박스코드: b.박스코드,
        수량: b.수량,
        상품명: b.상품명,
        옵션: b.옵션명,
        로케이션: b.로케이션,
        필요수량: r.필요수량,
        출고수량: r.출고수량,
      }))
    );
    if(!rows.length){alert('선택된 항목이 없습니다.');return;}
    const cols=['상품위치','상품코드_바코드','박스코드','수량','상품명','옵션','로케이션','필요수량','출고수량'];
    const ws=XLSX.utils.json_to_sheet(rows,{header:cols});
    // 열 너비 자동 조정
    const colWidths=cols.map(col=>{
      const headerLen=col.length;
      const maxDataLen=rows.reduce((mx,row)=>{const v=row[col]!=null?String(row[col]):'';return Math.max(mx,v.length);},0);
      return{wch:Math.min(Math.max(headerLen,maxDataLen)+2,50)};
    });
    ws['!cols']=colWidths;
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'필요수량목록');
    XLSX.writeFile(wb,`필요수량목록_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.xlsx`);
  }

  const checkedCount=Object.values(checked).filter(Boolean).length;

  return(
    <div ref={jumonContRef} style={{flex:1,minHeight:0,display:'flex',overflow:'hidden'}}>
      {/* 좌측: 주문서 테이블 */}
      <div style={{flex:`0 0 ${jumonSplit}%`,display:'flex',flexDirection:'column',padding:16,gap:10,overflow:'hidden'}}>
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px 14px',flexShrink:0,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:15,fontWeight:700,color:C.text}}>② 주문서 — 가공주문서 × 적재 매칭</span>
          <div style={{flex:1}}/>
          {['all','need','done'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?C.accent:C.surface,color:filter===f?'#fff':C.muted,border:`1px solid ${filter===f?C.accent:C.border}`,borderRadius:6,padding:'4px 10px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
              {f==='all'?'전체':f==='need'?`미충족(${enriched.filter(r=>r.출고가능<(Number(r.필요수량)||0)).length})`:f==='done'?`충족(${enriched.filter(r=>r.출고가능>=(Number(r.필요수량)||0)).length})`:''}
            </button>
          ))}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder='바코드/로케이션…'
            style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:'6px 10px',fontSize:14,color:C.text,width:140,outline:'none'}}/>
          <span style={{fontSize:14,color:C.muted}}>{filtered2.length.toLocaleString()}행</span>
        </div>
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{display:'grid',gridTemplateColumns:'115px 60px 1fr 100px 60px 60px 1fr',padding:'6px 12px',background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:12,fontWeight:700,color:C.muted,flexShrink:0}}>
            {['바코드','필요수량','상품명','로케이션','적재수량','출고가능','출고박스(선입선출)'].map(h=><div key={h} style={{textAlign:'center',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{h}</div>)}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {filtered2.length===0&&(
              <div style={{padding:32,textAlign:'center',color:C.muted,fontSize:15}}>
                가공주문서 탭에서 이지어드민 주문서를 업로드하면 자동으로 표시됩니다
              </div>
            )}
            {filtered2.slice(0,500).map((r,i)=>{
              const need=Number(r.필요수량)||0;
              const canFill=r.출고가능>=need;
              const totalStk=(jaejaMap[(r.바코드||'').toUpperCase()]||[]).reduce((s,b)=>s+(Number(b.수량)||0),0);
              return(
                <div key={i} style={{display:'grid',gridTemplateColumns:'115px 60px 1fr 100px 60px 60px 1fr',padding:'5px 12px',borderBottom:`1px solid ${C.border}22`,background:need>0?'#fffbeb':i%2?C.bg:'transparent',fontSize:13,alignItems:'center'}}>
                  <div style={{fontFamily:'monospace',fontWeight:700,fontSize:12,textAlign:'center'}}>{r.바코드}</div>
                  <div style={{textAlign:'center',fontWeight:700,color:C.orange}}>{need}</div>
                  <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:C.muted,textAlign:'center'}}>{r.상품명}{r.옵션명?' / '+r.옵션명:''}</div>
                  <div style={{fontSize:12,color:C.purple,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{r.로케이션||'-'}</div>
                  <div style={{textAlign:'center',color:C.accent}}>{totalStk}</div>
                  <div style={{textAlign:'center',fontWeight:700,color:canFill?C.green:C.red}}>{r.출고가능}</div>
                  <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>
                    {r.출고박스.slice(0,3).map((b,j)=>(
                      <span key={j} style={{marginRight:4,background:b._priority==='로케'?C.accentSoft:C.orangeSoft,
                        color:b._priority==='로케'?C.accent:C.orange,
                        borderRadius:4,padding:'1px 4px',fontSize:11,fontWeight:600}}>{b.박스코드}</span>
                    ))}
                    {r.출고박스.length>3&&<span style={{fontSize:11,color:C.muted}}>+{r.출고박스.length-3}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* 리사이저 */}
      <div onMouseDown={startJumonDrag} style={{width:6,flexShrink:0,cursor:'col-resize',background:'transparent',borderLeft:`1px solid ${C.border}`,transition:'background .15s',zIndex:10,userSelect:'none'}}
        onMouseEnter={e=>e.currentTarget.style.background=C.accent+'44'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>

      {/* 우측: 필요수량 자동매칭 목록 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',padding:16,paddingLeft:10,gap:10,overflow:'hidden'}}>
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px 14px',flexShrink:0,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:15,fontWeight:700,color:C.text}}>📋 필요수량 매칭목록</span>
          <span style={{background:needList.length>0?C.orangeSoft:C.surface,color:needList.length>0?C.orange:C.muted,borderRadius:7,padding:'2px 8px',fontSize:13,fontWeight:700}}>{needList.length}건</span>
          <div style={{flex:1}}/>
          {checkedCount>0&&<span style={{fontSize:13,color:C.muted}}>{checkedCount}개 선택</span>}
          <button onClick={toggleAllNeed} style={{background:C.surface,color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 10px',fontSize:13,cursor:'pointer'}}>
            {allNeedChecked?'전체해제':'전체선택'}
          </button>
          <button onClick={downloadNeedXlsx} style={{background:C.green,color:'#fff',border:'none',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
            📥 엑셀 다운로드
          </button>
        </div>
        <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {/* 헤더: 상품위치 상품코드 박스코드 수량 상품명 옵션 로케이션 */}
          <div style={{display:'grid',gridTemplateColumns:'28px 105px 115px 125px 50px 1fr 1fr 105px',padding:'6px 10px',background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:12,fontWeight:700,color:C.muted,flexShrink:0,alignItems:'center'}}>
            <input type='checkbox' checked={allNeedChecked} onChange={toggleAllNeed} style={{cursor:'pointer'}}/>
            {['상품위치','상품코드(바코드)','박스코드','수량','상품명','옵션','로케이션'].map(h=><div key={h}>{h}</div>)}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {!needList.length&&<div style={{padding:32,textAlign:'center',color:C.muted,fontSize:15}}>필요수량이 있는 항목이 없습니다</div>}
            {needList.map((r,i)=>{
              const canFill=r.출고가능>=r.필요수량;
              const isChecked=!!checked[r.바코드];
              // 바코드 그룹 헤더 행
              const groupHeader=(
                <div key={`hd-${r.바코드}`} onClick={()=>setChecked(p=>({...p,[r.바코드]:!p[r.바코드]}))}
                  style={{display:'grid',gridTemplateColumns:'28px 105px 115px 125px 50px 1fr 1fr 105px',padding:'5px 10px',
                    borderBottom:`1px solid ${C.border}44`,
                    background:isChecked?C.accentSoft:r.재고초과?'#fff7ed':'#f8faff',
                    borderLeft:r.재고초과?`3px solid ${C.orange}`:'3px solid transparent',
                    fontSize:13,alignItems:'center',cursor:'pointer',borderTop:i>0?`2px solid ${C.border}`:'none'}}>
                  <input type='checkbox' checked={isChecked} onChange={()=>{}} style={{pointerEvents:'none'}}/>
                  <div style={{fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.boxRows[0]?.상품위치||''}</div>
                  <div style={{fontFamily:'monospace',fontWeight:800,color:C.accent,fontSize:12,gridColumn:'3 / 5',display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                    {r.바코드}
                    <span style={{fontSize:11,fontWeight:600,color:(r.출고수량>=r.필요수량)?C.green:C.red,background:(r.출고수량>=r.필요수량)?C.greenSoft:C.redSoft,borderRadius:4,padding:'1px 5px'}}>
                      필요 {r.필요수량} → 출고 {r.출고수량} / {r.선택박스}박스
                    </span>
                    {r.재고초과&&(
                      <span style={{fontSize:11,fontWeight:700,color:'#fff',background:C.orange,borderRadius:4,padding:'1px 6px'}}>
                        ⚠ 재고초과 정상{r.정상재고} / 적재{r.적재수량합계}
                      </span>
                    )}
                  </div>
                  <div style={{fontSize:12,color:C.muted,gridColumn:'6 / 8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {r.boxRows[0]?.상품명||''}{r.boxRows[0]?.옵션명?<span style={{color:C.muted}}> {r.boxRows[0].옵션명}</span>:''}
                  </div>
                  <div style={{fontSize:12,color:C.purple,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.로케이션}</div>
                </div>
              );
              // 박스 단위 상세 행
              const boxDetailRows=r.boxRows.map((b,j)=>(
                <div key={`box-${r.바코드}-${j}`}
                  style={{display:'grid',gridTemplateColumns:'28px 105px 115px 125px 50px 1fr 1fr 105px',padding:'4px 10px',
                    borderBottom:`1px solid ${C.border}22`,
                    background:isChecked?'#eef4ff':j%2===0?'transparent':C.bg,
                    fontSize:13,alignItems:'center'}}>
                  <div/>
                  <div style={{fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.상품위치}</div>
                  <div style={{fontFamily:'monospace',fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.바코드}</div>
                  <div style={{fontFamily:'monospace',fontWeight:700,color:C.text,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.박스코드||<span style={{color:C.muted}}>-</span>}</div>
                  <div style={{textAlign:'right',fontWeight:700,color:b.수량>0?C.accent:C.muted}}>{b.수량||0}</div>
                  <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{b.상품명}</div>
                  <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:C.muted}}>{b.옵션명}</div>
                  <div style={{fontSize:12,color:C.purple,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.로케이션}</div>
                </div>
              ));
              return [groupHeader, ...boxDetailRows];
            })}
          </div>
        </div>
      </div>
    </div>
  );
}
// ── ④ 다중검색 ──
// 기본 10행 생성 헬퍼
function makeRows(count,startId){
  return Array.from({length:count},(_,i)=>({id:startId+i,code:'',result:null}));
}

function SubMulti({store}){
  // ── 행별 입력 (기본 10행) — sessionStorage 유지 ──
  const nextId=useRef(SS.get('multi_nextId')||11);
  const[rows,setRows]=useState(()=>{const saved=SS.get('multi_rows');return saved&&saved.length?saved:makeRows(10,1);});
  const[checked,setChecked]=useState(()=>SS.get('multi_checked')||{});

  // ── 텍스트박스 일괄 입력 ──
  const[bulkText,setBulkText]=useState(()=>SS.get('multi_bulkText')||'');
  const[bulkResults,setBulkResults]=useState(()=>SS.get('multi_bulkResults')||[]);
  const[bulkChecked,setBulkChecked]=useState(()=>SS.get('multi_bulkChecked')||{});

  // 현재 활성 탭: 'row'(행별) | 'bulk'(일괄)
  const[inputTab,setInputTab]=useState(()=>SS.get('multi_inputTab')||'row');

  // state 변경 시 sessionStorage 동기화
  useEffect(()=>{SS.set('multi_rows',rows);SS.set('multi_nextId',nextId.current);},[rows]);
  useEffect(()=>{SS.set('multi_checked',checked);},[checked]);
  useEffect(()=>{SS.set('multi_bulkText',bulkText);},[bulkText]);
  useEffect(()=>{SS.set('multi_bulkResults',bulkResults);},[bulkResults]);
  useEffect(()=>{SS.set('multi_bulkChecked',bulkChecked);},[bulkChecked]);
  useEffect(()=>{SS.set('multi_inputTab',inputTab);},[inputTab]);

  // DB 맵
  const dbMap=React.useMemo(()=>{
    const m={};
    (store.db||[]).forEach(r=>{
      if(r.바코드) m[r.바코드.toUpperCase()]={상품명:r.상품명||'',옵션명:r.옵션||''};
      if(r.상품코드) m[r.상품코드.toUpperCase()]={상품명:r.상품명||'',옵션명:r.옵션||''};
    });
    return m;
  },[store.db]);

  function searchCode(code, existingResults){
    const key=code.trim().toUpperCase();
    if(!key) return null;
    const jaeja=store.jaeja||[];
    const found=jaeja.filter(r=>(r.바코드||'').toUpperCase().trim()===key).slice().sort((a,b)=>(a.id||0)-(b.id||0));
    const dbInfo=dbMap[key]||{};
    if(found.length){
      // 이미 결과 목록에 있는 박스코드 추출
      const shown=new Set((existingResults||[]).filter(r=>r.바코드===key).flatMap(r=>r.박스목록.map(b=>b.박스코드)));
      // 아직 표시 안 된 박스만 — 없으면 전체 다시 표시
      const remaining=found.filter(b=>!shown.has(b.박스코드));
      const target=remaining.length>0?remaining:found;
      const boxRows=target.map(b=>({
        바코드:b.바코드||key,박스코드:b.박스코드,수량:Number(b.수량)||0,
        상품위치:b.상품위치||'',
        상품명:b.상품명||(dbMap[(b.바코드||'').toUpperCase()]||dbInfo).상품명||'',
        옵션명:b.옵션명||(dbMap[(b.바코드||'').toUpperCase()]||dbInfo).옵션명||'',
        로케이션:b.로케이션||'',
      }));
      return{바코드:key,박스목록:boxRows,총박스:found.length,총수량:found.reduce((s,b)=>s+(Number(b.수량)||0),0),_notfound:false};
    }
    return{바코드:key,박스목록:[{바코드:key,박스코드:'',수량:0,상품위치:'',상품명:dbInfo.상품명||'',옵션명:dbInfo.옵션명||'',로케이션:''}],총박스:0,총수량:0,_notfound:!dbInfo.상품명};
  }

  // ── 행별 핸들러 ──
  function handleCodeChange(id,val){
    setRows(prev=>prev.map(r=>{
      if(r.id!==id) return r;
      const existing=prev.filter(x=>x.id!==id&&x.result&&!x.result._notfound).map(x=>x.result);
      const result=val.trim()?searchCode(val,existing):null;
      return{...r,code:val,result};
    }));
  }
  function handleKeyDown(e,id,idx){
    if(e.key==='Enter'){
      e.preventDefault();
      const inputs=document.querySelectorAll('.multi-search-input');
      if(idx<rows.length-1){
        if(inputs[idx+1]) inputs[idx+1].focus();
      }
      // 마지막 행에서 Enter → 다음 빈 칸으로 스크롤 (행 추가 없음, 이미 충분히 있음)
    }
    if(e.key==='Backspace'&&!e.currentTarget.value&&rows.length>1){
      e.preventDefault();
      setRows(prev=>prev.filter(r=>r.id!==id));
      setTimeout(()=>{
        const inputs=document.querySelectorAll('.multi-search-input');
        if(inputs[Math.max(0,idx-1)]) inputs[Math.max(0,idx-1)].focus();
      },30);
    }
  }
  function addRows10(){
    const base=nextId.current;
    nextId.current+=10;
    setRows(prev=>[...prev,...makeRows(10,base)]);
  }
  function clearRows(){
    if(!window.confirm('검색 목록을 초기화하시겠습니까?'))return;
    nextId.current=11;
    setRows(makeRows(10,1));
    setChecked({});
  }

  // ── 일괄입력 핸들러 ──
  function doBulkSearch(){
    const list=bulkText.split(/[\n,]+/).map(s=>s.trim().toUpperCase()).filter(Boolean);
    if(!list.length) return;
    const acc=[];
    const res=list.map(code=>{const r=searchCode(code,acc);if(r&&!r._notfound)acc.push(r);return r;});
    setBulkResults(res);
    setBulkChecked({});
  }
  function clearBulk(){if(!window.confirm('일괄 검색을 초기화하시겠습니까?'))return;setBulkText('');setBulkResults([]);setBulkChecked({});}

  // ── 활성 결과 (탭에 따라) ──
  const rowResults=rows.filter(r=>r.result).map(r=>r.result);
  const activeResults=inputTab==='row'?rowResults:bulkResults;
  const activeCk=inputTab==='row'?checked:bulkChecked;
  const setActiveCk=inputTab==='row'?setChecked:setBulkChecked;

  const totalQty=activeResults.filter(r=>!r._notfound).reduce((s,r)=>s+r.총수량,0);
  const allCkd=activeResults.length>0&&activeResults.every(r=>activeCk[r.바코드]);
  const ckCount=Object.values(activeCk).filter(Boolean).length;

  function toggleAllCk(){
    if(allCkd){setActiveCk({});}
    else{const n={};activeResults.forEach(r=>{n[r.바코드]=true;});setActiveCk(n);}
  }

  function downloadXlsx(){
    const targets=activeResults.filter(r=>activeCk[r.바코드]);
    if(!targets.length){alert('선택된 항목이 없습니다.');return;}
    const xlsRows=targets.flatMap(r=>
      r.박스목록.map(b=>({
        상품위치:b.상품위치, 상품코드_바코드:b.바코드, 박스코드:b.박스코드,
        수량:b.수량, 상품명:b.상품명, 옵션:b.옵션명, 로케이션:b.로케이션,
        총박스수:r.총박스, 총수량:r.총수량,
      }))
    );
    const cols=['상품위치','상품코드_바코드','박스코드','수량','상품명','옵션','로케이션','총박스수','총수량'];
    const ws=XLSX.utils.json_to_sheet(xlsRows,{header:cols});
    const colWidths=cols.map(col=>{
      const hl=col.length;
      const ml=xlsRows.reduce((mx,row)=>{const v=row[col]!=null?String(row[col]):'';return Math.max(mx,v.length);},0);
      return{wch:Math.min(Math.max(hl,ml)+2,50)};
    });
    ws['!cols']=colWidths;
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'다중검색결과');
    XLSX.writeFile(wb,`다중검색결과_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.xlsx`);
  }

  // ── 결과 렌더 공통 ──
  function ResultRows({results,ck,setCk}){
    return results.map((r,i)=>{
      const isChecked=!!ck[r.바코드];
      const groupHeader=(
        <div key={`hd-${r.바코드}-${i}`} onClick={()=>setCk(p=>({...p,[r.바코드]:!p[r.바코드]}))}
          style={{display:'grid',gridTemplateColumns:'28px 105px 115px 125px 55px 1fr 1fr 110px',padding:'5px 12px',
            background:r._notfound?C.redSoft:isChecked?C.accentSoft:'#f8faff',
            borderTop:i>0?`2px solid ${C.border}`:'none',
            borderBottom:`1px solid ${C.border}44`,fontSize:13,alignItems:'center',cursor:'pointer'}}>
          <input type='checkbox' checked={isChecked} onChange={()=>{}} style={{pointerEvents:'none'}}/>
          <div style={{fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.박스목록[0]?.상품위치||''}</div>
          <div style={{fontFamily:'monospace',fontWeight:800,color:r._notfound?C.red:C.accent,fontSize:12,gridColumn:'3 / 5'}}>
            {r.바코드}
            {!r._notfound&&<span style={{marginLeft:6,fontSize:11,fontWeight:600,color:C.muted,background:C.surface,borderRadius:4,padding:'1px 5px'}}>
              {r.총박스}박스 / {r.총수량.toLocaleString()}개
            </span>}
            {r._notfound&&<span style={{marginLeft:6,fontSize:11,color:C.red}}>적재·DB 미등록</span>}
          </div>
          <div style={{fontSize:12,color:C.muted,gridColumn:'6 / 8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {r.박스목록[0]?.상품명}{r.박스목록[0]?.옵션명?<span> {r.박스목록[0].옵션명}</span>:''}
          </div>
          <div style={{fontSize:12,color:C.purple,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.박스목록[0]?.로케이션}</div>
        </div>
      );
      const boxDetailRows=r.박스목록.map((b,j)=>(
        <div key={`box-${r.바코드}-${i}-${j}`}
          style={{display:'grid',gridTemplateColumns:'28px 105px 115px 125px 55px 1fr 1fr 110px',padding:'4px 12px',
            borderBottom:`1px solid ${C.border}22`,
            background:isChecked?'#eef4ff':j%2===0?'transparent':C.bg,
            fontSize:13,alignItems:'center'}}>
          <div/><div style={{fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.상품위치}</div>
          <div style={{fontFamily:'monospace',fontSize:12,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.바코드}</div>
          <div style={{fontFamily:'monospace',fontWeight:700,fontSize:12,color:b.박스코드?C.text:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.박스코드||'-'}</div>
          <div style={{textAlign:'right',fontWeight:700,color:b.수량>0?C.accent:C.muted}}>{b.수량||0}</div>

          <div style={{fontSize:12,color:C.purple,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.로케이션}</div>
        </div>
      ));
      return [groupHeader,...boxDetailRows];
    });
  }

  return(

        {/* ── 우측: 결과 패널 ── */}
