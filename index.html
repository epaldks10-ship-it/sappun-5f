// 페이지네이션으로 전체 데이터 가져오기
async function sbFetchAll(table, select='*', pageSize=1000) {
  let all = [];
  let from = 0;
  while(true) {
    const res = await fetch(
      `${SB_URL}/rest/v1/${table}?select=${select}&limit=${pageSize}&offset=${from}`,
      { headers: SB_HEADERS }
    );
    if(!res.ok) throw new Error(`${table} 로드 실패: ${res.status} ${await res.text()}`);
    const rows = await res.json();
    all = all.concat(rows);
    if(rows.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

// jaeja + jaeja_db 전체 로드 → SO_STORE 반영
async function loadFromSupabase(onProgress) {
  onProgress('jaeja 로드 중…');
  const rawJaeja = await sbFetchAll('jaeja');
  onProgress(`jaeja ${rawJaeja.length}행 완료. DB 로드 중…`);
  const rawDb = await sbFetchAll('jaeja_db');
  onProgress(`DB ${rawDb.length}행 완료. 입출고기록 로드 중…`);
  const rawInout = await sbFetchAll('inout_log', '*', 1000);
  onProgress(`입출고기록 ${rawInout.length}건 완료. 위치변경기록 로드 중…`);
  const rawLoc = await sbFetchAll('loc_log', '*', 1000);
  onProgress(`위치변경기록 ${rawLoc.length}건 완료. 가공 중…`);

  // jaeja → SO_STORE.jaeja 형태로 변환
  const jaeja = rawJaeja.map((r,i) => ({
    id: r.id ?? i,
    박스코드: r.box_code || '',
    바코드:   r.barcode  || '',
    수량:     Number(r.qty) || 0,
    상품위치: r.position || '',
    상품명:   r.product_name || '',
    옵션명:   r.option_name  || '',
    로케이션: r.location || '',
    출고여부: r.shipped  || '',
    입고:     r.inbound  || '',
  }));

  // db → SO_STORE.db 형태로 변환
  const db = rawDb.map(r => ({
    상품코드: r.product_code || '',
    바코드:   r.barcode || '',
    상품명:   r.product_name || '',
    옵션:     r.option || '',
    로케이션: r.location || '',
    로케이션2: '',
    총B2B접송: 0,
  }));

  // inout_log → SO_STORE.inoutLog 형태로 변환
  const inoutLog = rawInout.map(r => ({
    _id:      r.id ?? null,  // Supabase PK — 삭제 시 사용
    박스코드: r.box_code || '',
    바코드:   r.barcode  || '',
    수량:     Number(r.qty) || 0,
    위치:     r.position || '',
    상품명:   r.product_name || '',
    옵션:     r.option || '',
    작업일시: r.worked_at || '',
    입출고:   r.inout_type || '',
  })).sort((a,b) => b.작업일시.localeCompare(a.작업일시));  // 최신순

  // loc_log → SO_STORE.locLog 형태로 변환
  const locLog = rawLoc.map(r => ({
    박스코드: r.box_code || '',
    바코드:   r.barcode  || '',
    상품명:   r.product_name || '',
    옵션명:   r.option_name || '',
    기존위치: r.old_position || '',
    변경위치: r.new_position || '',
    작업시간: r.worked_at || '',
  })).sort((a,b) => b.작업시간.localeCompare(a.작업시간));  // 최신순

  // DB 로케이션 맵
  const dbLocMap = {};
  db.forEach(r => {
    const loc = r.로케이션 || '';
    if(r.바코드 && loc)   dbLocMap[r.바코드]   = loc;
    if(r.상품코드 && loc) dbLocMap[r.상품코드] = loc;
  });
  const jaejaWithLoc = jaeja.map(r => ({...r, 로케이션: r.로케이션 || dbLocMap[r.바코드] || ''}));

  // jaejaUniq 집계
  const uniqMap = {};
  jaejaWithLoc.forEach(r => {
    const bc = (r.바코드 || '').toUpperCase().trim();
    if(!bc) return;
    if(!uniqMap[bc]) uniqMap[bc] = {바코드:bc, 상품명:r.상품명||'', 옵션명:r.옵션명||'', 상품수:0, 박스:0};
    uniqMap[bc].상품수 += (Number(r.수량)||0);
    uniqMap[bc].박스   += 1;
  });
  const jaejaUniq = Object.values(uniqMap);

  Object.assign(SO_STORE, {
    jaeja: jaejaWithLoc, db, jaejaUniq,
    inoutLog, locLog,
    loaded: true, filename: `Supabase (적재 ${jaeja.length}행 / 입출고 ${inoutLog.length}건)`
  });
  saveSoStore();
  onProgress('완료');
  return { jaeja: jaejaWithLoc, db, jaejaUniq, inoutLog, locLog };
}

// ── Supabase Realtime 구독 ──
let _sbChannel = null;  // 현재 구독 채널
let _sbRealtimeCallback = null;  // storeVer 업데이트 콜백 (SearchOutTab에서 주입)
let _sbB2bCallback = null;       // b2bFiles 업데이트 콜백 (SubGagang에서 주입)
let _b2bReloadTimer = null;      // b2b_orders 디바운스 타이머
let _b2bBroadcastChannel = null; // B2B Broadcast 전용 채널
let _danpoBroadcastChannel = null; // 단포 Broadcast 전용 채널
let _dashBroadcastChannel = null;  // 대시보드 Broadcast 전용 채널
let _sbEasyCallback = null;      // easyRows 업데이트 콜백 (SubGagang에서 주입)
let _easyReloadTimer = null;     // easy_orders 디바운스 타이머
let _easyBroadcastChannel = null; // Easy Broadcast 전용 채널

function sbSubscribeRealtime(onUpdate) {
  // 이미 구독 중이면 먼저 해제
  if (_sbChannel) {
    _sbChannel.unsubscribe();
    _sbChannel = null;
  }
  _sbRealtimeCallback = onUpdate;

  // Supabase JS SDK가 로드되어 있어야 함
  function trySubscribe() {
    if (!window.supabase?.createClient) {
      setTimeout(trySubscribe, 500);
      return;
    }
    const client = window.supabase.createClient(SB_URL, SB_KEY);
    _sbChannel = client
      .channel('sap_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'jaeja' },
        payload => handleRealtimeEvent('jaeja', payload))
      .on('postgres_changes', { event: '*', schema: 'public', table: 'inout_log' },
        payload => handleRealtimeEvent('inout_log', payload))
      .on('postgres_changes', { event: '*', schema: 'public', table: 'loc_log' },
        payload => handleRealtimeEvent('loc_log', payload))
      .subscribe(status => {
        console.log('[Realtime 상태]', status);
        if(status === 'SUBSCRIBED') console.log('[Realtime] ✅ 구독 성공 - jaeja/inout_log/loc_log/b2b_orders');
        if(status === 'CHANNEL_ERROR') console.error('[Realtime] ❌ 채널 오류');
        if(status === 'TIMED_OUT') console.error('[Realtime] ❌ 타임아웃');
      });
  }
  trySubscribe();

  // ── B2B Broadcast 채널 (postgres_changes 대신 브로드캐스트 사용) ──
  function tryB2bBroadcast() {
    if (!window.supabase?.createClient) { setTimeout(tryB2bBroadcast, 500); return; }
    // 별도 클라이언트로 Broadcast 채널 생성 (postgres_changes와 독립)
    const bcClient = window.supabase.createClient(SB_URL, SB_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    _b2bBroadcastChannel = bcClient
      .channel('b2b_broadcast', { config: { broadcast: { self: true } } })
      .on('broadcast', { event: 'b2b_changed' }, payload => {
        console.log('[B2B Broadcast] 수신:', payload);
        if (_b2bReloadTimer) clearTimeout(_b2bReloadTimer);
        _b2bReloadTimer = setTimeout(() => {
          _b2bReloadTimer = null;
          sbB2bLoad().then(files => {
            const cur = SO_STORE.b2bFiles || [];
            const curSig = cur.map(f=>String(f.id)+'_'+f.rows.length).sort().join(',');
            const newSig = files.map(f=>String(f.id)+'_'+f.rows.length).sort().join(',');
            if(curSig === newSig && files.length > 0) return;
            try { localStorage.setItem('gg_b2bfiles', JSON.stringify(files)); } catch{}
            SO_STORE.b2bFiles = files;
            if (_sbB2bCallback) _sbB2bCallback(files);
            if (_sbRealtimeCallback) _sbRealtimeCallback({...SO_STORE});
          }).catch(e => console.warn('[B2B Broadcast] 재로드 실패:', e));
        }, 500);
      })
      .subscribe(s => console.log('[B2B Broadcast] 채널 상태:', s));
  }
  tryB2bBroadcast();

  // ── Easy 이지어드민 Broadcast 채널 ──
  function tryEasyBroadcast() {
    if (!window.supabase?.createClient) { setTimeout(tryEasyBroadcast, 500); return; }
    const easyClient = window.supabase.createClient(SB_URL, SB_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    _easyBroadcastChannel = easyClient
      .channel('easy_broadcast', { config: { broadcast: { self: true } } })
      .on('broadcast', { event: 'easy_changed' }, payload => {
        console.log('[Easy Broadcast] 수신:', payload);
        if (_easyReloadTimer) clearTimeout(_easyReloadTimer);
        _easyReloadTimer = setTimeout(() => {
          _easyReloadTimer = null;
          sbEasyLoad().then(({ rows, fileName }) => {
            const curSig = (SO_STORE.gagang || []).length + '_' + (SO_STORE.easyFile || '');
            const newSig = rows.length + '_' + fileName;
            if (curSig === newSig && rows.length > 0) return;
            SO_STORE.gagang = rows;
            SO_STORE.easyFile = fileName;
            // gg_easy localStorage 저장 제거 — Supabase가 소스오브트루스
            if (_sbEasyCallback) _sbEasyCallback(rows, fileName);
            if (_sbRealtimeCallback) _sbRealtimeCallback({...SO_STORE});
          }).catch(e => console.warn('[Easy Broadcast] 재로드 실패:', e));
        }, 500);
      })
      .subscribe(s => console.log('[Easy Broadcast] 채널 상태:', s));
  }
  tryEasyBroadcast();

  // ── 단포 Broadcast 채널 ──
  function tryDanpoBroadcast() {
    if (!window.supabase?.createClient) { setTimeout(tryDanpoBroadcast, 500); return; }
    const danpoClient = window.supabase.createClient(SB_URL, SB_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    _danpoBroadcastChannel = danpoClient
      .channel('danpo_broadcast', { config: { broadcast: { self: false } } })
      .on('broadcast', { event: 'danpo_changed' }, payload => {
        console.log('[Danpo Broadcast] 수신:', payload);
        const { danpoMap, invoiceRows, invoiceLabel } = payload.payload || {};
        if (danpoMap && window._setDanpoMap) window._setDanpoMap(danpoMap);
        if (invoiceRows && window._setInvoiceRows) window._setInvoiceRows(invoiceRows);
        if (invoiceLabel && window._setInvoiceLabel) window._setInvoiceLabel(invoiceLabel);
        // SS에도 저장
        if (danpoMap) SS.set('bc_danpo_map', danpoMap);
        if (invoiceRows) SS.set('bc_invoice_rows', invoiceRows);
      })
      .subscribe(s => console.log('[Danpo Broadcast] 채널 상태:', s));
  }
  tryDanpoBroadcast();

  // ── 대시보드 Broadcast 채널 ──
  function tryDashBroadcast() {
    if (!window.supabase?.createClient) { setTimeout(tryDashBroadcast, 500); return; }
    const dashClient = window.supabase.createClient(SB_URL, SB_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    _dashBroadcastChannel = dashClient
      .channel('dashboard_broadcast', { config: { broadcast: { self: false } } })
      .on('broadcast', { event: 'dashboard_changed' }, payload => {
        // reload 신호 수신 → Supabase에서 최신 데이터 다시 로드
        if(window._reloadCalFromSb) window._reloadCalFromSb();
      })
      .subscribe(s => console.log('[Dashboard Broadcast] 채널 상태:', s));
  }
  tryDashBroadcast();
}

function sbUnsubscribeRealtime() {
  if (_sbChannel) { _sbChannel.unsubscribe(); _sbChannel = null; }
  if (_b2bBroadcastChannel) { _b2bBroadcastChannel.unsubscribe(); _b2bBroadcastChannel = null; }
  if (_easyBroadcastChannel) { _easyBroadcastChannel.unsubscribe(); _easyBroadcastChannel = null; }
  if (_danpoBroadcastChannel) { _danpoBroadcastChannel.unsubscribe(); _danpoBroadcastChannel = null; }
  if (_dashBroadcastChannel) { _dashBroadcastChannel.unsubscribe(); _dashBroadcastChannel = null; }
  _sbRealtimeCallback = null;
  _sbB2bCallback = null;
  _sbEasyCallback = null;
}

// 이벤트 수신 → SO_STORE 즉시 패치 → UI 업데이트 트리거
function handleRealtimeEvent(table, payload) {
  const { eventType, new: newRow, old: oldRow } = payload;
  console.log('[Realtime 이벤트]', table, eventType, newRow || oldRow);

  if (table === 'jaeja') {
    let jaeja = [...(SO_STORE.jaeja || [])];
    if (eventType === 'INSERT') {
      // 새 박스 추가
      const r = newRow;
      jaeja.push({
        id: r.id, 박스코드: r.box_code||'', 바코드: r.barcode||'',
        수량: Number(r.qty)||0, 상품위치: r.position||'',
        상품명: r.product_name||'', 옵션명: r.option_name||'',
        로케이션: r.location||'', 출고여부: r.shipped||'', 입고: r.inbound||'',
      });
    } else if (eventType === 'DELETE') {
      // 박스 제거
      jaeja = jaeja.filter(r => r.박스코드 !== (oldRow.box_code||''));
    } else if (eventType === 'UPDATE') {
      // 위치변경 등
      jaeja = jaeja.map(r => r.박스코드 === (newRow.box_code||'')
        ? {...r, 상품위치: newRow.position||r.상품위치, 로케이션: newRow.location||r.로케이션}
        : r
      );
    }
    // jaejaUniq 재집계
    const uniqMap = {};
    jaeja.forEach(r => {
      const bc = (r.바코드||'').toUpperCase().trim();
      if(!bc) return;
      if(!uniqMap[bc]) uniqMap[bc] = {바코드:bc, 상품명:r.상품명||'', 옵션명:r.옵션명||'', 상품수:0, 박스:0};
      uniqMap[bc].상품수 += Number(r.수량)||0;
      uniqMap[bc].박스   += 1;
    });
    Object.assign(SO_STORE, { jaeja, jaejaUniq: Object.values(uniqMap) });

  } else if (table === 'inout_log' && eventType === 'INSERT') {
    const r = newRow;
    const newLog = {
      박스코드: r.box_code||'', 바코드: r.barcode||'',
      수량: Number(r.qty)||0, 위치: r.position||'',
      상품명: r.product_name||'', 옵션: r.option||'',
      작업일시: r.worked_at||'', 입출고: r.inout_type||'',
    };
    const inoutLog = [newLog, ...(SO_STORE.inoutLog||[])];
    Object.assign(SO_STORE, { inoutLog });

  } else if (table === 'loc_log' && eventType === 'INSERT') {
    const r = newRow;
    const newLog = {
      박스코드: r.box_code||'', 바코드: r.barcode||'',
      상품명: r.product_name||'', 옵션명: r.option_name||'',
      기존위치: r.old_position||'', 변경위치: r.new_position||'', 작업시간: r.worked_at||'',
    };
    const locLog = [newLog, ...(SO_STORE.locLog||[])];
    Object.assign(SO_STORE, { locLog });

  }

  // UI 업데이트 트리거
  if (_sbRealtimeCallback) _sbRealtimeCallback({...SO_STORE});
}

// ── Supabase 쓰기 헬퍼 ──
async function sbDeleteRows(table, filter) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
    method: 'DELETE',
    headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' }
  });
  if (!res.ok) throw new Error(`SB DELETE ${table}: ${res.status} ${await res.text()}`);
}
async function sbInsertRows(table, rows) {
  if (!rows || !rows.length) return;
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify(rows)
  });
  if (!res.ok) throw new Error(`SB INSERT ${table}: ${res.status} ${await res.text()}`);
}
// 배치 upsert (1000건씩)
async function sbUpsertRows(table, rows, chunkSize=1000) {
  if(!rows||!rows.length) return;
  for(let i=0;i<rows.length;i+=chunkSize){
    const chunk=rows.slice(i,i+chunkSize);
    const res=await fetch(`${SB_URL}/rest/v1/${table}`,{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(chunk)
    });
    if(!res.ok) throw new Error(`SB UPSERT ${table} 실패: ${res.status}`);
  }
}

async function sbPatchRows(table, filter, patch) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
    method: 'PATCH',
    headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify(patch)
  });
  if (!res.ok) throw new Error(`SB PATCH ${table}: ${res.status} ${await res.text()}`);
}
function sbInFilter(col, vals) {
  return `${col}=in.(${vals.map(v => `"${String(v).replace(/"/g,'')}"` ).join(',')})`;
}
// 출고: jaeja DELETE + inout_log INSERT
async function sbShipOut(boxCodes, logRows) {
  const CHUNK = 50;
  for (let i = 0; i < boxCodes.length; i += CHUNK) {
    await sbDeleteRows('jaeja', sbInFilter('box_code', boxCodes.slice(i, i+CHUNK)));
  }
  if (logRows.length) await sbInsertRows('inout_log', logRows.map(r=>({
    box_code:r.박스코드, barcode:r.바코드||'', qty:Number(r.수량)||0,
    position:r.위치||'', product_name:r.상품명||'', option:r.옵션||'',
    worked_at:r.작업일시||new Date().toLocaleString('ko-KR'), inout_type:'출고',
  })));
}
// 입고: jaeja INSERT + inout_log INSERT

// 위치변경: jaeja PATCH(position) + loc_log INSERT
async function sbLocChange(moveMap, logRows) {
  // ① jaeja.position 업데이트 (상품위치)
  for (const [boxCode, newPos] of Object.entries(moveMap)) {
    await sbPatchRows('jaeja', `box_code=eq.${boxCode}`, { position: newPos });
  }
  // ② jaeja_db.location 업데이트 (로케이션) — 바코드 기준으로 PATCH
  //    logRows에 바코드 정보가 있으므로 중복 제거 후 각각 PATCH
  const barcodeLocMap = {};
  logRows.forEach(r => {
    const bc = (r.바코드||'').toUpperCase().trim();
    if (bc) barcodeLocMap[bc] = r.변경위치||'';
  });
  for (const [barcode, newLoc] of Object.entries(barcodeLocMap)) {
    if (!newLoc) continue;
    try {
      await sbPatchRows('jaeja_db', `barcode=eq.${encodeURIComponent(barcode)}`, { location: newLoc });
    } catch(e) {
      console.warn(`jaeja_db 로케이션 업데이트 실패 (${barcode}):`, e);
    }
  }
  // ③ loc_log 기록
  if (logRows.length) await sbInsertRows('loc_log', logRows.map(r=>({
    box_code:r.박스코드, barcode:r.바코드||'', product_name:r.상품명||'',
    option_name:r.옵션명||'',
    old_position:r.기존위치||'', new_position:r.변경위치||'',
    worked_at:r.작업시간||new Date().toLocaleString('ko-KR'),
  })));
}

// ── 동시성 잠금 (op_lock 테이블) ──
// 테이블: op_lock (id int PK=1, locked_by text, locked_at timestamptz, operation text)
// 단일 행(id=1)을 CAS(Compare-And-Swap) 방식으로 점유

const LOCK_TIMEOUT_MS = 30000; // 30초 후 자동 만료 (비정상 종료 대비)
const LOCK_ID = 1;

// 잠금 시도 → 성공 true, 실패(이미 잠김) false
async function sbTryLock(operation) {
  const myId = `${navigator.userAgent.slice(0,20)}_${Date.now()}`;
  const now = new Date().toISOString();

  // 1) 현재 잠금 상태 조회
  const res = await fetch(`${SB_URL}/rest/v1/op_lock?id=eq.${LOCK_ID}&select=locked_by,locked_at`, {
    headers: SB_HEADERS
  });
  const rows = await res.json();
  const row = rows[0];

  if (row && row.locked_by) {
    // 잠금 만료 체크 (30초 초과 시 강제 해제)
    const lockedAt = new Date(row.locked_at).getTime();
    if (Date.now() - lockedAt < LOCK_TIMEOUT_MS) {
      return { ok: false, lockedBy: row.locked_by };
    }
    // 만료된 잠금 → 강제 해제 후 재시도
    console.warn('[Lock] 만료된 잠금 강제 해제:', row.locked_by);
  }

  // 2) 잠금 획득 시도 (UPSERT)
  const upsertRes = await fetch(`${SB_URL}/rest/v1/op_lock?id=eq.${LOCK_ID}`, {
    method: 'PATCH',
    headers: { ...SB_HEADERS, 'Prefer': 'return=representation' },
    body: JSON.stringify({ locked_by: myId, locked_at: now, operation })
  });
  if (!upsertRes.ok) return { ok: false, lockedBy: '?' };

  // 3) 내가 잠갔는지 재확인 (레이스 컨디션 방지)
  await new Promise(r => setTimeout(r, 100));
  const verRes = await fetch(`${SB_URL}/rest/v1/op_lock?id=eq.${LOCK_ID}&select=locked_by`, {
    headers: SB_HEADERS
  });
  const verRows = await verRes.json();
  if (verRows[0]?.locked_by === myId) {
    return { ok: true, myId };
  }
  return { ok: false, lockedBy: verRows[0]?.locked_by || '?' };
}

// 잠금 해제
async function sbReleaseLock(myId) {
  try {
    await fetch(`${SB_URL}/rest/v1/op_lock?id=eq.${LOCK_ID}`, {
      method: 'PATCH',
      headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ locked_by: null, locked_at: null, operation: null })
    });
  } catch(e) { console.warn('[Lock] 해제 실패:', e); }
}

// 잠금 래퍼: 잠금 획득 → 작업 실행 → 잠금 해제
async function withLock(operation, fn, onBusy) {
  const result = await sbTryLock(operation);
  if (!result.ok) {
    const who = (result.lockedBy||'').split('_')[0] || '다른 사용자';
    onBusy(`⚠️ ${who}가 ${operation} 작업 중입니다. 잠시 후 다시 시도하세요.`);
    return false;
  }
  try {
    await fn();
    return true;
  } finally {
    await sbReleaseLock(result.myId);
  }
}

  if(!file.rows.length) return;
  const batch = file.rows.map(r=>({

async function sbSyncFromExcel(jaejaRows, dbRows, onProgress) {

  // ① jaeja 전체 교체
  onProgress('Supabase 적재 데이터 삭제 중…');
  await sbDeleteRows('jaeja', 'id=gte.0');

  onProgress(`Supabase 적재 업로드 중… (${jaejaRows.length}행)`);
  for(let i=0; i<jaejaRows.length; i+=BATCH){
    const batch = jaejaRows.slice(i, i+BATCH).map(r=>({
      box_code:     (r.박스코드||'').toUpperCase(),
      barcode:      (r.바코드||'').toUpperCase(),
      qty:          Number(r.수량)||0,

      option_name:  r.옵션명||'',
      location:     r.로케이션||'',
      shipped:      r.출고여부||'',
      inbound:      r.입고||'',
    }));
    await sbInsertRows('jaeja', batch);
    onProgress(`Supabase 적재 업로드 중… ${Math.min(i+BATCH, jaejaRows.length)}/${jaejaRows.length}`);
  }

  // ② jaeja_db 전체 교체
  onProgress('Supabase DB 데이터 삭제 중…');
  await sbDeleteRows('jaeja_db', 'id=gte.0');

  onProgress(`Supabase DB 업로드 중… (${dbRows.length}행)`);
  for(let i=0; i<dbRows.length; i+=BATCH){
    const batch = dbRows.slice(i, i+BATCH).map(r=>({
      product_code: (r.상품코드||'').toUpperCase(),
      barcode:      (r.바코드||'').toUpperCase(),
      product_name: r.상품명||'',
      option:       r.옵션||'',
      location:     r.로케이션||'',
    }));
    await sbInsertRows('jaeja_db', batch);
    onProgress(`Supabase DB 업로드 중… ${Math.min(i+BATCH, dbRows.length)}/${dbRows.length}`);
  }

  const _dbUpdatedAt = new Date().toLocaleString('ko-KR');
  try { localStorage.setItem('db_updated_at', _dbUpdatedAt); } catch{}
  onProgress('Supabase 동기화 완료 ✅');
}

function isEpureProduct(name) {
  if(typeof name!=="string"||!name.trim()) return false;
  if(name.toLowerCase().includes("sappun")) return false;
  return !/[가-힣]/.test(name);
}
function toNum(v) { const n=Number(v); return isNaN(n)?0:n; }

function collect(rows, sellerRules) {
  const result = {
    출고_송장건수:0,상품_출고수량:0,매장발주_출고수량:0,쿠팡로켓_출고수량:0,직진배송_출고수량:0,
    해외배송_출고수량:0,해외납품_출고수량:0,에퓨레_출고수량:0,에퓨레_송장건수:0,별도관리_출고수량:0,
    제외_송장건수:0,제외_출고수량:0,seller_detail:{},
  };
  const excluded=new Set(Object.entries(sellerRules).filter(([,c])=>c==="exclude").map(([s])=>s));
  const specials=new Set(Object.entries(sellerRules).filter(([,c])=>c==="special").map(([s])=>s));
  const cols=rows.length>0?Object.keys(rows[0]):[];
  const csCol=cols.find(c=>["c/s","C/S","cs이력","C/S이력"].some(k=>c.includes(k)));
  const recvCol=cols.find(c=>["수령자","수령인","받는분","받는사람","수취인"].some(k=>c.includes(k)));

  const exclRows=rows.filter(r=>excluded.has(r["판매처"]));
  result["제외_출고수량"]=exclRows.reduce((a,r)=>a+toNum(r["상품수량"]),0);
  result["제외_송장건수"]=new Set(exclRows.map(r=>r["송장번호"]).filter(Boolean)).size;
  excluded.forEach(s=>{
    const sr=exclRows.filter(r=>r["판매처"]===s);
    result.seller_detail[s]={category:"exclude",qty:sr.reduce((a,r)=>a+toNum(r["상품수량"]),0),inv:new Set(sr.map(r=>r["송장번호"]).filter(Boolean)).size};
  });

  const active=rows.filter(r=>!excluded.has(r["판매처"]));
  result["출고_송장건수"]=new Set(active.map(r=>r["송장번호"]).filter(Boolean)).size;
  result["상품_출고수량"]=active.reduce((a,r)=>a+toNum(r["상품수량"]),0);
  const base=active.filter(r=>!specials.has(r["판매처"]));

  Object.entries(sellerRules).forEach(([seller,cat])=>{
    if(cat==="exclude") return;
    const sr=active.filter(r=>r["판매처"]===seller);
    const qty=sr.reduce((a,r)=>a+toNum(r["상품수량"]),0);
    const inv=new Set(sr.map(r=>r["송장번호"]).filter(Boolean)).size;
    result.seller_detail[seller]={category:cat,qty,inv};
    if(cat==="special"){
      result["별도관리_출고수량"]+=qty;
      const epQty=sr.filter(r=>isEpureProduct(r["상품명"])).reduce((a,r)=>a+toNum(r["상품수량"]),0);
      result["에퓨레_출고수량"]+=epQty;
      const nonEp=sr.filter(r=>!isEpureProduct(r["상품명"]));
      const csMap={};
      nonEp.forEach(r=>{const val=csCol?String(r[csCol]||"").trim():"";const mapped=SPECIAL_HEADER_MAP[val]||"domestic";csMap[mapped]=(csMap[mapped]||0)+toNum(r["상품수량"]);});
      result.seller_detail[seller].special_split={epure:epQty,...csMap};
    } else if(cat==="store"){
      result["매장발주_출고수량"]+=qty;
    } else if(cat==="coupang") result["쿠팡로켓_출고수량"]+=qty;
    else if(cat==="jikjin") result["직진배송_출고수량"]+=qty;
    else if(cat==="overseas_ship") result["해외배송_출고수량"]+=qty;
    else if(cat==="overseas_del") result["해외납품_출고수량"]+=qty;
  });

  const epBase=base.filter(r=>isEpureProduct(r["상품명"]));
  result["에퓨레_출고수량"]+=epBase.reduce((a,r)=>a+toNum(r["상품수량"]),0);
  const spRows=active.filter(r=>specials.has(r["판매처"]));
  const epSpRows=spRows.filter(r=>isEpureProduct(r["상품명"]));
  result["에퓨레_송장건수"]=new Set([...epBase.map(r=>r["송장번호"]),...epSpRows.map(r=>r["송장번호"])].filter(Boolean)).size;
  const known=new Set(Object.keys(sellerRules));
  [...new Set(active.map(r=>r["판매처"]).filter(s=>s&&!known.has(s)))].forEach(s=>{
    const sr=active.filter(r=>r["판매처"]===s);
    result.seller_detail[`[미분류]${s}`]={category:"unknown",qty:sr.reduce((a,r)=>a+toNum(r["상품수량"]),0),inv:new Set(sr.map(r=>r["송장번호"]).filter(Boolean)).size};
  });
  return result;
}

function useGoogleAuth(){
  const[gapiReady,setGapiReady]=useState(false);
  const[userEmail,setUserEmail]=useState(null);
  const tokenRef=useRef(null);
  useEffect(()=>{
    const tryInit=()=>{
      if(!(window.gapi&&window.google?.accounts?.oauth2)){setTimeout(tryInit,200);return;}
      window.gapi.load("client",async()=>{
        await window.gapi.client.init({apiKey:DRIVE_API_KEY,discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
        tokenRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:DRIVE_CLIENT_ID,scope:"https://www.googleapis.com/auth/drive email profile",
          callback:(res)=>{
            if(!res.error){
              setGapiReady(true);
              // 이메일 가져오기
              window.gapi.client.request({path:"https://www.googleapis.com/oauth2/v2/userinfo"})
                .then(r=>setUserEmail(r.result.email)).catch(()=>{});
            }
          }
        });
        // 기존 토큰 있으면 바로 ready
        const tok=window.gapi.client.getToken();
        if(tok?.access_token) setGapiReady(true);
      });
    };
    setTimeout(tryInit,100);
  },[]);
  const signIn=useCallback(()=>{if(tokenRef.current)tokenRef.current.requestAccessToken({prompt:""});},[]);
  return{gapiReady,userEmail,tokenRef,signIn};
}

  async function uploadBlob(blob,filename){const ok=await ensureToken();if(!ok)return false;try{const form=new FormData();form.append("metadata",new Blob([JSON.stringify({name:filename,parents:[folderId]})],{type:"application/json"}));form.append("file",blob,filename);await new Promise((resolve,reject)=>{const xhr=new XMLHttpRequest();xhr.onload=()=>xhr.status===200?resolve():reject(new Error(xhr.statusText));xhr.onerror=()=>reject(new Error("오류"));xhr.open("POST","https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name");xhr.setRequestHeader("Authorization","Bearer "+window.gapi.client.getToken().access_token);xhr.send(form);});await fetchFiles();return true;}catch(e){showToast("드라이브 저장 실패: "+e.message,"error");return false;}}
  useEffect(()=>{if(onReady)onReady({fetch:fetchFiles,tokenRef,uploadBlob});},[onReady,fetchFiles]);
  async function deleteFile(fileId,fileName){const ok=await ensureToken();if(!ok){showToast("로그인이 필요합니다","error");return;}setDeleting(prev=>new Set([...prev,fileId]));try{await new Promise((resolve,reject)=>{const xhr=new XMLHttpRequest();xhr.onload=()=>xhr.status===204?resolve():reject(new Error(xhr.statusText));xhr.onerror=()=>reject(new Error("삭제 오류"));xhr.open("DELETE",`https://www.googleapis.com/drive/v3/files/${fileId}`);xhr.setRequestHeader("Authorization","Bearer "+window.gapi.client.getToken().access_token);xhr.send();});showToast(`"${fileName}" 삭제 완료!`);setSelectedFiles(prev=>{const n=new Set(prev);n.delete(fileId);return n;});await fetchFiles();}catch(e){showToast("삭제 실패: "+e.message,"error");}finally{setDeleting(prev=>{const n=new Set(prev);n.delete(fileId);return n;});}}
  async function deleteSelected(){if(selectedFiles.size===0)return;if(!window.confirm(`선택한 ${selectedFiles.size}개 파일을 삭제할까요?`))return;const ok=await ensureToken();if(!ok){showToast("로그인이 필요합니다","error");return;}for(const fid of selectedFiles){const f=files.find(x=>x.id===fid);await deleteFile(fid,f?.name||fid);}setSelectedFiles(new Set());}
  function toggleSelect(id){setSelectedFiles(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleAll(){if(selectedFiles.size===files.length)setSelectedFiles(new Set());else setSelectedFiles(new Set(files.map(f=>f.id)));}
  function fmtDateStr(iso){if(!iso)return"-";return new Date(iso).toLocaleString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});}
  function fmtBytes(b){if(!b)return"-";if(b<1048576)return(b/1024).toFixed(1)+" KB";return(b/1048576).toFixed(1)+" MB";}
  const FILE_ICONS={pdf:"📄",doc:"📝",docx:"📝",xls:"📊",xlsx:"📊",xlsm:"📊",ppt:"📋",pptx:"📋",jpg:"🖼️",jpeg:"🖼️",png:"🖼️",zip:"🗜️",txt:"📃",csv:"📃"};
  function fileIcon(name){return FILE_ICONS[(name.split(".").pop()||"").toLowerCase()]||"📎";}
  return(
    <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text}}>📁 {panelTitle}</div>
        <a href={folderLink} target="_blank" rel="noreferrer" style={{fontSize:13,color:C.accent,textDecoration:"none"}}>드라이브 열기 ↗</a>
        <div style={{flex:1}}/>
        {selectedFiles.size>0&&<button onClick={deleteSelected} style={{background:C.redSoft,color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,padding:"4px 10px",fontSize:13,fontWeight:600,cursor:"pointer"}}>🗑 선택삭제 ({selectedFiles.size})</button>}
        <button onClick={fetchFiles} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:13,color:C.muted,cursor:"pointer"}}>↻ 새로고침</button>
        <label style={{background:uploading?C.dim:C.accent,color:uploading?C.muted:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:13,fontWeight:600,cursor:uploading?"default":"pointer"}}>
          {uploading?"업로드 중…":"⬆ 업로드"}
          <input ref={fileInputRef} type="file" multiple onChange={e=>{Array.from(e.target.files).forEach(f=>uploadFile(f));e.target.value="";}} disabled={uploading} style={{display:"none"}}/>
        </label>
      </div>
      {toast&&<div style={{background:toast.type==="error"?"#fff1f2":"#f0fdf4",border:`1px solid ${toast.type==="error"?"#fecaca":"#a7f3d0"}`,borderRadius:8,padding:"8px 12px",fontSize:14,color:toast.type==="error"?"#dc2626":"#059669"}}>{toast.msg}</div>}
      <div style={{flex:1,minHeight:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:12,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
          <thead><tr style={{background:C.surface}}>
            <th style={{padding:"9px 8px",width:32,borderBottom:`2px solid ${C.border}`}}><input type="checkbox" checked={files.length>0&&selectedFiles.size===files.length} onChange={toggleAll}/></th>
            {["파일명","크기","수정일","삭제"].map((h,i)=><th key={i} style={{padding:"9px 10px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:13,borderBottom:`2px solid ${C.border}`,width:i===1?70:i===2?130:i===3?50:undefined}}>{h}</th>)}
          </tr></thead>
        </table>
        <div style={{flex:1,overflowY:"auto"}}>
          {loading?<div style={{padding:24,textAlign:"center",color:C.muted,fontSize:14}}>불러오는 중…</div>
          :files.length===0?<div style={{padding:24,textAlign:"center",color:C.muted,fontSize:14}}>{gapiReady?"파일이 없습니다":"Google 로그인 후 파일 목록이 표시됩니다"}</div>
          :<table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}><tbody>
            {files.map((f,i)=>(
              <tr key={f.id} style={{background:selectedFiles.has(f.id)?C.accentSoft:i%2===0?"transparent":C.bg}}>
                <td style={{padding:"8px 8px",textAlign:"center",borderBottom:`1px solid ${C.border}55`}}><input type="checkbox" checked={selectedFiles.has(f.id)} onChange={()=>toggleSelect(f.id)}/></td>
                <td style={{padding:"8px 10px",borderBottom:`1px solid ${C.border}55`}}>
                  <a href={f.webViewLink||f.webContentLink} target="_blank" rel="noreferrer" style={{color:C.text,textDecoration:"none",display:"flex",alignItems:"center",gap:6}}>
                    <span>{fileIcon(f.name)}</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                  </a>
                </td>
                <td style={{padding:"8px 10px",color:C.muted,borderBottom:`1px solid ${C.border}55`,whiteSpace:"nowrap"}}>{fmtBytes(f.size)}</td>
                <td style={{padding:"8px 10px",color:C.muted,borderBottom:`1px solid ${C.border}55`,whiteSpace:"nowrap",fontSize:13}}>{fmtDateStr(f.modifiedTime)}</td>
                <td style={{padding:"8px 8px",textAlign:"center",borderBottom:`1px solid ${C.border}55`}}>
                  <button onClick={()=>{if(window.confirm(`"${f.name}" 파일을 삭제할까요?`))deleteFile(f.id,f.name);}} disabled={deleting.has(f.id)} style={{background:"#fff1f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:5,padding:"2px 6px",fontSize:13,cursor:"pointer"}}>{deleting.has(f.id)?"…":"🗑"}</button>
                </td>
              </tr>
            ))}
          </tbody></table>}
        </div>
      </div>
      {uploadHistory.length>0&&(
        <div style={{flexShrink:0,marginTop:4}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:6}}>📋 변환 기록</div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:C.surface}}>
              {["시간","원본 파일","변환 파일","행수"].map((h,i)=><th key={i} style={{padding:"6px 10px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:12,borderBottom:`1px solid ${C.border}`,width:i===3?50:undefined}}>{h}</th>)}
            </tr></thead></table>
            <div style={{maxHeight:160,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><tbody>
                {uploadHistory.slice(0,50).map((r,i)=>(
                  <tr key={r.id} style={{background:i%2===0?"transparent":C.bg}}>
                    <td style={{padding:"5px 10px",color:C.muted,borderBottom:`1px solid ${C.border}55`,whiteSpace:"nowrap"}}>{r.time}</td>
                    <td style={{padding:"5px 10px",color:C.text,borderBottom:`1px solid ${C.border}55`,overflow:"hidden",textOverflow:"ellipsis",maxWidth:140,whiteSpace:"nowrap"}}>{r.original}</td>
                    <td style={{padding:"5px 10px",color:C.accent,borderBottom:`1px solid ${C.border}55`,overflow:"hidden",textOverflow:"ellipsis",maxWidth:140,whiteSpace:"nowrap"}}>{r.changed}</td>
                    <td style={{padding:"5px 10px",textAlign:"right",color:C.text,borderBottom:`1px solid ${C.border}55`}}>{r.rows}</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CoupangTab ──
function CoupangTab(){
  const[orderFile,setOrderFile]=useState(null);   // 확장주문검색 파일명
  const[orderRows,setOrderRows]=useState([]);      // 확장주문검색 파싱 결과
  const[shipFile,setShipFile]=useState(null);      // 쉽먼트 파일명
  const[shipRows,setShipRows]=useState([]);        // 쉽먼트 파싱 결과
  const[shipRawBuf,setShipRawBuf]=useState(null);  // 쉽먼트 원본 ArrayBuffer (헤더 보존용)
  const[processing,setProcessing]=useState(false);
  const[resultMsg,setResultMsg]=useState(null);    // {type,msg,warnings[]}
  const[uploadHistory,setUploadHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("coupang_upload_history")||"[]");}catch{return[];}});
  const[split,setSplit]=useState(52);
  const splitDragRef=useRef({dragging:false});
  const containerRef=useRef();
  const coupangTokenRef=useRef(null);
  const coupangFetchRef=useRef(null);
  const coupangUploadBlobRef=useRef(null);
  const orderFileRef=useRef();
  const shipFileRef=useRef();
  const startDrag=e=>{e.preventDefault();splitDragRef.current.dragging=true;const onMove=ev=>{if(!splitDragRef.current.dragging)return;const rect=containerRef.current.getBoundingClientRect();const pct=Math.min(75,Math.max(25,((ev.clientX-rect.left)/rect.width)*100));setSplit(pct);};const onUp=()=>{splitDragRef.current.dragging=false;window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);};

  // ── 확장주문검색 업로드 ──
  const handleOrderFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        setOrderRows(rows);setOrderFile(file.name);setResultMsg(null);
      }catch(err){alert("확장주문검색 파일 로드 실패: "+err.message);}
    };
    reader.readAsArrayBuffer(file);e.target.value="";
  };

  // ── 쉽먼트 업로드 ──
  const handleShipFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const buf=ev.target.result;
        const wb=XLSX.read(buf,{type:"array",WTF:false});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        setShipRows(rows);setShipFile(file.name);setShipRawBuf(buf);setResultMsg(null);
      }catch(err){alert("쉽먼트 파일 로드 실패: "+err.message);}
    };
    reader.readAsArrayBuffer(file);e.target.value="";
  };

  // ── 핵심 처리 로직 ──
  const handleProcess=async()=>{
    if(!orderRows.length){alert("확장주문검색 파일을 먼저 업로드하세요.");return;}
    if(!shipRows.length){alert("쉽먼트 파일을 먼저 업로드하세요.");return;}
    setProcessing(true);setResultMsg(null);
    try{
      // ── 확장주문검색 헤더 감지 & 컬럼 이름 변경 ──
      // 원본 컬럼: 로켓배송바코드 → 상품바코드, 주문번호 → 발주번호, 수령자이름 → 물류센터, 송장번호 유지
      const orderSample=orderRows[0]||{};
      const findCol=(candidates)=>Object.keys(orderSample).find(k=>candidates.some(c=>k.includes(c)))||null;
      const orderBarcodeCol=findCol(["로켓배송바코드","상품바코드","바코드"]);
      const orderInvCol=findCol(["주문번호","발주번호","주문"]);
      const orderCenterCol=findCol(["수령자이름","물류센터","수령자","센터"]);
      const orderQtyCol=findCol(["상품수량","수량","qty","Qty"]);
      const orderTrackingCol=findCol(["송장번호","운송장번호","운송장"]);
      if(!orderBarcodeCol||!orderInvCol||!orderCenterCol){
        alert(`확장주문검색 필수 컬럼을 찾을 수 없습니다.\n감지됨: 바코드="${orderBarcodeCol}", 주문번호="${orderInvCol}", 수령자="${orderCenterCol}"`);
        setProcessing(false);return;
      }
      // 정규화된 확장주문검색 rows (헤더 변경 + 정렬)
      const normalizedOrder=orderRows.map(r=>({
        "상품바코드": String(r[orderBarcodeCol]||"").trim(),
        "발주번호":   String(r[orderInvCol]||"").trim(),
        "물류센터":   String(r[orderCenterCol]||"").trim(),
        "상품수량":   Number(r[orderQtyCol]||0)||0,
        "송장번호":   orderTrackingCol ? String(r[orderTrackingCol]||"").trim() : "",
        __orig: r,
      })).sort((a,b)=>{
        const bc=a["상품바코드"].localeCompare(b["상품바코드"],"en");if(bc!==0)return bc;
        const inv=a["발주번호"].localeCompare(b["발주번호"],"en");if(inv!==0)return inv;
        return a["물류센터"].localeCompare(b["물류센터"],"ko");
      });

      // ── 쉽먼트 헤더 감지 ──
      const shipSample=shipRows[0]||{};
      const findShipCol=(candidates)=>Object.keys(shipSample).find(k=>candidates.some(c=>k.includes(c)))||null;
      const shipBarcodeCol=findShipCol(["상품바코드","바코드","로켓배송바코드"]);
      const shipInvCol=findShipCol(["발주번호","주문번호","주문"]);
      const shipCenterCol=findShipCol(["물류센터","수령자이름","수령자","센터"]);
      const shipQtyCol=findShipCol(["확정수량","확정","수량","qty","Qty"]);
      const shipTypeCol=findShipCol(["입고유형","유형","type"]);
      const shipTrackingCol=findShipCol(["송장번호","운송장번호","tracking","트래킹"]);
      if(!shipBarcodeCol||!shipInvCol||!shipCenterCol){
        alert(`쉽먼트 필수 컬럼을 찾을 수 없습니다.\n감지됨: 바코드="${shipBarcodeCol}", 발주번호="${shipInvCol}", 물류센터="${shipCenterCol}"`);
        setProcessing(false);return;
      }

      // ── 쉽먼트: 밀크런 제거 & 정렬 (상품바코드 → 발주번호 → 물류센터 오름차순) ──
      let filteredShip=shipRows.filter(r=>!shipTypeCol||String(r[shipTypeCol]||"").trim()!=="밀크런");
      filteredShip=filteredShip.sort((a,b)=>{
        const bc=String(a[shipBarcodeCol]||"").localeCompare(String(b[shipBarcodeCol]||""),"en");if(bc!==0)return bc;
        const inv=String(a[shipInvCol]||"").localeCompare(String(b[shipInvCol]||""),"en");if(inv!==0)return inv;
        return String(a[shipCenterCol]||"").localeCompare(String(b[shipCenterCol]||""),"ko");
      });

      // ── 확장주문검색 인덱스: (바코드+발주번호+물류센터) → rows ──
      const orderIndex={};
      normalizedOrder.forEach(r=>{
        const key=`${r["상품바코드"]}||${r["발주번호"]}||${r["물류센터"]}`;
        if(!orderIndex[key])orderIndex[key]=[];
        orderIndex[key].push(r);
      });

      // ── 쉽먼트 rows 처리: 송장번호 매핑 + 수량 분할 ──
      const warnings=[];
      const outRows=[];
      filteredShip.forEach(shipRow=>{
        const barcode=String(shipRow[shipBarcodeCol]||"").trim();
        const inv=String(shipRow[shipInvCol]||"").trim();
        const center=String(shipRow[shipCenterCol]||"").trim();
        const confirmedQty=Number(shipRow[shipQtyCol])||0;
        const key=`${barcode}||${inv}||${center}`;
        const matched=orderIndex[key]||[];

        if(matched.length===0){
          // 매칭 없음 → 그냥 원본 행 유지
          const newRow={...shipRow};
          outRows.push(newRow);
          return;
        }
        if(matched.length===1){
          // 단일 매칭: 수량 비교 후 송장번호 적용
          const mQty=Number(matched[0]["상품수량"])||0;
          if(shipTrackingCol&&mQty===confirmedQty){
            const newRow={...shipRow};
            newRow[shipTrackingCol]=matched[0]["송장번호"]||"";
            outRows.push(newRow);
          } else if(mQty!==confirmedQty){
            warnings.push(`⚠ 수량 불일치 — 바코드:${barcode} 발주번호:${inv} 센터:${center} | 확정:${confirmedQty} ≠ 주문:${mQty}`);
            const newRow={...shipRow};
            newRow["__warning"]="수량부족";
            outRows.push(newRow);
          } else {
            outRows.push({...shipRow});
          }
          return;
        }
        // 복수 매칭: 합산 수량 확인 후 분할
        const totalMatchQty=matched.reduce((s,m)=>s+(Number(m["상품수량"])||0),0);
        if(totalMatchQty===confirmedQty){
          // 수량 합산이 확정수량과 일치 → 행 분할
          matched.forEach((m,mi)=>{
            const newRow={...shipRow};
            if(shipQtyCol)newRow[shipQtyCol]=Number(m["상품수량"])||0;
            if(shipTrackingCol)newRow[shipTrackingCol]=m["송장번호"]||"";
            outRows.push(newRow);
          });
        } else {
          warnings.push(`⚠ 수량 불일치 — 바코드:${barcode} 발주번호:${inv} 센터:${center} | 확정:${confirmedQty} ≠ 주문합산:${totalMatchQty}`);
          // 그냥 분할 시도 + 경고
          matched.forEach((m)=>{
            const newRow={...shipRow};
            if(shipQtyCol)newRow[shipQtyCol]=Number(m["상품수량"])||0;
            if(shipTrackingCol)newRow[shipTrackingCol]=m["송장번호"]||"";
            newRow["__warning"]="수량부족";
            outRows.push(newRow);
          });
        }
      });

      // ── 경고 표시용 컬럼 제거, __warning 강조는 배경색 처리 ──
      const hasWarning=r=>r["__warning"]!=null;
      const cleanRow=r=>{const x={...r};delete x["__warning"];return x;};

      // ── 출력 헤더 구성 ──
      const outHeaders=Object.keys(shipRows[0]||{}).filter(h=>h!=="__warning");
      if(shipTrackingCol&&!outHeaders.includes(shipTrackingCol))outHeaders.push(shipTrackingCol);

      // ── XLSX 생성 ──
      const shipWarnRows=outRows.filter(hasWarning);
      const wb=XLSX.utils.book_new();

      // 시트1: 상품목록 (납품수량 = 확정수량으로 자동 입력)
      const shippedCol=outHeaders.find(h=>h.includes("납품수량")||h.includes("Shipped Qty"));
      const confirmedCol=outHeaders.find(h=>h.includes("확정수량")||h.includes("Confirmed Qty"));
      const shipOutArr=[outHeaders,...outRows.map(r=>{
        const cleaned=cleanRow(r);

          const val=cleaned[confirmedCol];
          const num=val===undefined||val===""?0:Number(val);
          cleaned[shippedCol]=isNaN(num)?0:num;
        }
        return outHeaders.map(h=>{
          const v=cleaned[h];
          if(v===undefined||v===null||v==="") return "";

          return !isNaN(n)&&v!=""?n:v;

      const shipWs=XLSX.utils.aoa_to_sheet(shipOutArr);

        }
        if(rawWb.SheetNames.length>=3){
          const s3Name=rawWb.SheetNames[2];
          XLSX.utils.book_append_sheet(wb,rawWb.Sheets[s3Name],s3Name);
        }
      }

      // 경고 시트
      if(warnings.length>0){
        const warnWs=XLSX.utils.aoa_to_sheet([["경고 내용"],...warnings.map(w=>[w])]);

      const eddCol=outHeaders.find(h=>h.includes("입고예정일")||h.includes("EDD"));
      const eddVal=eddCol&&outRows.length>0?String(cleanRow(outRows[0])[eddCol]||""):"" ;
      const eddStr=eddVal.replace(/[^0-9]/g,"").slice(0,8);

      // 한 번만 직렬화해서 PC저장 + 드라이브 업로드에 동일 버퍼 사용

      // 구글 드라이브 자동 업로드
      if(coupangUploadBlobRef.current){
        try{await coupangUploadBlobRef.current(outBlob,outName);}
        catch(e){console.warn("[Drive upload]",e);}
      }

      // 기록 저장
      const record={id:Date.now(),time:new Date().toLocaleString("ko-KR"),original:shipFile,changed:outName,rows:outRows.length};

      setResultMsg({

        warnings,

      if(warnings.length>0){
        alert(`⚠️ 수량 불일치 ${warnings.length}건이 발견되었습니다.\n\n${warnings.slice(0,5).join("\n")}${warnings.length>5?`\n…외 ${warnings.length-5}건`:""}\n\n결과 파일의 "수량부족경고" 시트를 확인하세요.`);
      }
    }catch(err){setResultMsg({type:"error",msg:"❌ 처리 오류: "+err.message,warnings:[]});}
    setProcessing(false);
  };

  return(
    <div ref={containerRef} style={{flex:1,minHeight:0,display:"flex",flexDirection:"row",overflow:"hidden"}}>
      {/* 좌측: 파일 업로드 & 처리 */}
      <div style={{flex:`0 0 ${split}%`,minHeight:0,display:"flex",flexDirection:"column",padding:"20px 20px 20px 24px",gap:14,overflowY:"auto"}}>
        <div style={{fontSize:17,fontWeight:800,color:C.text}}>🚀 쿠팡 쉽먼트 처리</div>

        {/* 확장주문검색 업로드 */}

            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:3}}>① 확장주문검색 파일</div>
            <div style={{fontSize:13,color:C.muted}}>{orderFile?`✅ ${orderFile}  |  ${orderRows.length.toLocaleString()}행`:"이지어드민-주문배송관리-확장주문검색2-조건(쿠팡 배송(날짜지정해야함))"}</div>
          </div>
          <label style={{background:orderFile?C.greenSoft:C.accentSoft,color:orderFile?C.green:C.accent,border:`1.5px solid ${orderFile?C.green:C.accent}`,borderRadius:8,padding:"7px 16px",fontSize:14,fontWeight:700,cursor:"pointer"}}>

        </div>

        {/* 쉽먼트 업로드 */}
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:3}}>② 쉽먼트 파일</div>
            <div style={{fontSize:13,color:C.muted}}>{shipFile?`✅ ${shipFile}  |  ${shipRows.length.toLocaleString()}행`:"서플라이어허브-물류-쉽먼트-쉽먼트일괄등록-일괄등록양식다운로드-날짜(입고예정일)-전체체크-양식다운로드"}</div>

          {processing?"⏳ 처리 중…":"⚡ 처리 & 다운로드"}

        {/* 결과 메시지 */}
        {resultMsg&&(
          <div style={{background:resultMsg.type==="ok"?"#f0fdf4":resultMsg.type==="warn"?"#fffbeb":"#fff1f2",border:`1px solid ${resultMsg.type==="ok"?"#a7f3d0":resultMsg.type==="warn"?"#fde68a":"#fecaca"}`,borderRadius:10,padding:"12px 16px"}}>
            <div style={{fontSize:14,fontWeight:700,color:resultMsg.type==="ok"?"#059669":resultMsg.type==="warn"?"#b45309":"#dc2626"}}>{resultMsg.msg}</div>

              </div>
            )}
          </div>
        )}

        {/* 처리 방법 안내 */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",fontSize:13,color:C.muted,lineHeight:1.7}}>
          <div style={{fontWeight:700,color:C.text,marginBottom:6}}>📌 처리 내용</div>
          <div>• 확장주문검색: 상품바코드 → 발주번호 → 물류센터 오름차순 정렬</div>
          <div>• 쉽먼트: 입고유형 "밀크런" 행 삭제 후 동일 기준 정렬</div>
          <div>• 확장주문검색 헤더 변환: 로켓배송바코드→상품바코드, 주문번호→발주번호, 수령자이름→물류센터, 송장번호 유지</div>
          <div>• 3개 키(상품바코드·발주번호·물류센터) + 수량 매칭 → 확장주문검색의 송장번호를 쉽먼트에 자동 입력</div>
          <div>• 복수 행: 수량 합산이 확정수량과 일치 시 행 분할 + 각 송장번호 입력</div>
          <div>• 수량 부족: 경고 알림 + 결과 파일 "수량부족경고" 시트에 목록 기재</div>
        </div>
      </div>

      {/* 드래그 리사이저 */}
      <div onMouseDown={startDrag} style={{width:6,flexShrink:0,cursor:"col-resize",background:"transparent",borderLeft:`1px solid ${C.border}`,transition:"background .15s",zIndex:10,userSelect:"none"}} onMouseEnter={e=>e.currentTarget.style.background=C.accent+"44"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}/>

      {/* 우측: Drive 파일 패널 */}
      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",padding:"20px",overflow:"hidden"}}>
        <DriveFilePanel folderId={COUPANG_FOLDER_ID} folderLink={COUPANG_DRIVE_FOLDER_LINK} panelTitle="쿠팡 파일" onReady={({fetch,tokenRef:tr,uploadBlob})=>{coupangFetchRef.current=fetch;coupangTokenRef.current=tr.current;coupangUploadBlobRef.current=uploadBlob;}} uploadHistory={uploadHistory}/>
      </div>
    </div>
  );
}

function UpsTab(){

  const upsFileRef=useRef();

  async function uploadBlobToDrive(blob,fileName){
    try{const tok=(window.gapi && window.gapi.client && window.gapi.client.getToken());if(!(tok && tok.access_token)){const ok=await new Promise(resolve=>{if(!upsTokenRef.current){resolve(false);return;}const prev=upsTokenRef.current.callback;upsTokenRef.current.callback=res=>{if(prev)prev(res);resolve(!res.error);};upsTokenRef.current.requestAccessToken({prompt:""});});if(!ok)return;}
    const getMime=n=>({xlsx:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",xls:"application/vnd.ms-excel"})[n.split(".").pop().toLowerCase()]||"application/octet-stream";
    const form=new FormData();form.append("metadata",new Blob([JSON.stringify({name:fileName,parents:[UPS_FOLDER_ID],mimeType:getMime(fileName)})],{type:"application/json"}));form.append("file",blob,fileName);
    await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name",{method:"POST",headers:{Authorization:"Bearer "+window.gapi.client.getToken().access_token},body:form});
    upsFetchRef.current && upsFetchRef.current();}catch(e){console.warn("[UPS Drive]",e);}
  }
  const handleUpsFile=e=>{
    const file=e.target.files[0];if(!file)return;
    setProcessing(true);setResultMsg("");
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        let rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        rows=rows.map(r=>{const c={};for(const[k,v]of Object.entries(r)){if(!/^[xX](\.\d+)?$/.test(k))c[k]=v;}return c;});
        const h07293Dict=Object.fromEntries(upsData.H07293.map(i=>[i.code.toUpperCase(),i.checked]));
        const h0728jDict=Object.fromEntries(upsData.H0728J.map(i=>[i.code.toUpperCase(),i.checked]));
        const processed=rows.map(r=>processRow(r,h07293Dict,h0728jDict));
        const allCols=new Set(processed.flatMap(r=>Object.keys(r)));
        const finalCols=FIXED_COLUMNS.filter(c=>allCols.has(c));
        const outRows=processed.map(r=>{const row={};finalCols.forEach(c=>{row[c]=r[c]??"";});return row;});
        const outWs=XLSX.utils.json_to_sheet(outRows,{header:finalCols});
        // 열 너비
        const colWidths=finalCols.map(col=>{const hl=col.length;const ml=outRows.reduce((mx,row)=>{const v=row[col]!=null?String(row[col]):"";return Math.max(mx,v.length);},0);return{wch:Math.min(Math.max(hl,ml)+2,50)};});
        outWs["!cols"]=colWidths;
        const outWb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(outWb,outWs,"Sheet1");
        // ── zip binary patcher (freeze pane + border/bold/orange 실제 적용) ──
        function crc32buf(buf){let c=0xFFFFFFFF;for(let i=0;i<buf.length;i++){c^=buf[i];for(let j=0;j<8;j++)c=(c>>>1)^(c&1?0xEDB88320:0);}return(c^0xFFFFFFFF)>>>0;}
        function u32le(n){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n>>>0,true);return b;}
        function patchZipEntry(ab,entryName,newXml){
          const buf=new Uint8Array(ab);
          const enc=new TextEncoder();
          const newBytes=enc.encode(newXml);
          const newCrc=crc32buf(newBytes);
          const newSize=newBytes.length;
          const dv=new DataView(buf.buffer,buf.byteOffset,buf.byteLength);
          // 1. local entries 파싱
          const entries=[];let pos=0;
          while(pos<buf.length-4){
            if(dv.getUint32(pos,true)===0x04034B50){
              const comp=dv.getUint16(pos+8,true);
              const crc=dv.getUint32(pos+14,true);
              const cSize=dv.getUint32(pos+18,true);
              const uSize=dv.getUint32(pos+22,true);
              const nLen=dv.getUint16(pos+26,true);
              const xLen=dv.getUint16(pos+28,true);
              const name=new TextDecoder().decode(buf.slice(pos+30,pos+30+nLen));
              const dataStart=pos+30+nLen+xLen;
              entries.push({offset:pos,name,comp,crc,cSize,uSize,nLen,xLen,dataStart,dataEnd:dataStart+cSize});
              pos=dataStart+cSize;
            }else break;
          }
          const target=entries.find(e=>e.name===entryName);
          if(!target||target.comp!==0)return ab;
          const sizeDiff=newSize-target.cSize;
          // 2. 새 local section 조립
          const parts=[];
          for(const e of entries){
            if(e.name===entryName){
              const hdr=new Uint8Array(buf.slice(e.offset,e.dataStart));
              const hdv=new DataView(hdr.buffer);
              hdv.setUint32(14,newCrc,true);
              hdv.setUint32(18,newSize,true);
              hdv.setUint32(22,newSize,true);
              parts.push(hdr);parts.push(newBytes);
            }else{parts.push(buf.slice(e.offset,e.dataEnd));}
          }
          const localSection=new Uint8Array(parts.reduce((a,p)=>a+p.length,0));
          let off=0;for(const p of parts){localSection.set(p,off);off+=p.length;}
          // 3. central directory 파싱 & 수정
          let eocdPos=-1;
          for(let i=buf.length-22;i>=0;i--){if(dv.getUint32(i,true)===0x06054B50){eocdPos=i;break;}}
          if(eocdPos<0)return ab;
          const cdStart=dv.getUint32(eocdPos+16,true);
          const cdSize=dv.getUint32(eocdPos+12,true);
          const cdBuf=new Uint8Array(buf.slice(cdStart,cdStart+cdSize));
          const cdDv=new DataView(cdBuf.buffer);
          let cp=0;
          while(cp<cdBuf.length-4){
            if(cdDv.getUint32(cp,true)===0x02014B50){
              const nLen=cdDv.getUint16(cp+28,true);
              const xLen=cdDv.getUint16(cp+30,true);
              const cmLen=cdDv.getUint16(cp+32,true);
              const name=new TextDecoder().decode(cdBuf.slice(cp+46,cp+46+nLen));
              const localOff=cdDv.getUint32(cp+42,true);
              if(name===entryName){cdDv.setUint32(cp+16,newCrc,true);cdDv.setUint32(cp+20,newSize,true);cdDv.setUint32(cp+24,newSize,true);}
              else if(localOff>target.offset){cdDv.setUint32(cp+42,localOff+sizeDiff,true);}
              cp+=46+nLen+xLen+cmLen;
            }else break;
          }
          // 4. EOCD 수정
          const eocdBuf=new Uint8Array(buf.slice(eocdPos));
          const eocdDv=new DataView(eocdBuf.buffer);
          eocdDv.setUint32(16,localSection.length,true);
          // 5. 합치기
          const total=localSection.length+cdBuf.length+eocdBuf.length;
          const out=new Uint8Array(total);
          out.set(localSection,0);out.set(cdBuf,localSection.length);out.set(eocdBuf,localSection.length+cdBuf.length);
          return out.buffer;
        }
        // 오렌지 대상 계산
        const addrCols=["STAddress1","STAddress2","STAddress3"];
        const orangeCells=new Set();
        outRows.forEach((row,ri)=>{const t=(row["STCountryTerritory"]||"").toString().toUpperCase();const lim=["JP","TW"].includes(t)?25:35;addrCols.forEach(col=>{const ci=finalCols.indexOf(col);if(ci===-1)return;if(String(row[col]||"").length>lim)orangeCells.add(XLSX.utils.encode_cell({r:ri+1,c:ci}));});});
        // styles.xml 생성 (font bold / medium border / thin border / orange fill)
        const newStylesXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><numFmts count="0"/><fonts count="2"><font><sz val="11"/><color theme="1"/><name val="Calibri"/><family val="2"/><scheme val="minor"/></font><font><b/><sz val="11"/><color theme="1"/><name val="Calibri"/><family val="2"/><scheme val="minor"/></font></fonts><fills count="3"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill><fill><patternFill patternType="solid"><fgColor rgb="FFFFA500"/><bgColor indexed="64"/></patternFill></fill></fills><borders count="3"><border><left/><right/><top/><bottom/><diagonal/></border><border><left style="thin"><color rgb="FF000000"/></left><right style="thin"><color rgb="FF000000"/></right><top style="thin"><color rgb="FF000000"/></top><bottom style="thin"><color rgb="FF000000"/></bottom><diagonal/></border><border><left style="medium"><color rgb="FF000000"/></left><right style="medium"><color rgb="FF000000"/></right><top style="medium"><color rgb="FF000000"/></top><bottom style="medium"><color rgb="FF000000"/></bottom><diagonal/></border></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="5"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="0" borderId="2" xfId="0" applyFont="1" applyBorder="1" applyAlignment="1"><alignment horizontal="center"/></xf><xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0" applyBorder="1"/><xf numFmtId="0" fontId="0" fillId="2" borderId="1" xfId="0" applyFill="1" applyBorder="1"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/></cellXfs><cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles></styleSheet>`;
        // sheet1.xml: 셀 스타일 인덱스 + freeze pane 삽입
        // 먼저 기본 xlsx 생성
        let xlsxAb=XLSX.write(outWb,{bookType:"xlsx",type:"array"});
        // sheet1.xml 읽기
        function readZipEntry(ab,name){
          const buf=new Uint8Array(ab);const dv=new DataView(buf.buffer,buf.byteOffset);
          let pos=0;
          while(pos<buf.length-4){
            if(dv.getUint32(pos,true)===0x04034B50){
              const comp=dv.getUint16(pos+8,true);const cSize=dv.getUint32(pos+18,true);
              const nLen=dv.getUint16(pos+26,true);const xLen=dv.getUint16(pos+28,true);
              const eName=new TextDecoder().decode(buf.slice(pos+30,pos+30+nLen));
              const dataStart=pos+30+nLen+xLen;
              if(eName===name&&comp===0)return new TextDecoder().decode(buf.slice(dataStart,dataStart+cSize));
              pos=dataStart+cSize;
            }else break;
          }return null;
        }
        let sheetXml=readZipEntry(xlsxAb,"xl/worksheets/sheet1.xml");
        // freeze pane 삽입
        sheetXml=sheetXml.replace(
          '<sheetView workbookViewId="0"/>',
          '<sheetView workbookViewId="0"><pane xSplit="1" ySplit="1" topLeftCell="B2" activePane="bottomRight" state="frozen"/><selection pane="bottomRight"/></sheetView>'
        );
        // 셀에 스타일 인덱스 적용: 헤더=xf1(bold+medium), 데이터=xf2(thin), 오렌지=xf3(orange+thin)
        sheetXml=sheetXml.replace(/<c r="([A-Z]+(\d+))"(?: t="([^"]*)")?>/g,(match,cellRef,rowNum,type)=>{
          const ri=parseInt(rowNum,10);
          let xfIdx=0;
          if(ri===1){xfIdx=1;}
          else if(orangeCells.has(cellRef)){xfIdx=3;}
          else if(ri>1){xfIdx=2;}
          if(xfIdx===0)return match;
          const tAttr=type?` t="${type}"`:"";
          return `<c r="${cellRef}"${tAttr} s="${xfIdx}">`;
        });
        // zip 패치: sheet1.xml + styles.xml
        xlsxAb=patchZipEntry(xlsxAb,"xl/worksheets/sheet1.xml",sheetXml);
        xlsxAb=patchZipEntry(xlsxAb,"xl/styles.xml",newStylesXml);
        const baseName=file.name.replace(/\.[^.]+$/,"");
        const changedName=`${baseName}_changed.xlsx`;
        // 다운로드
        const dlBlob=new Blob([xlsxAb],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
        const dlUrl=URL.createObjectURL(dlBlob);
        const dlA=document.createElement("a");dlA.href=dlUrl;dlA.download=changedName;dlA.click();setTimeout(()=>URL.revokeObjectURL(dlUrl),3000);
        const origBlob=new Blob([ev.target.result],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
        await uploadBlobToDrive(origBlob,file.name);
        const changedBlob=new Blob([xlsxAb],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
        await uploadBlobToDrive(changedBlob,changedName);
        const record={id:Date.now(),time:new Date().toLocaleString("ko-KR"),original:file.name,changed:changedName,rows:processed.length};
        setUploadHistory(prev=>{const next=[record,...prev].slice(0,50);localStorage.setItem("ups_upload_history",JSON.stringify(next));return next;});
        setResultMsg(`✅ 완료: ${processed.length}행 처리됨 | Drive 업로드 완료`);
      }catch(err){setResultMsg(`❌ 오류: ${err.message}`);}
      setProcessing(false);
    };
    reader.readAsArrayBuffer(file);e.target.value="";
  };
  const addCountry=(side,code)=>{if(!code)return;code=code.toUpperCase();const list=upsData[side];if(list.find(i=>i.code===code)){alert(`이미 존재: ${code}`);return;}updateUps({...upsData,[side]:[...list,{code,checked:false}]});};
  const removeCountry=(side,code)=>{if(!code)return;code=code.toUpperCase();if(!window.confirm(`${side}에서 '${code}'를 삭제할까요?`))return;updateUps({...upsData,[side]:upsData[side].filter(i=>i.code!==code)});};
  const toggleChecked=(side,code)=>{updateUps({...upsData,[side]:upsData[side].map(i=>i.code===code?{...i,checked:!i.checked}:i)});};
  const sortedList=side=>[...upsData[side]].sort((a,b)=>{const ai=PINNED.indexOf(a.code),bi=PINNED.indexOf(b.code);if(ai!==-1&&bi!==-1)return ai-bi;if(ai!==-1)return-1;if(bi!==-1)return 1;return a.code.localeCompare(b.code);});
  return(
    <div ref={upsContainerRef} style={{flex:1,minHeight:0,display:"flex",flexDirection:"row",overflow:"hidden"}}>
      <div style={{flex:`0 0 ${upsSplit}%`,minHeight:0,display:"flex",flexDirection:"column",padding:"20px 20px 20px 24px",gap:12,overflowY:"auto",borderRight:"none"}}>
        <div style={{background:C.card,border:`1.5px solid ${C.border}`,borderRadius:12,padding:"14px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",flexShrink:0}}>
          <div style={{flex:1}}><div style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:3}}>UPS 엑셀 파일 업로드</div><div style={{fontSize:13,color:C.muted}}>이지어드민-주문배송관리-주문다운로드2-조건(UPS접수건확인)-초기화-재고검사</div></div>
          <label style={{background:processing?C.dim:"linear-gradient(90deg,#059669,#10b981)",color:processing?C.muted:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:16,fontWeight:700,cursor:processing?"default":"pointer"}}>
            {processing?"⏳ 처리 중…":"📁 파일 선택 & 변환"}
            <input ref={upsFileRef} type="file" accept=".xlsx,.xls" onChange={handleUpsFile} disabled={processing} style={{display:"none"}}/>
          </label>
        </div>
        {resultMsg&&<div style={{background:resultMsg.startsWith("✅")?"#f0fdf4":"#fff1f2",border:`1px solid ${resultMsg.startsWith("✅")?"#a7f3d0":"#fecaca"}`,borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:600,color:resultMsg.startsWith("✅")?"#059669":"#dc2626"}}>{resultMsg}</div>}
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>국가 관리</div>
          <div style={{flex:1}}/>
          <button onClick={()=>{
            const blob=new Blob([JSON.stringify({H07293:upsData.H07293,H0728J:upsData.H0728J},null,2)],{type:"application/json"});
            const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ups_country_config.json";a.click();
          }} style={{background:C.surface,color:C.muted,border:`1.5px solid ${C.border}`,borderRadius:7,padding:"4px 10px",fontSize:13,cursor:"pointer"}}>⬇ 내보내기</button>
          <label style={{background:C.surface,color:C.accent,border:`1.5px solid ${C.accent}`,borderRadius:7,padding:"4px 10px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            ⬆ 가져오기
            <input type="file" accept=".json" onChange={e=>{
              const file=e.target.files[0];if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                try{
                  const cfg=JSON.parse(ev.target.result);
                  const h07=cfg.H07293||cfg.h07293;
                  const h07j=cfg.H0728J||cfg.h0728j;
                  if(!Array.isArray(h07)||!Array.isArray(h07j))throw new Error("올바른 형식이 아닙니다.");
                  if(window.confirm("H07293 "+h07.length+"개 / H0728J "+h07j.length+"개를 불러옵니다. 현재 설정을 덮어쓸까요?"))
                    updateUps({H07293:h07,H0728J:h07j});
                }catch(err){alert("JSON 파일 오류: "+err.message);}
              };
              reader.readAsText(file,"utf-8");e.target.value="";
            }} style={{display:"none"}}/>
          </label>
        </div>
        <div style={{flex:1,minHeight:0,display:"flex",gap:12}}>
          <CountryPanel side="H07293" newCode={newCodeLeft} setNewCode={setNewCodeLeft} pinnedList={PINNED_LEFT} items={sortedList("H07293")} onToggle={c=>toggleChecked("H07293",c)} onRemove={c=>removeCountry("H07293",c)} onAdd={c=>addCountry("H07293",c)}/>
          <CountryPanel side="H0728J" newCode={newCodeRight} setNewCode={setNewCodeRight} pinnedList={PINNED_RIGHT} items={sortedList("H0728J")} onToggle={c=>toggleChecked("H0728J",c)} onRemove={c=>removeCountry("H0728J",c)} onAdd={c=>addCountry("H0728J",c)}/>
        </div>

        <div style={{fontSize:13,color:C.muted,flexShrink:0}}>※ STStateProvinceCounty 체크: 해당 국가 행에 국가코드를 자동 입력<br/>※ AU,CA,US는 H07293 고정 / JP는 H0728J 고정 (삭제 불가)</div>
      </div>

      {/* ── 드래그 리사이저 ── */}
      <div onMouseDown={startUpsDrag} style={{width:6,flexShrink:0,cursor:"col-resize",background:"transparent",borderLeft:`1px solid ${C.border}`,transition:"background .15s",zIndex:10,userSelect:"none"}} onMouseEnter={e=>e.currentTarget.style.background=C.accent+"44"} onMouseLeave={e=>e.currentTarget.style.background="transparent"} title="드래그로 경계선 이동"/>

      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",padding:"20px",overflow:"hidden"}}>
        <UpsFilePanel onReady={({fetch,tokenRef:tr})=>{upsFetchRef.current=fetch;upsTokenRef.current=tr.current;}} uploadHistory={uploadHistory}/>
      </div>
    </div>
  );
}

// DashboardTab - 대시보드 (캘린더)
// ═══════════════════════════════════════════════
const CAL_LS_5 = "sap_calendar_events";
const CAT_LS_5 = "sap_calendar_cats";

const PALETTE=[
  {id:"blue",  bg:"#dce8ff",border:"#3b6fd4",text:"#1e3a8a"},
  {id:"green", bg:"#dcfce7",border:"#16a34a",text:"#14532d"},
  {id:"red",   bg:"#fee2e2",border:"#dc2626",text:"#7f1d1d"},
  {id:"orange",bg:"#ffedd5",border:"#ea580c",text:"#7c2d12"},
  {id:"purple",bg:"#ede9fe",border:"#7c3aed",text:"#4c1d95"},
  {id:"pink",  bg:"#fce7f3",border:"#db2777",text:"#831843"},
  {id:"teal",  bg:"#ccfbf1",border:"#0d9488",text:"#134e4a"},
  {id:"yellow",bg:"#fef9c3",border:"#ca8a04",text:"#713f12"},
];
const DEFAULT_CATS=[
  {id:"cat_1",label:"업무",  paletteId:"blue"},
  {id:"cat_2",label:"완료",  paletteId:"green"},
  {id:"cat_3",label:"긴급",  paletteId:"red"},
  {id:"cat_4",label:"미팅",  paletteId:"orange"},
  {id:"cat_5",label:"기타",  paletteId:"purple"},
];
function loadCalEvents(){try{return JSON.parse(localStorage.getItem(CAL_LS_5)||"[]");}catch{return[];}}
function loadCalCats(){try{const r=localStorage.getItem(CAT_LS_5);return r?JSON.parse(r):DEFAULT_CATS;}catch{return DEFAULT_CATS;}}

// ── Supabase 캘린더 CRUD ──
async function sbCalEventsLoad(){
  try{
    const res=await fetch(`${SB_URL}/rest/v1/calendar_events?select=*&order=start_date.asc`,{headers:SB_HEADERS});
    if(!res.ok)return null;
    const rows=await res.json();
    return rows.map(r=>({id:r.id,title:r.title||'',memo:r.memo||'',catId:r.cat_id||'',startDate:r.start_date||'',endDate:r.end_date||r.start_date||''}));
  }catch{return null;}
}
async function sbCalCatsLoad(){
  try{
    const res=await fetch(`${SB_URL}/rest/v1/calendar_cats?select=*&order=sort_order.asc`,{headers:SB_HEADERS});
    if(!res.ok)return null;
    const rows=await res.json();
    return rows.map(r=>({id:r.id,label:r.label||'',paletteId:r.palette_id||'blue'}));
  }catch{return null;}
}
async function sbCalEventSave(ev){
  await fetch(`${SB_URL}/rest/v1/calendar_events`,{
    method:'POST',
    headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify({id:ev.id,title:ev.title,memo:ev.memo||'',cat_id:ev.catId||'',start_date:ev.startDate,end_date:ev.endDate||ev.startDate}),
  });
}
async function sbCalEventDelete(id){
  await fetch(`${SB_URL}/rest/v1/calendar_events?id=eq.${id}`,{method:'DELETE',headers:SB_HEADERS});
}
async function sbCalCatSave(cat,sortOrder){
  await fetch(`${SB_URL}/rest/v1/calendar_cats`,{
    method:'POST',
    headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify({id:cat.id,label:cat.label,palette_id:cat.paletteId,sort_order:sortOrder??0}),
  });
}
async function sbCalCatDelete(id){
  await fetch(`${SB_URL}/rest/v1/calendar_cats?id=eq.${id}`,{method:'DELETE',headers:SB_HEADERS});
}
async function sbCalCatsReplace(cats){
  await fetch(`${SB_URL}/rest/v1/calendar_cats?sort_order=gte.0`,{method:'DELETE',headers:{...SB_HEADERS,'Prefer':'return=minimal'}});
  if(cats.length){
    await fetch(`${SB_URL}/rest/v1/calendar_cats`,{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'return=minimal'},
      body:JSON.stringify(cats.map((c,i)=>({id:c.id,label:c.label,palette_id:c.paletteId,sort_order:i}))),
    });
  }
}
function broadcastDashChanged(type){
  if(_dashBroadcastChannel) _dashBroadcastChannel.send({type:'broadcast',event:'dashboard_changed',payload:{reload:type}}).catch(()=>{});
}

function DashboardTab(){
  const[events,setEventsInner]=useState(loadCalEvents);
  const[cats,setCatsInner]=useState(loadCalCats);
  const[calLoading,setCalLoading]=useState(false);

  async function reloadFromSb(){
    setCalLoading(true);
    try{
      const[evRows,catRows]=await Promise.all([sbCalEventsLoad(),sbCalCatsLoad()]);
      if(evRows!==null){setEventsInner(evRows);try{localStorage.setItem(CAL_LS_5,JSON.stringify(evRows));}catch{}}
      if(catRows!==null&&catRows.length>0){setCatsInner(catRows);try{localStorage.setItem(CAT_LS_5,JSON.stringify(catRows));}catch{}}
    }catch(e){console.warn('[Cal] Supabase 로드 실패:',e);}
    finally{setCalLoading(false);}
  }

  useEffect(()=>{
    reloadFromSb();
    window._reloadCalFromSb=reloadFromSb;
    return()=>{window._reloadCalFromSb=null;};
  },[]);

  function setEvents(next){setEventsInner(next);}
  function setCats(next){setCatsInner(next);}
  const[today]=useState(()=>new Date());
  const[cur,setCur]=useState(()=>({y:new Date().getFullYear(),m:new Date().getMonth()}));
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({title:"",memo:"",catId:"",startDate:"",endDate:""});
  const[catForm,setCatForm]=useState({label:"",paletteId:"blue"});
  const[editCatId,setEditCatId]=useState(null);
  const[detail,setDetail]=useState(null);
  const[sideW,setSideW]=useState(260);
  const calContRef=useRef();
  const calDragRef=useRef({dragging:false});
  function startCalDrag(e){
    e.preventDefault();
    calDragRef.current.dragging=true;
    const onMove=ev=>{
      if(!calContRef.current)return;
      const rect=calContRef.current.getBoundingClientRect();
      const fromRight=rect.right-ev.clientX;
      setSideW(Math.min(500,Math.max(160,fromRight)));
    };
    const onUp=()=>{calDragRef.current.dragging=false;window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  }

  const y=cur.y,m=cur.m;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr2=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  function prevMonth(){setCur(c=>c.m===0?{y:c.y-1,m:11}:{y:c.y,m:c.m-1});}
  function nextMonth(){setCur(c=>c.m===11?{y:c.y+1,m:0}:{y:c.y,m:c.m+1});}
  function goToday(){setCur({y:today.getFullYear(),m:today.getMonth()});}

  const paletteMap=Object.fromEntries(PALETTE.map(p=>[p.id,p]));
  function getCatStyle(catId){const cat=cats.find(c=>c.id===catId);if(!cat)return paletteMap["blue"];return paletteMap[cat.paletteId]||paletteMap["blue"];}
  function getCatLabel(catId){const cat=cats.find(c=>c.id===catId);return cat?cat.label:"";}

  function getEventsForDate(ds){
    return events.filter(ev=>{
      if(ev.startDate&&ev.endDate)return ds>=ev.startDate&&ds<=ev.endDate;
      return ev.startDate===ds;
    });
  }

  function selectCat(catId){
    const label=getCatLabel(catId);
    const prefix=label?`[${label}] `:"";
    const stripped=form.title.replace(/^\[.*?\]\s*/,"");
    setForm(f=>({...f,catId,title:prefix+stripped}));
  }
  function openAdd(ds){
    const defCat=cats[0]?.id||"";
    const defLabel=getCatLabel(defCat);
    const defPrefix=defLabel?`[${defLabel}] `:"";
    setForm({title:defPrefix,memo:"",catId:defCat,startDate:ds,endDate:ds});
    setModal({mode:"add",date:ds});
    setDetail(null);
  }
  function openEdit(ev){
    setForm({title:ev.title,memo:ev.memo||"",catId:ev.catId||"",startDate:ev.startDate,endDate:ev.endDate||ev.startDate});
    setModal({mode:"edit",event:ev});
    setDetail(null);
  }
  function saveEvent(){
    if(!form.title.trim())return;
    if(modal.mode==="add"){
      const ne={id:Date.now(),title:form.title.trim(),memo:form.memo,catId:form.catId,startDate:form.startDate,endDate:form.endDate||form.startDate};
      const next=[...events,ne];
      setEvents(next);
      try{localStorage.setItem(CAL_LS_5,JSON.stringify(next));}catch{}
      sbCalEventSave(ne).then(()=>broadcastDashChanged('events')).catch(e=>console.warn('[Cal] 일정 저장 실패:',e));
    }else{
      const updated={...modal.event,...form,title:form.title.trim(),endDate:form.endDate||form.startDate};
      const next=events.map(e=>e.id===modal.event.id?updated:e);
      setEvents(next);
      try{localStorage.setItem(CAL_LS_5,JSON.stringify(next));}catch{}
      sbCalEventSave(updated).then(()=>broadcastDashChanged('events')).catch(e=>console.warn('[Cal] 일정 수정 실패:',e));
    }
    setModal(null);
  }
  function deleteEvent(id){
    if(!window.confirm("일정을 삭제할까요?"))return;
    const next=events.filter(e=>e.id!==id);
    setEvents(next);
    try{localStorage.setItem(CAL_LS_5,JSON.stringify(next));}catch{}
    sbCalEventDelete(id).then(()=>broadcastDashChanged('events')).catch(e=>console.warn('[Cal] 일정 삭제 실패:',e));
    setDetail(null);setModal(null);
  }
  function openCatManager(){setModal({mode:"cat"});setCatForm({label:"",paletteId:"blue"});setEditCatId(null);}
  function saveCat(){
    if(!catForm.label.trim())return;
    if(editCatId){
      const next=cats.map(c=>c.id===editCatId?{...c,...catForm,label:catForm.label.trim()}:c);
      setCats(next);
      try{localStorage.setItem(CAT_LS_5,JSON.stringify(next));}catch{}
      const updated=next.find(c=>c.id===editCatId);
      sbCalCatSave(updated,next.indexOf(updated)).then(()=>broadcastDashChanged('cats')).catch(e=>console.warn('[Cal] 분류 수정 실패:',e));
    }else{
      const nc={id:"cat_"+Date.now(),label:catForm.label.trim(),paletteId:catForm.paletteId};
      const next=[...cats,nc];
      setCats(next);
      try{localStorage.setItem(CAT_LS_5,JSON.stringify(next));}catch{}
      sbCalCatSave(nc,next.length-1).then(()=>broadcastDashChanged('cats')).catch(e=>console.warn('[Cal] 분류 추가 실패:',e));
    }
    setCatForm({label:"",paletteId:"blue"});setEditCatId(null);
  }
  function deleteCat(id){
    if(!window.confirm("분류를 삭제할까요?"))return;
    const next=cats.filter(c=>c.id!==id);
    setCats(next);
    try{localStorage.setItem(CAT_LS_5,JSON.stringify(next));}catch{}
    sbCalCatDelete(id).then(()=>broadcastDashChanged('cats')).catch(e=>console.warn('[Cal] 분류 삭제 실패:',e));
  }
  function startEditCat(cat){setEditCatId(cat.id);setCatForm({label:cat.label,paletteId:cat.paletteId});}

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const WDAYS=["일","월","화","수","목","금","토"];
  const MNAMES=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const monthEvents=events.filter(ev=>{
    const sd=ev.startDate||"",ed=ev.endDate||sd;
    const mS=`${String(y).padStart(4,"0")}-${String(m+1).padStart(2,"0")}-01`;
    const mE=`${String(y).padStart(4,"0")}-${String(m+1).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
    return sd<=mE&&ed>=mS;
  }).sort((a,b)=>a.startDate.localeCompare(b.startDate));

  return(
    <div ref={calContRef} style={{flex:1,minHeight:0,display:"flex",flexDirection:"row",overflow:"hidden",background:C.bg}}>
      {/* 캘린더 메인 */}
      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",padding:20,gap:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexShrink:0}}>
